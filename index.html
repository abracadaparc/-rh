<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AbracadaParc RH · Saison 2026</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#F4F8F4;min-height:100vh}
input,select,textarea,button{font-family:inherit}
input[type=date],input[type=time],input[type=number],input[type=text],input[type=email],input[type=color],input[type=password]{appearance:auto}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#C8E6C9;border-radius:3px}
@media print{.no-print{display:none!important}body{background:white!important}}
</style>
</head>
<body>
<div id="root"></div>
<script>
/**
 * ReservationsTab v5 — AbracadaParc
 * Nouveautés v5 :
 *   - ⚡ Mode "Sur place" (walk-in) accessible à tous y compris salariés
 *   - 📝 Onglet Mémos / Leads avec brouillon Gmail pré-rempli
 *   - Convertir un mémo en réservation en 1 clic
 */

(function () {
  'use strict';

  // ─── CONSTANTES ──────────────────────────────────────────────────────────────

  const FORMULES = [
    { id: 'magique',     label: "Abracada'Niv Magique",      prix: 160, base: 8,  desc: "Entrées + décoration + bonbons" },
    { id: 'fantastique', label: "Abracada'Niv Fantastique",  prix: 176, base: 8,  desc: "Magique + gâteau Nacima inclus" },
    { id: 'gourmand',    label: "Abracada'Niv Gourmand",     prix: 232, base: 10, desc: "Fantastique + repas inclus" },
    { id: 'classique',   label: "Abracada'Niv Classique",    prix: 250, base: 10, desc: "Formule complète standard" },
    { id: 'garden',      label: "Garden Party",              prix: 350, base: 15, desc: "Espace extérieur privatisé" },
    { id: 'night',       label: "Abracada'Night",            prix: 490, base: 20, desc: "Soirée privatisation complète" },
    { id: 'mesure',      label: "Sur mesure",                prix: 0,   base: 0,  desc: "Tarif personnalisé" },
  ];

  const SEGMENTS = [
    { id: 'anniversaire', label: '🎂 Anniversaire',       color: '#AD1457' },
    { id: 'scolaire',     label: '🏫 Scolaire',           color: '#1565C0' },
    { id: 'alsh',         label: '🏕️ ALSH / CDL',         color: '#2E7D32' },
    { id: 'privatisation',label: '🏡 Privatisation',      color: '#6A1B9A' },
    { id: 'groupe',       label: '👨‍👩‍👧 Groupe privé',       color: '#E65100' },
    { id: 'association',  label: '🌟 Association / IME',  color: '#00695C' },
    { id: 'entreprise',   label: '🏢 Entreprise / CE',    color: '#37474F' },
  ];

  const STATUTS = [
    { id: '1', label: '1 — Demande reçue',          color: '#9E9E9E', bg: '#F5F5F5' },
    { id: '2', label: '2 — Devis envoyé',            color: '#1565C0', bg: '#E3F2FD' },
    { id: '3', label: '3 — Devis signé · Attente BC',color: '#E65100', bg: '#FFF3E0' },
    { id: '4', label: '4 — Confirmé · BC reçu',      color: '#2E7D32', bg: '#E8F5E9' },
    { id: '5', label: '5 — Visite · Facturation',    color: '#6A1B9A', bg: '#F3E5F5' },
    { id: '6', label: '6 — Chorus Pro déposé ✓',     color: '#1B5E20', bg: '#C8E6C9' },
  ];

  const NACIMA_TEL = '06 19 30 06 39';

  // ─── ÉTAT INTERNE ────────────────────────────────────────────────────────────

  let state = {
    reservations: {},
    memos: {},
    gateaux: {},
    view: 'liste',         // liste | calendrier | gateaux | memos
    segmentFilter: 'tous',
    statutFilter: 'tous',
    showForm: false,
    editId: null,
    walkin: false,         // ⚡ mode sur place
    showMemoForm: false,
    editMemoId: null,
    formData: {},
    memoData: {},
    alertsShown: false,
  };

  // ─── FIREBASE ────────────────────────────────────────────────────────────────

  function save(path, data) {
    try { if (typeof fbSave === 'function') fbSave(path, JSON.stringify(data)); } catch (e) {}
    try { localStorage.setItem('abr_' + path, JSON.stringify(data)); } catch (e) {}
  }

  function load(path, fallback) {
    try {
      const s = localStorage.getItem('abr_' + path);
      return s ? JSON.parse(s) : fallback;
    } catch (e) { return fallback; }
  }

  function listen(path, cb) {
    try {
      if (typeof fbListen === 'function') {
        fbListen(path, (raw) => {
          try { cb(typeof raw === 'string' ? JSON.parse(raw) : raw); } catch (e) {}
        });
      }
    } catch (e) {}
  }

  // ─── HELPERS ─────────────────────────────────────────────────────────────────

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function today() { return new Date().toISOString().slice(0, 10); }
  function nowTime() {
    const d = new Date();
    const h = d.getHours();
    const hNext = h < 23 ? h + 1 : 23;
    return String(hNext).padStart(2, '0') + ':00';
  }
  function fmtDate(s) {
    if (!s) return '—';
    const [y, m, d] = s.split('-');
    return `${d}/${m}/${y}`;
  }
  function fmtDateShort(s) {
    if (!s) return '—';
    const d = new Date(s + 'T12:00');
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
  }
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function getStatut(id) { return STATUTS.find(s => s.id === id) || STATUTS[0]; }
  function getSegment(id) { return SEGMENTS.find(s => s.id === id) || SEGMENTS[0]; }
  function getFormule(id) { return FORMULES.find(f => f.id === id); }

  function calcTotal(r) {
    if (r.segment !== 'anniversaire') return parseFloat(r.montant_total) || 0;
    const f = getFormule(r.formule_id);
    if (!f || f.prix === 0) return parseFloat(r.montant_total) || 0;
    const base = f.prix;
    const supEnf = Math.max(0, (parseInt(r.effectif_enfants) || 0) - f.base) * 26;
    const adultes = (parseInt(r.effectif_adultes) || 0) * 10;
    const animateur = r.option_animateur ? 100 : 0;
    const gateau = r.gateau_nacima ? (parseFloat(r.gateau_prix) || 25.90) : 0;
    return base + supEnf + adultes + animateur + gateau;
  }

  function sortedReservations() {
    return Object.values(state.reservations).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  }

  function filteredReservations() {
    return sortedReservations().filter(r => {
      if (state.segmentFilter !== 'tous' && r.segment !== state.segmentFilter) return false;
      if (state.statutFilter !== 'tous' && r.statut !== state.statutFilter) return false;
      return true;
    });
  }

  // ─── GMAIL COMPOSE URL ───────────────────────────────────────────────────────

  function openGmailDraft(to, subject, body) {
    const url = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(to)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.open(url, '_blank');
  }

  function buildEmailInfos(memo) {
    const subject = `AbracadaParc — Votre demande de renseignements`;
    const body = `Bonjour ${memo.prenom || ''} ${memo.nom || ''},

Merci de l'intérêt que vous portez à AbracadaParc !

Suite à votre demande concernant : ${memo.type_event || 'votre événement'}
Date souhaitée : ${fmtDate(memo.date_souhaitee) || 'à définir'}
Nombre de personnes : ${memo.nb_personnes || 'à préciser'}

Nous serions ravis de vous accueillir à Goussainville pour cet événement.

${memo.type_event === 'anniversaire' ? `Nos formules anniversaire démarrent à 160 € pour 8 enfants et incluent décoration, bonbons et animation. Voici le lien de réservation en ligne : https://abracadaparc.fr/anniversaire` : `Pour toute privatisation ou réservation de groupe, nous vous invitons à nous contacter directement afin d'établir un devis personnalisé.`}

N'hésitez pas à nous appeler au 06 64 03 56 73 ou à répondre à cet email.

À très bientôt à AbracadaParc !

Vanessa Schweitzer
Fondatrice & Dirigeante — AbracadaParc
contact@abracadaparc.fr | 06 64 03 56 73
abracadaparc.fr`;
    return { subject, body };
  }

  function buildEmailDevis(memo) {
    const f = FORMULES[1]; // Fantastique par défaut
    const subject = `AbracadaParc — Devis ${memo.type_event || 'événement'} · ${memo.nom || ''}`;
    const body = `Bonjour ${memo.prenom || ''} ${memo.nom || ''},

Suite à votre passage au parc, veuillez trouver ci-après notre proposition pour votre ${memo.type_event || 'événement'}.

📅 Date souhaitée : ${fmtDate(memo.date_souhaitee) || 'à définir'}
👥 Nombre de personnes : ${memo.nb_personnes || 'à préciser'}
📌 Type d'événement : ${memo.type_event || ''}

--- DEVIS ---
[À compléter selon la formule choisie]

Pour valider votre réservation, un acompte de 100 € est demandé.

Je reste disponible pour toute question au 06 64 03 56 73.

À très bientôt,

Vanessa Schweitzer
AbracadaParc · Goussainville (95)
contact@abracadaparc.fr`;
    return { subject, body };
  }

  // ─── ALERTES GÂTEAUX ─────────────────────────────────────────────────────────

  function getGateauxAlertes() {
    const alertes = [];
    const todayStr = today();
    Object.values(state.reservations).forEach(r => {
      if (!r.gateau_nacima || !r.date) return;
      const dateVisite = new Date(r.date + 'T12:00');
      const diffJ = Math.round((dateVisite - new Date(todayStr + 'T12:00')) / 86400000);
      if (diffJ <= 10 && diffJ >= 0) {
        alertes.push({ r, diffJ, urgent: diffJ <= 7 });
      }
    });
    return alertes.sort((a, b) => a.diffJ - b.diffJ);
  }

  // ─── RENDU PRINCIPAL ─────────────────────────────────────────────────────────

  function render() {
    const el = document.getElementById('tab-reservations');
    if (!el) return;
    el.innerHTML = buildHTML();
    bindEvents();
  }

  function buildHTML() {
    const alertes = getGateauxAlertes();
    const memos = Object.values(state.memos).filter(m => !m.converted);
    return `
<div id="res-root" style="font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#212121;">

  ${/* ALERTES GÂTEAUX */ alertes.length ? `
  <div style="background:#FBE9E7;border:2px solid #FFAB91;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;">
    <span style="font-size:22px;flex-shrink:0;">🎂</span>
    <div style="flex:1;">
      <div style="font-size:13px;font-weight:800;color:#BF360C;margin-bottom:6px;">Commandes gâteaux à passer — ${NACIMA_TEL}</div>
      ${alertes.map(a => `
      <div style="font-size:12px;color:${a.urgent ? '#C62828' : '#E65100'};margin-bottom:2px;">
        ${a.urgent ? '🔴' : '🟡'} <strong>${a.r.prenom_enfant || a.r.nom_contact || 'Réservation'}</strong> · ${fmtDate(a.r.date)} · J-${a.diffJ}
        · ${a.r.gateau_type || 'gâteau'} ${a.r.gateau_inscription ? `"${esc(a.r.gateau_inscription)}"` : ''}
      </div>`).join('')}
    </div>
    <a href="tel:${NACIMA_TEL.replace(/ /g,'')}" style="background:#C62828;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;text-decoration:none;flex-shrink:0;cursor:pointer;">
      📞 Nacima
    </a>
  </div>` : ''}

  ${/* ONGLETS DE VUE */`
  <div style="display:flex;gap:0;border-bottom:2px solid #E8F5E9;margin-bottom:16px;overflow-x:auto;">
    ${[
      ['liste','📋 Liste'],
      ['calendrier','📅 Calendrier'],
      ['gateaux','🎂 Gâteaux'],
      ['memos',`📝 Mémos${memos.length ? ` <span style="background:#E53935;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;">${memos.length}</span>` : ''}`],
    ].map(([v, l]) => `
    <button data-view="${v}" style="padding:10px 16px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:12px;white-space:nowrap;font-weight:${state.view===v?700:400};color:${state.view===v?'#2E7D32':'#9E9E9E'};border-bottom:${state.view===v?'2.5px solid #2E7D32':'2.5px solid transparent'};margin-bottom:-2px;">${l}</button>
    `).join('')}
    <div style="flex:1;"></div>
    <button id="btn-new-res" style="margin:4px 8px;padding:7px 14px;background:#2E7D32;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">+ Réservation</button>
    <button id="btn-walkin" style="margin:4px 8px;padding:7px 14px;background:#E65100;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">⚡ Sur place</button>
    <button id="btn-new-memo" style="margin:4px 8px;padding:7px 14px;background:#1565C0;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">📝 Mémo</button>
  </div>`}

  ${/* CONTENU SELON VUE */
    state.view === 'liste'      ? buildListeView() :
    state.view === 'calendrier' ? buildCalView() :
    state.view === 'gateaux'    ? buildGateauxView() :
    state.view === 'memos'      ? buildMemosView() : ''}

  ${/* MODAL RÉSERVATION */ state.showForm ? buildFormModal() : ''}
  ${/* MODAL MÉMO */ state.showMemoForm ? buildMemoModal() : ''}

</div>`;
  }

  // ─── VUE LISTE ────────────────────────────────────────────────────────────────

  function buildListeView() {
    const list = filteredReservations();
    return `
<div>
  <!-- Filtres -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
    <select id="flt-segment" style="padding:6px 10px;border:1.5px solid #C8E6C9;border-radius:8px;font-size:12px;font-family:inherit;color:#2E7D32;background:#fff;">
      <option value="tous">Tous segments</option>
      ${SEGMENTS.map(s => `<option value="${s.id}" ${state.segmentFilter===s.id?'selected':''}>${s.label}</option>`).join('')}
    </select>
    <select id="flt-statut" style="padding:6px 10px;border:1.5px solid #C8E6C9;border-radius:8px;font-size:12px;font-family:inherit;color:#2E7D32;background:#fff;">
      <option value="tous">Tous statuts</option>
      ${STATUTS.map(s => `<option value="${s.id}" ${state.statutFilter===s.id?'selected':''}>${s.label}</option>`).join('')}
    </select>
    <div style="margin-left:auto;font-size:11px;color:#9E9E9E;align-self:center;">${list.length} réservation${list.length>1?'s':''}</div>
  </div>

  <!-- Stats rapides -->
  ${buildStats()}

  <!-- Liste -->
  <div style="display:flex;flex-direction:column;gap:8px;">
    ${list.length === 0 ? '<div style="text-align:center;padding:40px;color:#9E9E9E;font-size:13px;">Aucune réservation — cliquez sur + Réservation ou ⚡ Sur place</div>' :
      list.map(r => buildReservationCard(r)).join('')}
  </div>
</div>`;
  }

  function buildStats() {
    const all = Object.values(state.reservations);
    const ca = all.reduce((s, r) => s + calcTotal(r), 0);
    const soldes = all.filter(r => r.statut !== '6').reduce((s, r) => {
      const t = calcTotal(r); const a = parseFloat(r.acompte_paye) || 0;
      return s + Math.max(0, t - a);
    }, 0);
    const walkins = all.filter(r => r.walkin).length;
    return `
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:14px;">
  ${[
    ['Total réservations', all.length, '#2E7D32', '#E8F5E9'],
    ['CA total estimé', ca.toLocaleString('fr') + ' €', '#1565C0', '#E3F2FD'],
    ['Soldes dus', soldes.toLocaleString('fr') + ' €', soldes > 0 ? '#C62828' : '#2E7D32', soldes > 0 ? '#FFEBEE' : '#E8F5E9'],
    ['Walk-ins sur place', walkins, '#E65100', '#FFF3E0'],
  ].map(([l, v, c, bg]) => `
  <div style="background:${bg};border-radius:10px;padding:10px 12px;text-align:center;">
    <div style="font-size:18px;font-weight:800;color:${c};">${v}</div>
    <div style="font-size:10px;color:${c};opacity:0.8;margin-top:2px;">${l}</div>
  </div>`).join('')}
</div>`;
  }

  function buildReservationCard(r) {
    const st = getStatut(r.statut || '1');
    const seg = getSegment(r.segment);
    const total = calcTotal(r);
    const acompte = parseFloat(r.acompte_paye) || 0;
    const solde = Math.max(0, total - acompte);
    return `
<div style="background:#fff;border:1px solid #E8F5E9;border-radius:12px;padding:14px 16px;border-left:4px solid ${seg.color};">
  <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;">
    <div style="flex:1;min-width:200px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
        <span style="font-size:13px;font-weight:800;color:#212121;">
          ${esc(r.prenom_enfant || r.nom_contact || r.ref || '—')}
          ${r.nom_contact && r.prenom_enfant ? `<span style="font-weight:400;color:#9E9E9E;">· ${esc(r.nom_contact)}</span>` : ''}
        </span>
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:${seg.color}18;color:${seg.color};">${seg.label}</span>
        ${r.walkin ? '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#FFF3E0;color:#E65100;">⚡ Sur place</span>' : ''}
      </div>
      <div style="font-size:12px;color:#616161;">
        📅 ${fmtDate(r.date)} ${r.heure_debut ? `· ${r.heure_debut}–${r.heure_fin || ''}` : ''}
        ${r.effectif_total ? `· 👥 ${r.effectif_total} pers.` : ''}
        ${r.formule_id ? `· ${getFormule(r.formule_id)?.label || ''}` : ''}
      </div>
      ${r.notes ? `<div style="font-size:11px;color:#9E9E9E;margin-top:4px;font-style:italic;">💬 ${esc(r.notes.slice(0,80))}${r.notes.length>80?'…':''}</div>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
      <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:${st.bg};color:${st.color};">${st.label}</span>
      ${total > 0 ? `
      <div style="text-align:right;">
        <div style="font-size:13px;font-weight:800;color:#1B5E20;">${total.toLocaleString('fr')} €</div>
        ${acompte > 0 ? `<div style="font-size:10px;color:#9E9E9E;">Acompte : ${acompte.toLocaleString('fr')} €</div>` : ''}
        ${solde > 0 ? `<div style="font-size:11px;font-weight:700;color:#C62828;">Solde : ${solde.toLocaleString('fr')} €</div>` : `<div style="font-size:10px;color:#2E7D32;">✅ Réglé</div>`}
      </div>` : ''}
      <div style="display:flex;gap:4px;">
        ${r.statut !== '6' ? `
        <button data-advance="${r.id}" style="padding:4px 8px;background:#E8F5E9;color:#2E7D32;border:1px solid #C8E6C9;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;">Avancer →</button>` : ''}
        <button data-edit="${r.id}" style="padding:4px 8px;background:#F5F5F5;color:#424242;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;">✏️</button>
        <button data-delete="${r.id}" style="padding:4px 8px;background:#FFEBEE;color:#C62828;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;">🗑</button>
      </div>
    </div>
  </div>
</div>`;
  }

  // ─── MODAL ÉDITION GÂTEAU ────────────────────────────────────────────────────
  function buildGateauEditModal(r) {
    return '<div id="gateau-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px">' +
      '<div style="background:#fff;border-radius:16px;padding:24px 28px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.25)">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">' +
          '<div style="font-size:15px;font-weight:800;color:#1B5E20">🎂 ' + esc(r.prenom_enfant || r.nom_contact || '') + '</div>' +
          '<button id="close-gateau-modal" style="background:none;border:none;font-size:24px;cursor:pointer;color:#9E9E9E">×</button>' +
        '</div>' +
        '<div style="margin-bottom:14px">' +
          '<div style="font-size:10px;font-weight:700;color:#558B2F;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px">Gâteau</div>' +
          '<div style="font-size:13px;color:#424242;">' + esc(r.gateau_type || '—') + (r.gateau_inscription ? ' · "' + esc(r.gateau_inscription) + '"' : '') + '</div>' +
        '</div>' +
        '<div style="margin-bottom:14px">' +
          '<label style="display:block;font-size:10px;font-weight:700;color:#C62828;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px">⚠️ Allergies</label>' +

  // ─── VUE CALENDRIER ──────────────────────────────────────────────────────────

  function buildCalView() {
    if (!state.calYear) { state.calYear = new Date().getFullYear(); state.calMonth = new Date().getMonth(); }
    const year = state.calYear;
    const month = state.calMonth;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const nomsMois = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    const byDay = {};
    Object.values(state.reservations).forEach(r => {
      if (r.date) { if (!byDay[r.date]) byDay[r.date] = []; byDay[r.date].push(r); }
    });
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    let cells = '';
    for (let i = 0; i < offset; i++) cells += '<div></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const items = byDay[ds] || [];
      const isToday = ds === today();
      cells += `
<div style="min-height:70px;border:1px solid #E8F5E9;border-radius:8px;padding:4px;background:${isToday?'#F1F8E9':'#fff'};">
  <div style="font-size:11px;font-weight:${isToday?800:400};color:${isToday?'#2E7D32':'#757575'};margin-bottom:3px;">${d}</div>
  ${items.slice(0,3).map(r => {
    const seg = getSegment(r.segment);
    return `<div style="font-size:9px;background:${seg.color}22;color:${seg.color};border-radius:3px;padding:1px 4px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:600;">${esc(r.prenom_enfant || r.nom_contact || r.organisation || '?')} ${r.heure_debut?'·'+r.heure_debut:''}</div>`;
  }).join('')}
  ${items.length > 3 ? `<div style="font-size:9px;color:#9E9E9E;">+${items.length-3}</div>` : ''}
</div>`;
    }
    return `
<div>
  <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;">
    <button id="cal-prev" style="background:#F1F8E9;border:1px solid #C8E6C9;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;color:#2E7D32;">←</button>
    <span style="font-size:16px;font-weight:800;color:#2E7D32;min-width:180px;text-align:center;">${nomsMois[month]} ${year}</span>
    <button id="cal-next" style="background:#F1F8E9;border:1px solid #C8E6C9;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;color:#2E7D32;">→</button>
    <button id="cal-today" style="background:#2E7D32;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;color:#fff;">Aujourd'hui</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;">
    ${['Lu','Ma','Me','Je','Ve','Sa','Di'].map(j => `<div style="text-align:center;font-size:10px;font-weight:700;color:#9E9E9E;">${j}</div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">${cells}</div>
  <div style="margin-top:10px;font-size:11px;color:#9E9E9E;text-align:center;">${Object.keys(byDay).filter(d=>d.startsWith(year+'-'+String(month+1).padStart(2,'0'))).length} réservation(s) ce mois</div>
</div>`;
  }

  // ─── VUE GÂTEAUX ─────────────────────────────────────────────────────────────

  function buildGateauxView() {
    const list = Object.values(state.reservations)
      .filter(r => r.gateau_nacima && r.date >= today())
      .sort((a, b) => a.date.localeCompare(b.date));
    return `
<div>
  <div style="background:#FFF3E0;border:1px solid #FFD54F;border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;">
    <div>
      <div style="font-size:13px;font-weight:700;color:#E65100;">🎂 Commandes gâteaux — Nacima</div>
      <div style="font-size:11px;color:#E65100;margin-top:2px;">J-10 orange · J-7 rouge · Commander dès J-10</div>
    </div>
    <a href="tel:${NACIMA_TEL.replace(/ /g,'')}" style="background:#E65100;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">📞 ${NACIMA_TEL}</a>
  </div>
  ${list.length === 0 ? '<div style="text-align:center;padding:40px;color:#9E9E9E;font-size:13px;">Aucune commande gâteau à venir</div>' : `
  <table style="width:100%;border-collapse:collapse;">
    <thead><tr style="background:#F1F8E9;border-bottom:2px solid #C8E6C9;">
      ${['Date visite','Enfant','Gâteau','Inscription','Allergies','J-?','Statut'].map(h => `<th style="padding:8px 10px;font-size:11px;text-align:left;color:#558B2F;font-weight:700;">${h}</th>`).join('')}
    </tr></thead>
    <tbody>
    ${list.map(r => {
      const dateVisite = new Date(r.date + 'T12:00');
      const diffJ = Math.round((dateVisite - new Date(today() + 'T12:00')) / 86400000);
      const urgColor = diffJ <= 7 ? '#C62828' : diffJ <= 10 ? '#E65100' : '#2E7D32';
            var allergiesTxt = r.gateau_allergies && r.gateau_allergies !== 'aucune' ? r.gateau_allergies : '✅ aucune';
      var allergieColor = r.gateau_allergies && r.gateau_allergies !== 'aucune' && r.gateau_allergies !== '' ? '#C62828' : '#2E7D32';
      var statutLabel = r.gateau_commande === 'livre' ? '🎂 Réceptionné ✅' : r.gateau_commande === 'prevu' ? '📅 Livraison prévue' : r.gateau_commande ? '✅ Commandé' : '⏳ À commander';
      var statutBg = r.gateau_commande === 'livre' ? '#E8F5E9' : r.gateau_commande === 'prevu' ? '#E3F2FD' : r.gateau_commande ? '#FFF8E1' : '#FBE9E7';
      var statutColor = r.gateau_commande === 'livre' ? '#1B5E20' : r.gateau_commande === 'prevu' ? '#1565C0' : r.gateau_commande ? '#E65100' : '#C62828';
      return '<tr style="border-bottom:1px solid #F5F5F5;">' +
        '<td style="padding:8px 10px;font-size:12px;font-weight:700;">' + fmtDate(r.date) + '</td>' +
        '<td style="padding:8px 10px;font-size:12px;">' + esc(r.prenom_enfant || r.nom_contact || '—') + '</td>' +
        '<td style="padding:8px 10px;font-size:12px;">' + esc(r.gateau_type || '—') + '</td>' +
        '<td style="padding:8px 10px;font-size:12px;">' + esc(r.gateau_inscription || '—') + '</td>' +
        '<td style="padding:8px 10px;font-size:11px;font-weight:700;color:' + allergieColor + ';">' + esc(allergiesTxt) + '</td>' +
        '<td style="padding:8px 10px;"><span style="font-weight:800;color:' + urgColor + ';">J-' + diffJ + '</span></td>' +
        '<td style="padding:8px 10px;">' +
          '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">' +
            '<span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:' + statutBg + ';color:' + statutColor + ';">' + statutLabel + '</span>' +
            (r.gateau_date_livraison ? '<span style="font-size:10px;color:#9E9E9E;">📅 ' + fmtDate(r.gateau_date_livraison) + '</span>' : '') +
            '<button data-gateau-edit="' + r.id + '" style="padding:3px 10px;background:#F1F8E9;color:#2E7D32;border:1px solid #C8E6C9;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;">✏️ Modifier</button>' +
          '</div>' +
        '</td>' +
      '</tr>'
    ;
    }).join('')}
    </tbody>
  </table>`}
</div>`;
  }

  // ─── VUE MÉMOS ───────────────────────────────────────────────────────────────

  function buildMemosView() {
    const list = Object.values(state.memos).sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">

</div>`;

  <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;">

      <div style="font-size:14px;font-weight:800;color:#1565C0;margin-bottom:4px;">
        ${esc(m.prenom || '')} ${esc(m.nom || '')}

  // ─── GESTION DES ÉVÉNEMENTS ──────────────────────────────────────────────────

  function bindEvents() {
    const el = document.getElementById('res-root');
    if (!el) return;

    el.addEventListener('click', function (e) {
      const t = e.target.closest('[data-view]');
      if (t) { state.view = t.dataset.view; render(); return; }

      if (e.target.closest('#btn-new-res')) {
        state.showForm = true; state.editId = null; state.walkin = false;
        state.formData = { segment: 'anniversaire', statut: '1', date: '' };
        render(); return;
      }
      if (e.target.closest('#btn-walkin')) {
        state.showForm = true; state.editId = null; state.walkin = true;
        state.formData = { segment: 'anniversaire', statut: '4', date: today(), heure_debut: nowTime(), walkin: true };
        render(); return;
      }
      if (e.target.closest('#btn-new-memo') || e.target.closest('#btn-new-memo-2')) {
        state.showMemoForm = true; state.editMemoId = null;
        state.memoData = {};
        render(); return;
      }

      // Walk-in memo
      const wm = e.target.closest('[data-walkin-memo]');
      if (wm) {
        state.showMemoForm = true; state.editMemoId = null;
        state.memoData = { walkin: true, created_at: new Date().toISOString() };
        render(); return;
      }

      // Segment picker in form
      const seg = e.target.closest('[data-seg]');
      if (seg) { state.formData.segment = seg.dataset.seg; state.formData.formule_id = null; render(); return; }

      // Formule picker
      const form = e.target.closest('[data-formule]');
      if (form) { state.formData.formule_id = form.dataset.formule; render(); return; }

      // Memo type picker
      const mtype = e.target.closest('[data-memo-type]');
      if (mtype) { state.memoData.type_event = mtype.dataset.memoType; render(); return; }

      // Advance statut
      const adv = e.target.closest('[data-advance]');
      if (adv) {
        const r = state.reservations[adv.dataset.advance];
        if (r) { const idx = STATUTS.findIndex(s => s.id === r.statut); if (idx < STATUTS.length - 1) r.statut = STATUTS[idx + 1].id; saveAll(); render(); } return;
      }

      // Edit reservation
      const edit = e.target.closest('[data-edit]');
      if (edit) {
        const r = state.reservations[edit.dataset.edit];
        if (r) { state.editId = r.id; state.walkin = false; state.showForm = true; state.formData = { ...r }; render(); } return;
      }

      // Delete reservation
      const del = e.target.closest('[data-delete]');
      if (del) {
        if (confirm('Supprimer cette réservation ?')) { delete state.reservations[del.dataset.delete]; saveAll(); render(); } return;
      }

      // Close form
      if (e.target.closest('#close-form') || e.target.closest('#close-form-2')) {
        state.showForm = false; render(); return;
      }

      // Save form
      if (e.target.closest('#save-form')) { saveReservation(); return; }

      // Memo actions
      const gmailI = e.target.closest('[data-gmail-infos]');
      if (gmailI) {
        const m = state.memos[gmailI.dataset.gmailInfos];
        if (m) { const {subject, body} = buildEmailInfos(m); openGmailDraft(m.email, subject, body); } return;
      }
      const gmailD = e.target.closest('[data-gmail-devis]');
      if (gmailD) {
        const m = state.memos[gmailD.dataset.gmailDevis];
        if (m) { const {subject, body} = buildEmailDevis(m); openGmailDraft(m.email, subject, body); } return;
      }
      const convMemo = e.target.closest('[data-convert-memo]');
      if (convMemo) {
        const m = state.memos[convMemo.dataset.convertMemo];
        if (m) {
          m.converted = true;
          state.formData = {
            segment: m.type_event === 'anniversaire' ? 'anniversaire' :
                     m.type_event === 'sortie scolaire' ? 'scolaire' :
                     m.type_event === 'ALSH / CDL' ? 'alsh' :
                     m.type_event === 'privatisation' ? 'privatisation' :
                     m.type_event === 'entreprise' ? 'entreprise' : 'groupe',
            statut: '1', date: m.date_souhaitee || '',
            nom_contact: (m.prenom || '') + ' ' + (m.nom || ''),
            tel: m.tel || '', effectif_total: m.nb_personnes || '',
            notes: m.note || '', organisation: '',
          };
          state.showForm = true; state.editId = null; state.walkin = false;
          saveAll(); render();
        } return;
      }
      const editMemo = e.target.closest('[data-edit-memo]');
      if (editMemo) {
        const m = state.memos[editMemo.dataset.editMemo];
        if (m) { state.editMemoId = m.id; state.showMemoForm = true; state.memoData = {...m}; render(); } return;
      }
      const delMemo = e.target.closest('[data-delete-memo]');
      if (delMemo) {
        if (confirm('Supprimer ce mémo ?')) { delete state.memos[delMemo.dataset.deleteMemo]; saveAll(); render(); } return;
      }

      // Close memo
      if (e.target.closest('#close-memo') || e.target.closest('#close-memo-2')) {
        state.showMemoForm = false; render(); return;
      }

      // Save memo
      if (e.target.closest('#save-memo')) { saveMemo(); return; }
    });

    // Calendar navigation
    const calPrev = el.querySelector('#cal-prev');
    if (calPrev) calPrev.addEventListener('click', () => {
      if (!state.calYear) { state.calYear = new Date().getFullYear(); state.calMonth = new Date().getMonth(); }
      state.calMonth--; if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
      render();
    });
    const calNext = el.querySelector('#cal-next');
    if (calNext) calNext.addEventListener('click', () => {
      if (!state.calYear) { state.calYear = new Date().getFullYear(); state.calMonth = new Date().getMonth(); }
      state.calMonth++; if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
      render();
    });
    const calToday = el.querySelector('#cal-today');
    if (calToday) calToday.addEventListener('click', () => {
      state.calYear = new Date().getFullYear(); state.calMonth = new Date().getMonth(); render();
    });
    // Gâteau edit
    el.querySelectorAll('[data-gateau-edit]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.dataset.gateauEdit;
        var r = state.reservations[id];
        if (!r) return;
        var existing = document.getElementById('gateau-modal');
        if (existing) existing.remove();
        var div = document.createElement('div');
        div.innerHTML = buildGateauEditModal(r);
        document.getElementById('res-root').appendChild(div.firstChild);
        var closeModal = function() { var m = document.getElementById('gateau-modal'); if(m) m.remove(); };
        document.getElementById('close-gateau-modal').addEventListener('click', closeModal);
        document.getElementById('close-gateau-modal-2').addEventListener('click', closeModal);
        document.getElementById('save-gateau-modal').addEventListener('click', function() {
          var rid = this.dataset.id;
          if (!state.reservations[rid]) return;
          var allergies = document.getElementById('gm-allergies').value.trim();
          var statut = document.getElementById('gm-statut').value;
          var dateLiv = document.getElementById('gm-date').value;
          state.reservations[rid].gateau_allergies = allergies || 'aucune';
          state.reservations[rid].gateau_commande = statut || false;
          state.reservations[rid].gateau_date_livraison = dateLiv;
          state.reservations[rid].updated_at = new Date().toISOString();
          saveAll();
          closeModal();
          render();
        });
      });
    });

    // Filtres
    const fltSeg = el.querySelector('#flt-segment');
    if (fltSeg) fltSeg.addEventListener('change', e => { state.segmentFilter = e.target.value; render(); });
    const fltSt = el.querySelector('#flt-statut');
    if (fltSt) fltSt.addEventListener('change', e => { state.statutFilter = e.target.value; render(); });
  }

  // ─── SAUVEGARDE RÉSERVATION ──────────────────────────────────────────────────

  function saveReservation() {
    const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    const d = state.formData;

    const nom = get('f-nom');
    if (!nom) { alert('Le nom du contact est requis.'); return; }

    const r = {
      id: state.editId || uid(),
      segment: d.segment || 'anniversaire',
      statut: get('f-statut') || d.statut || '1',
      nom_contact: nom,
      tel: get('f-tel'),
      date: get('f-date'),
      heure_debut: get('f-hdeb'),
      heure_fin: get('f-hfin'),
      montant_total: get('f-total'),
      acompte_paye: get('f-acompte'),
      mode_paiement: get('f-mode'),
      notes: get('f-notes'),
      walkin: d.walkin || false,
      created_at: state.editId ? (state.reservations[state.editId]?.created_at || new Date().toISOString()) : new Date().toISOString(),
      updated_at: new Date().toISOString(),
    };

    if (d.segment === 'anniversaire') {
      r.prenom_enfant = get('f-prenom');
      r.age_enfant = get('f-age');
      r.effectif_enfants = get('f-enf');
      r.formule_id = d.formule_id || '';

      r.gateau_type = get('f-gateau-type');
      r.gateau_inscription = get('f-gateau-insc');
      r.gateau_allergies = get('f-allergies');
    } else {
      r.organisation = get('f-org');
      r.effectif_total = get('f-eff');
    }

    // Traçabilité — qui a fait la modification
    r.modified_by = "Admin";
    r.modified_at = new Date().toISOString();
    if (state.editId && state.reservations[state.editId]) {
      r.created_by = state.reservations[state.editId].created_by || "Auto";
      r.created_at = state.reservations[state.editId].created_at;
    } else {
      r.created_by = "Admin";
    }
    state.reservations[r.id] = r;
    state.showForm = false;
    state.walkin = false;
    saveAll();
    render();
  }

  // ─── SAUVEGARDE MÉMO ─────────────────────────────────────────────────────────

  function saveMemo() {
    const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    const d = state.memoData;

    const nom = get('m-nom');
    if (!nom) { alert('Le nom est requis.'); return; }

    const m = {
      id: state.editMemoId || uid(),
      prenom: get('m-prenom'),
      nom,
      tel: get('m-tel'),
      email: get('m-email'),
      type_event: d.type_event || '',
      date_souhaitee: get('m-date'),
      nb_personnes: get('m-nb'),
      note: get('m-note'),

      converted: false,
      created_at: state.editMemoId ? (state.memos[state.editMemoId]?.created_at || new Date().toISOString()) : new Date().toISOString(),
    };

    state.memos[m.id] = m;
    state.showMemoForm = false;
    saveAll();
    render();
  }

  // ─── PERSISTANCE ─────────────────────────────────────────────────────────────

  function saveAll() {
    save('reservations', state.reservations);
    save('memos', state.memos);
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────────

  function init(autoRender) {
    state.reservations = load('reservations', {});
    state.memos = load('memos', {});

    listen('reservations', data => { if (data) { state.reservations = data; render(); } });
    listen('memos', data => { if (data) { state.memos = data; render(); } });

    if (autoRender) {
      // Attendre que le DOM soit prêt
      const tryRender = () => {
        const el = document.getElementById('tab-reservations');
        if (el) { render(); } else { setTimeout(tryRender, 100); }
      };
      tryRender();
    }
  }

  // ─── EXPORT ──────────────────────────────────────────────────────────────────

  window.ReservationsTab = { init, render, state };

})();

</script>

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmt(d) { return (d instanceof Date ? d : new Date(d)).toISOString().slice(0,10); }
function fmtFR(s) { const [y,m,d] = s.split("-"); return `${d}/${m}/${y}`; }
function fmtFR2(s) { const d=new Date(s+"T12:00"); return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}); }

function getDayType(ds) {
  if (ds < SEASON_START || ds > SEASON_END) return null;
  for (const h of SCHOOL_HOLIDAYS) { if (ds >= h.start && ds <= h.end) return "vacances"; }
  const d = new Date(ds+"T12:00"); const dw = d.getDay();
  if (dw === 3) return "mercredi"; // Wednesday
  if (dw === 0 || dw === 6) return "weekend";
  return null; // closed
}

function getSlotKey(ds, dayType, isWeekend) {
  if (!dayType) return null;
  if (dayType === "vacances") return isWeekend ? "vacWE" : "vacWD";
  if (dayType === "mercredi") return "wed";
  return "we";
}

function calcDayCost(level, slotKey, taux=12.50) {
  if (!level || !slotKey) return 0;
  const slots = LEVELS[level][slotKey] || [];
  return slots.reduce((s,p) => s + p.h, 0) * taux * CHARGES_PAT;
}

function buildSeasonDays() {
  const days = [];
  let d = new Date(SEASON_START+"T12:00");
  const end = new Date(SEASON_END+"T12:00");
  while (d <= end) {
    const ds = fmt(d);
    const dw = d.getDay();
    const isWE = dw===0||dw===6;
    const dayType = getDayType(ds);
    if (dayType) days.push({ ds, dayType, isWE, dw });
    d = addDays(d, 1);
  }
  return days;
}

function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const [ready, setReady] = useState(false);
  const ref = useRef(val); ref.current = val;

  // Firebase listener — sync remote changes to all devices in real time
  useEffect(() => {
    const db = getFbDb();
    if (!db) { setReady(true); return; }
    const fbRef = db.ref("abracadaparc/" + key);
    fbRef.on("value", snap => {
      if (snap.val() !== null) {
        try {
          const remote = typeof snap.val() === "string" ? JSON.parse(snap.val()) : snap.val();
          ref.current = remote;
          setVal(remote);
          localStorage.setItem(key, JSON.stringify(remote));
        } catch {}
      }
      setReady(true);
    });
    return () => fbRef.off("value");
  }, [key]);

  const save = useCallback(v => {
    const next = typeof v==="function" ? v(ref.current) : v;
    ref.current = next; setVal(next);
    try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
    fbSave(key, JSON.stringify(next));
    if (key === "abr26_shifts_v4") {
      localStorage.setItem("abr26_planning_updated", Date.now().toString());
      fbSave("abr26_planning_updated", Date.now().toString());
    }
  }, [key]);
  return [val, save, ready];
}

function CalendrierTab({ dayLevels, setDayLevels }) {
  const [selMonth, setSelMonth] = useState(4);
  const [editing, setEditing] = useState(null);
  const [bulkMode, setBulkMode] = useState(false);
  const [bulkLevel, setBulkLevel] = useState("NORMAL");

  const monthDays = SEASON_DAYS.filter(({ds}) => parseInt(ds.slice(5,7)) === selMonth);
  const months = [...new Set(SEASON_DAYS.map(({ds}) => parseInt(ds.slice(5,7))))];

  const setLevel = (ds, level) => setDayLevels(p => level ? { ...p, [ds]:level } : (() => { const n={...p}; delete n[ds]; return n; })());

  const bulkApply = (type) => {
    const updates = {};
    for (const {ds, dayType, isWE} of monthDays) {
      const match = type === "all" || (type === "we" && dayType === "weekend") ||
        (type === "vac" && dayType === "vacances") || (type === "wed" && dayType === "mercredi");
      if (match) updates[ds] = bulkLevel;
    }
    setDayLevels(p => ({ ...p, ...updates }));
  };

  const monthCost = monthDays.reduce((s,{ds,dayType,isWE}) => {
    const level = dayLevels[ds] || "NORMAL";
    const sk = getSlotKey(ds, dayType, isWE);
    return s + calcDayCost(level, sk);
  }, 0);

  const dtColor = { mercredi:"#1565C0", weekend:"#BF360C", vacances:"#2E7D32" };
  const dtBg    = { mercredi:"#E3F2FD", weekend:"#FBE9E7", vacances:"#E8F5E9" };
  const dtLabel = { mercredi:"Mer", weekend:"WE", vacances:"VAC" };

  return (
    <div>
      {/* Header mois */}
      <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:10, marginBottom:18 }}>
        <div style={{ display:"flex", gap:4, flexWrap:"wrap", flex:1 }}>
          {months.map(m => (
            <button key={m} onClick={() => setSelMonth(m)} style={{
              ...S.btn, padding:"6px 14px",
              background:selMonth===m ? "#2E7D32" : "#F1F8E9",
              color:selMonth===m ? "#fff" : "#558B2F",
              border: selMonth===m ? "none" : "1px solid #C8E6C9",
            }}>{MOIS_FR[m]}</button>
          ))}
        </div>
        <div style={{ fontWeight:700, color:"#2E7D32", fontSize:14, whiteSpace:"nowrap" }}>
          {Math.round(monthCost).toLocaleString("fr")} € est.
        </div>
      </div>

      {/* Bulk actions */}
      <div style={{ ...S.card, marginBottom:16, padding:"12px 16px", background:"#F9FBE7" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
          <span style={{ fontSize:12, color:"#558B2F", fontWeight:600 }}>Application en masse :</span>
          <select value={bulkLevel} onChange={e => setBulkLevel(e.target.value)} style={{ ...S.btn, border:"1px solid #C8E6C9", background:"#fff", color:LEVELS[bulkLevel].color, padding:"6px 12px" }}>
            <option value="BAS">BAS</option>
            <option value="NORMAL">NORMAL</option>
            <option value="PIC">PIC</option>
          </select>
          {[["Tout le mois","all"],["Weekends","we"],["Vacances","vac"],["Mercredis","wed"]].map(([l,k]) => (
            <button key={k} onClick={() => bulkApply(k)} style={{ ...S.btn, ...S.btnS, padding:"6px 14px" }}>{l} → {bulkLevel}</button>
          ))}
        </div>
      </div>

      {/* Grille jours */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(130px, 1fr))", gap:8 }}>
        {monthDays.map(({ds, dayType, isWE}) => {
          const level = dayLevels[ds];
          const sk = getSlotKey(ds, dayType, isWE);
          const cost = calcDayCost(level || "NORMAL", sk);
          const slots = level ? LEVELS[level][sk] : LEVELS["NORMAL"][sk];
          const l = level ? LEVELS[level] : null;
          const d = new Date(ds+"T12:00");
          const dw = d.getDay();
          const is1Mai = PUBLIC_HOLIDAYS_100.includes(ds);

          return (
            <div key={ds} onClick={() => setEditing(ds)} style={{
              background: l ? l.bg : "#FAFAFA",
              border: `1.5px solid ${l ? l.border : "#E0E0E0"}`,
              borderRadius:10, padding:"10px 10px 8px", cursor:"pointer",
              position:"relative",
            }}
            onMouseEnter={e => e.currentTarget.style.filter="brightness(0.96)"}
            onMouseLeave={e => e.currentTarget.style.filter=""}>
              {is1Mai && <span style={{ position:"absolute", top:4, right:6, fontSize:9, background:"#E53935", color:"#fff", padding:"1px 5px", borderRadius:10, fontWeight:700 }}>1er MAI ×2</span>}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <span style={{ fontSize:13, fontWeight:800, color:"#212121" }}>{fmtFR2(ds)}</span>
                <span style={{ fontSize:9, fontWeight:700, padding:"2px 7px", borderRadius:10, background:dtBg[dayType], color:dtColor[dayType] }}>{dtLabel[dayType]}</span>
              </div>
              <LvlBadge level={level} sm />
              {level && (
                <div style={{ marginTop:7 }}>
                  {slots?.slice(0,3).map((p,i) => (
                    <div key={i} style={{ fontSize:9, color:l.color, lineHeight:1.6 }}>
                      {p.deb}–{p.fin} ({p.h}h)
                    </div>
                  ))}
                  {slots?.length > 3 && <div style={{ fontSize:9, color:l.color }}>+{slots.length-3} pers.</div>}
                  <div style={{ fontSize:10, fontWeight:700, color:l.color, marginTop:3 }}>≈ {Math.round(cost)} €</div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Éditeur niveau */}
      {editing && (() => {
        const {dayType, isWE} = SEASON_DAYS.find(d => d.ds === editing) || {};
        const sk = getSlotKey(editing, dayType, isWE);
        return (
          <Modal title={`${fmtFR(editing)} · ${dayType?.toUpperCase()}`} onClose={() => setEditing(null)}>
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              {Object.entries(LEVELS).map(([lk, lv]) => {
                const slots = lv[sk] || [];
                const cost = calcDayCost(lk, sk);
                const active = dayLevels[editing] === lk;
                return (
                  <div key={lk} onClick={() => { setLevel(editing, lk); setEditing(null); }} style={{
                    padding:"14px 16px", borderRadius:12, cursor:"pointer",
                    background: active ? lv.bg : "#FAFAFA",
                    border: `2px solid ${active ? lv.border : "#E0E0E0"}`,
                    transition:"all 0.15s",
                  }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                      <span style={{ fontSize:16, fontWeight:800, color:lv.color }}>{lk}</span>
                      <span style={{ fontSize:13, fontWeight:700, color:lv.color }}>{Math.round(cost)} € chargé</span>
                    </div>
                    <div style={{ fontSize:11, color:"#757575", marginBottom:8, lineHeight:1.5 }}>{lv.desc}</div>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      {slots.map((p,i) => (
                        <span key={i} style={{ padding:"3px 10px", borderRadius:20, fontSize:11, background:lv.bg, color:lv.color, border:`1px solid ${lv.border}`, fontWeight:600 }}>
                          P{i+1} · {p.deb}–{p.fin} · {p.h}h
                        </span>
                      ))}
                    </div>
                  </div>
                );
              })}
              <button onClick={() => { setLevel(editing, null); setEditing(null); }} style={{ ...S.btn, ...S.btnD }}>Retirer le niveau</button>
            </div>
          </Modal>
        );
      })()}
    </div>
  );
}

// ─── AVAILABILITY ENGINE ─────────────────────────────────────────────────────

// Returns typical hours worked per open day per employee based on their availability rules
// We use NORMAL level as forecast basis (conservative, can be adjusted)
function getEmpAvailability(emp, ds, dayType, isWE) {
  if (ds < emp.debut || ds > emp.fin) return 0;
  const d = new Date(ds + "T12:00");
  const dw = d.getDay(); // 0=Sun, 1=Mon, 6=Sat
  const m = d.getMonth() + 1;

  if (emp.id === "t1") { // MYRON – apprenti, dispo tous les jours sauf école
    // École périodes: 18-22 mai, 23 juin, 17-21 août → on exclut ces jours du prévisionnel
    const ecoleIntervals = [
      ["2026-05-18","2026-05-22"], ["2026-06-23","2026-06-23"],
      ["2026-08-17","2026-08-21"],
    ];
    for (const [s,e] of ecoleIntervals) { if (ds >= s && ds <= e) return 0; }
    return 1; // dispo
  }
  if (emp.id === "t2") { // AYTHANN – WE only Apr-May, full Jun-Jul, S1-S2 Aug, WE Sep-Nov
    if (m <= 5) return isWE ? 1 : 0;
    if (m <= 7) return 1;
    if (m === 8) return ds <= "2026-08-16" ? 1 : 0; // S1+S2 = until Aug 16
    return isWE ? 1 : 0; // Sep-Nov: WE only
  }
  if (emp.id === "t3") { // ALYSSA – MER + WE only, until Jun 21
    if (ds > "2026-06-21") return 0;
    return (dw === 3 || isWE) ? 1 : 0;
  }
  // JORIS – POEI en attente : on exclut aussi le 1-19 avril par précaution
  if (emp.id === "t4") {
    if (ds < "2026-04-20") return 0; // POEI probable, même logique que Florence
    return 1;
  }
  // FLORENCE – POEI validé : formation 1-19 avril, dispo à partir du 20 avril
  if (emp.id === "t5") {
    if (ds < "2026-04-20") return 0;
    return 1;
  }
}

// Average hours per day based on level and slot (spread across team positions)
// We use a fair split: in NORMAL: positions alternate ~7-8h each
const AVG_H_NORMAL = { wed:7.33, we:7.25, vacWD:7.33, vacWE:7.25 };

function forecastMonthHours(emp, month, year) {
  let h = 0;
  const days_in_month = new Date(year, month, 0).getDate();
  for (let day = 1; day <= days_in_month; day++) {
    const ds = `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    if (ds < SEASON_START || ds > SEASON_END) continue;
    const dayType = getDayType(ds);
    if (!dayType) continue;
    const d = new Date(ds + "T12:00");
    const dw = d.getDay();
    const isWE = dw === 0 || dw === 6;
    const avail = getEmpAvailability(emp, ds, dayType, isWE);
    if (!avail) continue;
    const sk = getSlotKey(ds, dayType, isWE);
    h += AVG_H_NORMAL[sk] || 7;
  }
  return Math.round(h * 10) / 10;
}

const OPEN_MONTH_NUMS = [4, 5, 6, 7, 8, 9, 10]; // Apr–Oct + Nov 1-2 treated as Oct

// ─── PLANNING PRÉVISIONNEL TAB ───────────────────────────────────────────────

function PlanningPrevTab({ team }) {
  const activeTeam = team.filter(e => e.actif);
  const YEAR = 2026;

  // Build forecast matrix: emp × month
  const matrix = activeTeam.map(emp => ({
    emp,
    months: OPEN_MONTH_NUMS.map(m => ({
      m,
      h: forecastMonthHours(emp, m, YEAR),
    })),
    get total() { return Math.round(this.months.reduce((s,x)=>s+x.h,0)*10)/10; },
  }));

  const colTotals = OPEN_MONTH_NUMS.map(m =>
    Math.round(matrix.reduce((s,row) => s + (row.months.find(x=>x.m===m)?.h||0), 0)*10)/10
  );

    activeTeam.forEach((emp, idx) => {
      lines.push(`  ${idx+1}. ${emp.prenom ? emp.prenom.toUpperCase() + " " : ""}${emp.nom}`);

    const matrix = activeTeam.map(emp => ({

    matrix.forEach(({emp, months, total}) => {

      lines.push(`  ${name}${mCols.join("")}${String(total+"h").padStart(8)}`);
    });

    lines.push("  " + "─".repeat(header.length));
    const colTotals = OPEN_MONTH_NUMS.map((_, i) =>

      lines.push(`  ${MOIS_FR[m].padEnd(12)} : ${String(h+"h").padStart(7)} — brut ${String(brutMois.toLocaleString("fr")+"€").padStart(8)} — chargé ~${String(charged.toLocaleString("fr")+"€").padStart(9)}`);
    });

    const totalBrut = Math.round(matrix.reduce((s,r) => s + r.total * r.emp.taux, 0));

    lines.push(sep2);

    lines.push(`    Vérifier si la convention IDCC 1790 fixe un taux supérieur avec le CFA.`);
    lines.push(`  ▸ Alyssa : solde de tout compte et CP à provisionner avant le 21 juin 2026.`);
    lines.push(`  ▸ 1er mai : seul jour férié majoré à 100% en IDCC 1790.`);
    lines.push(`  ▸ Heures modulables CDD : veiller à remettre le planning 3 semaines à l'avance`);
    lines.push(`    (Aythann septembre+, Joris, Florence, Nouveau C).`);
    lines.push("");

    lines.push("5. PÉRIODE DE FERMETURE (nov. 2026 – mars 2027)");
    lines.push(sep2);
    lines.push(`  Seul Myron reste en poste (contrat apprentissage jusqu'au 31/08/2026 — à renouveler).`);
    lines.push(`  NB : Si Myron passe en LP 2e année ou Licence professionnelle nouvelle saison :`);

    lines.push(`    (prêt 8 202,66 € + Myron ~1 207 € + frais fixes ~5 000 €)`);
    lines.push("");

    lines.push(sep);
    lines.push(`Document préparé pour transmission à l'expert-comptable — AbracadaParc ${YEAR}`);
    lines.push(`Vanessa Schweitzer, Gérante — ${today}`);
    lines.push(sep);

    setGenerated(lines.join("\n"));
  };

  const download = () => {
    const blob = new Blob([generated], { type:"text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);

  return (

function getMondayOf(d) {
  const base = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12, 0, 0);
  const dow = base.getDay();
  const back = dow === 0 ? 6 : dow - 1;
  const result = new Date(base.getTime() - back * 86400000);
  result.setHours(12, 0, 0, 0);
  return result;
}
function getMondayLocal() { return getMondayOf(new Date()); }
function addDaysLocal(d, n) {
  const result = new Date(d.getTime() + n * 86400000);
  result.setHours(12, 0, 0, 0);
  return result;
}
function fmtLocal(d) {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

// ═══════════════════════════════════════════════════════════
// SHA-256 PASSWORD HASH
// ═══════════════════════════════════════════════════════════

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

const ADMIN_HASH_KEY = "abr26_admin_hash";
const EMP_PINS_KEY   = "abr26_emp_pins";
const DEFAULT_PWD    = "Abracadaparc2026";
const DEFAULT_EMP_PIN = "1234";

async function initHash() {
  if (!localStorage.getItem(ADMIN_HASH_KEY)) {
    const h = await sha256(DEFAULT_PWD);
    localStorage.setItem(ADMIN_HASH_KEY, h);
  }
}
async function checkPwd(pwd) {
  const h = await sha256(pwd);
  return h === localStorage.getItem(ADMIN_HASH_KEY);
}
async function changePwd(newPwd) {
  const h = await sha256(newPwd);
  localStorage.setItem(ADMIN_HASH_KEY, h);
}

// Employee PINs — stored as {empId: sha256hash}
function getEmpPins() {
  try { return JSON.parse(localStorage.getItem(EMP_PINS_KEY)||"{}"); } catch { return {}; }
}
async function checkEmpPin(empId, pin) {
  const pins = getEmpPins();
  if (!pins[empId]) {
    // No PIN set → accept default PIN and auto-set it
    const defaultH = await sha256(DEFAULT_EMP_PIN);
    if (await sha256(pin) === defaultH) return true;
    return false;
  }
  const h = await sha256(pin);
  return h === pins[empId];
}
async function setEmpPin(empId, pin) {
  const pins = getEmpPins();
  pins[empId] = await sha256(pin);
  localStorage.setItem(EMP_PINS_KEY, JSON.stringify(pins));
}
async function resetEmpPin(empId) {
  const pins = getEmpPins();
  delete pins[empId]; // removes custom PIN → back to default "1234"
  localStorage.setItem(EMP_PINS_KEY, JSON.stringify(pins));
}

let db = null;
let fbRef = null;

function initFirebase(config) {
  try {
    if (!window.firebase) return false;
    if (!firebase.apps?.length) firebase.initializeApp(config);
    db = firebase.database();
    return true;
  } catch { return false; }
}

async function fbSet(path, data) {
  if (!db) return;
  try { await db.ref(path).set(data); } catch {}
}
function fbOn(path, cb) {
  if (!db) return () => {};
  const ref = db.ref(path);
  ref.on("value", snap => cb(snap.val()));
  return () => ref.off("value");
}

// ═══════════════════════════════════════════════════════════
// CP CALCULATIONS
// ═══════════════════════════════════════════════════════════

function calcCP(emp, shifts, season) {
  const start = emp.debut > season.start ? emp.debut : season.start;
  const end   = emp.fin   < season.end   ? emp.fin   : season.end;
  // ⚠️ CP légaux : acquis seulement après le mois TERMINÉ, pas sur les mois futurs
  const today = new Date();
  const lastCompletedMonth = `${today.getFullYear()}-${String(today.getMonth()).padStart(2,"0")}`;
  // today.getMonth() = mois actuel (0-based) → mois précédent = getMonth() sans +1

  const months = new Set();
  let pris = 0;
  Object.entries(shifts).forEach(([k, sh]) => {
    if (!k.startsWith(emp.id+"_")) return;
    const ds = k.replace(emp.id+"_","");
    if (ds < start || ds > end) return;
    const monthKey = ds.slice(0,7);
    // Compter seulement les mois TERMINÉS (pas le mois en cours ni futurs)
    if (monthKey <= lastCompletedMonth) {
      if (sh.type === "travail" || sh.type === "ecole") months.add(monthKey);
    }
    if (sh.type === "conges") pris++;
  });
  const acquis = Math.round(months.size * 2.5 * 10) / 10;
  const ajustement = Number(emp.cp_ajustement || 0);
  const total_pris = pris + ajustement;
  const restants = Math.round((acquis - total_pris) * 10) / 10;
  return { acquis, pris: total_pris, restants, pris_reel: pris, ajustement, deficit: restants < 0 };
}

// ═══════════════════════════════════════════════════════════
// HOURS ALERTS
// ═══════════════════════════════════════════════════════════

function calcMonthAlerts(team, shifts, year, month) {
  const alerts = [];
  const days = new Date(year, month, 0).getDate();
  team.filter(e=>e.actif).forEach(emp => {
    let worked=0, retards=0, totalRetardH=0;
    for (let i=1; i<=days; i++) {
      const ds=`${year}-${String(month).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
      const sh=shifts[`${emp.id}_${ds}`];
      if (sh?.type==="travail") worked += sh.h||0;
      if (sh?.type==="retard") { retards++; totalRetardH += sh.hRetard||0; }
    }
    const ratio = worked / emp.heures_mois;
    const nom = emp.prenom||emp.nom;
    if (ratio > 1.1) alerts.push({emp,type:"danger",
      msg:`${nom} : ${worked.toFixed(1)}h planifiées vs ${emp.heures_mois}h contrat (+${(worked-emp.heures_mois).toFixed(1)}h) — heures sup à valider`});
    else if (ratio > 0.95 && ratio <= 1.1 && worked > 0) alerts.push({emp,type:"warning",
      msg:`${nom} : ${worked.toFixed(1)}h planifiées — proche du contrat (${emp.heures_mois}h)`});
    // Retard alerts
    if (retards >= 3) alerts.push({emp,type:"danger",retards,totalRetardH,
      msg:`🚨 ${nom} : ${retards} retards ce mois (${totalRetardH.toFixed(1)}h perdues) — entretien recommandé`});
    else if (retards === 2) alerts.push({emp,type:"warning",retards,
      msg:`⚠️ ${nom} : 2 retards ce mois — à surveiller (3 = alerte disciplinaire)`});
  });
  return alerts;
}

// ═══════════════════════════════════════════════════════════
// AUTO-GENERATE DEFAULT SHIFTS
// ═══════════════════════════════════════════════════════════

function generateDefaultShifts(team) {
  const shifts = {};
  const g = id => team.find(e=>e.id===id); // get emp by id

  // Helper: assign shift (checks contract dates)
  const assign = (empId, ds, deb, fin, h) => {
    const e = g(empId);
    if (!e || !e.actif || ds < e.debut || ds > e.fin) return;
    shifts[`${empId}_${ds}`] = {type:"travail", deb, fin, h, note:""};
  };

  const POEI_END   = "2026-04-19"; // POEI ends Apr 19 (Florence & Joris dispo from Apr 20)
  const ALYSSA_END = "2026-06-21"; // Alyssa contract ends

  for (const {ds, dayType, isWE} of SEASON_DAYS) {
    const dow    = new Date(ds+"T12:00").getDay(); // 0=Sun,6=Sat
    const isSat  = dow === 6;
    const aythann = g("t2");

    if (dayType === "mercredi" || (dayType === "vacances" && !isWE)) {
      // ── MERCREDI + VACANCES SEMAINE ──
      // P1: MYRON 09:30-17:00 (7.0h)
      assign("t1", ds, "09:30", "17:00", 7.0);
      // P2: ALYSSA 09:30-18:30 (8.5h). After Alyssa leaves → FLORENCE 09:30-18:30
      if (ds <= ALYSSA_END) {
        assign("t3", ds, "09:30", "18:30", 8.5);
      } else {
        assign("t5", ds, "09:30", "18:30", 8.5); // Florence takes P2
      }
      // P3: 11:30-18:30 (6.5h). NOUVEAU C during POEI. FLORENCE after POEI (until Alyssa leaves). NOUVEAU C after.
      if (ds <= POEI_END) {
        assign("t6", ds, "11:30", "18:30", 6.5); // Nouveau C during POEI
      } else if (ds <= ALYSSA_END) {
        assign("t5", ds, "11:30", "18:30", 6.5); // Florence
      } else {
        assign("t6", ds, "11:30", "18:30", 6.5); // Nouveau C (Florence moved to P2)
      }

    } else if (dayType === "weekend" || (dayType === "vacances" && isWE)) {
      // ── WEEK-END ──
      if (isSat) {
        // SAMEDI — Avril : Myron soirée, Joris journée
        //           Mai+  : Joris soirée fermeture, Myron journée
        const MAI_START = "2026-05-01";
        if (ds >= "2026-04-20" && ds < MAI_START) {
          // AVRIL : Joris journée, Myron soirée
          assign("t4", ds, "09:30", "17:30", 7.5); // JORIS journée
          assign("t1", ds, "15:00", "22:30", 7.0); // MYRON soirée fermeture
        } else if (ds >= MAI_START) {
          // MAI → : Myron journée, Joris soirée fermeture
          assign("t1", ds, "09:30", "17:00", 7.0); // MYRON journée
          assign("t4", ds, "15:00", "22:30", 7.0); // JORIS soirée fermeture (anniversaires/escape)
          // Aythann soirée à partir de mai (13h-22h30) — non publié pour l'instant
          // assign("t2", ds, "13:00", "22:30", 9.0); // AYTHANN SOIR — à activer après communication
        }
        if (ds <= ALYSSA_END) assign("t3", ds, "09:30", "16:30", 6.5); // ALYSSA sam → 16h30
        if (ds < MAI_START && aythann && getEmpAvailability(aythann,ds,dayType,isWE)) assign("t2", ds, "11:30", "18:30", 6.5); // AYTHANN matin (avril)
        if (ds >= MAI_START && aythann && getEmpAvailability(aythann,ds,dayType,isWE)) assign("t2", ds, "11:30", "18:30", 6.5); // AYTHANN matin (mai+, soirée à décommenter quand prêt)
        if (ds >= "2026-04-20") assign("t5", ds, "11:30", "18:30", 6.5); // FLORENCE
      } else {
        // DIMANCHE
        if (ds >= "2026-04-20") assign("t4", ds, "09:30", "17:30", 7.5); // JORIS
        if (ds <= ALYSSA_END)  assign("t3", ds, "09:30", "17:30", 7.5); // ALYSSA dim → 17h30
        if (aythann && getEmpAvailability(aythann,ds,dayType,isWE)) assign("t2", ds, "11:30", "18:30", 6.5); // AYTHANN
        if (ds >= "2026-04-20") assign("t5", ds, "11:30", "18:30", 6.5); // FLORENCE
        assign("t1", ds, "09:30", "17:00", 7.0); // MYRON matin dimanche
      }
    }

    // Remaining in-contract employees on open days → repos
    const worked = new Set(Object.keys(shifts).filter(k=>k.endsWith("_"+ds)).map(k=>k.split("_")[0]));
    team.filter(e=>e.actif&&ds>=e.debut&&ds<=e.fin).forEach(e=>{
      if (!worked.has(e.id)) shifts[`${e.id}_${ds}`] = {type:"repos", note:""};
    });
  }

  // ── École Myron — CFA périodes ──
  const ECOLE_CFA = [["2026-05-18","2026-05-22"],["2026-06-23","2026-06-23"],["2026-08-17","2026-08-21"]];
  // ── École Myron — sorties / centres validés ──
  const ECOLE_SPECIFIC = [
    {ds:"2026-04-16", note:"Sortie école/centre"},
    {ds:"2026-05-22", note:"Sortie école/centre"},
    {ds:"2026-05-26", note:"Sortie école/centre"},
    {ds:"2026-05-27", note:"Sortie école/centre (remplace Travail ce jour)"},
    {ds:"2026-06-04", note:"Sortie école/centre"},
    {ds:"2026-06-19", note:"Sortie école/centre"},
  ];

  let d = new Date("2026-04-01T12:00"), endD = new Date("2026-08-31T12:00");
  while (d <= endD) {
    const ds = fmt(d);
    for (const [s,e] of ECOLE_CFA) {
      if (ds >= s && ds <= e) shifts[`t1_${ds}`] = {type:"ecole", note:"Formation CFA"};
    }
    for (const {ds:ecs, note} of ECOLE_SPECIFIC) {
      if (ds === ecs) shifts[`t1_${ds}`] = {type:"ecole", note};
    }
    d = addDays(d, 1);
  }

  // ── POEI Florence (t5) & Joris (t4) : 1–19 avril ──
  ["t4","t5"].forEach(id=>{
    let d2=new Date("2026-04-01T12:00");
    while(fmt(d2)<"2026-04-20"){shifts[`${id}_${fmt(d2)}`]={type:"poei",deb:"09:00",fin:"17:00",h:0,note:"POEI – Formation France Travail"};d2=addDays(d2,1);}
  });

  return shifts;
}

// Helper: effective hours for a shift (école = 7h, travail = actual h)
function shH(sh) {
  if (!sh) return 0;
  if (sh.type === "travail")    return sh.h || 0;
  if (sh.type === "ecole")      return 7.0;  // ✅ école = 7h, salaire maintenu
  if (sh.type === "soir")       return sh.h || 7.0; // créneau soir
  if (sh.type === "absent_inj") return 0;    // ❌ absent injustifié = 0h, déduit
  if (sh.type === "absent")     return 0;    // absence à justifier
  return 0;
}

  if (!document.getElementById("abr-print-css")) {
    const s=document.createElement("style"); s.id="abr-print-css"; s.textContent=PRINT_CSS;
    document.head.appendChild(s);
  }
}

function notifierEquipe(team, shifts, monday) {
  const safeMon = getMondayOf(monday);
  const dateDebut = safeMon.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"});
  const dateFin   = addDaysLocal(safeMon,6).toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});

  // Build per-employee summary
  const lines = [];
  const emailList = [];
  team.filter(e=>e.actif).forEach(emp => {
    if (emp.email) emailList.push(emp.email);
    const days = Array.from({length:7},(_,i)=>addDaysLocal(safeMon,i));
    const worked = days.filter(d=>{
      const ds=fmtLocal(d); if(ds<emp.debut||ds>emp.fin) return false;
      const sh=shifts[`${emp.id}_${ds}`];
      return sh&&sh.type==="travail";
    });
    if (worked.length===0) return;
    const empName = emp.prenom ? `${emp.prenom} ${emp.nom}` : emp.nom;
    lines.push(`${empName} :`);
    worked.forEach(d=>{
      const ds=fmtLocal(d); const sh=shifts[`${emp.id}_${ds}`];
      const dayLabel=d.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"});
      lines.push(`  ${dayLabel} : ${sh.deb} → ${sh.fin} (${Number(sh.h).toFixed(1)}h)`);
    });
    lines.push("");
  });

  const sujet = encodeURIComponent(`AbracadaParc — Planning semaine du ${dateDebut}`);
  const corps = encodeURIComponent(
`Bonjour,

Voici votre planning pour la semaine du ${dateDebut} au ${dateFin} :

${lines.join("\n")}
Pensez à vérifier votre planning complet sur : abracadaparc-rh.netlify.app

En cas de question, répondez à cet email.

Bonne semaine,
Vanessa Schweitzer
AbracadaParc — Goussainville (95)`
  );

  // Open Gmail with pre-filled email — each recipient gets their own email
  const emails = emailList.join(",");
  if (!emails) {
    alert("Aucun email renseigné dans les fiches salariés. Onglet Équipe → fiche de chaque salarié → champ Email.");
    return;
  }
  window.open(`mailto:${emails}?subject=${sujet}&body=${corps}`, "_blank");
}

  const rows=team.filter(e=>e.actif).map(emp=>{
    const cells=week.map(d=>{
      const ds=fmtLocal(d); const sh=shifts[`${emp.id}_${ds}`];
      if(ds<emp.debut||ds>emp.fin) return "<td style='color:#ccc'>—</td>";
      if(!sh) return "<td style='color:#ccc'>—</td>";
      const col=sh.type==="travail"?"#1B5E20":sh.type==="ecole"?"#0D47A1":sh.type==="conges"?"#E65100":sh.type==="malade"?"#6A1B9A":"#757575";

// ── PDF MONTH export ──────────────────────────────────────────────────────
function exportPDFMois(team, shifts, year, month) {
  injectPrintCSS();
  const days = new Date(year, month, 0).getDate();
  const MOIS_NOMS = ["","Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const dayNames = ["Di","Lu","Ma","Me","Je","Ve","Sa"];
  const season = {start:SEASON_START, end:SEASON_END};

  // Build weeks
  const firstDay = new Date(year, month-1, 1, 12);
  const firstMon = getMondayOf(firstDay);
  const weeks = Array.from({length:6},(_,i)=>({
    mon: addDaysLocal(firstMon, i*7),
    days: Array.from({length:7},(_,j)=>addDaysLocal(firstMon, i*7+j))
  })).filter(w=>w.days.some(d=>d.getMonth()===month-1));

  // Accept both full team array and single emp array — always ensure actif
  const activeTeam = team.filter(e=>e.actif !== false);

  const rows = activeTeam.map(emp => {
    const {acquis,pris,restants} = calcCP(emp,shifts,season);
    const weekRows = weeks.map(({mon:wm,days}) => {
      const wH = days.reduce((s,d)=>{if(d.getMonth()!==month-1)return s;const sh=shifts[`${emp.id}_${fmtLocal(d)}`];return s+(sh?.type==="travail"?(sh.h||0):0);},0);
      const cells = days.map(d=>{
        const ds=fmtLocal(d); const sh=shifts[`${emp.id}_${ds}`];
        const wrongM=d.getMonth()!==month-1; const hors=ds<emp.debut||ds>emp.fin;
        if (wrongM||hors) return `<td style="background:#f9f9f9;color:#ccc;font-size:8px">${d.getDate()}</td>`;
        if (!sh) return `<td><span style="color:#ccc;font-size:8px">${d.getDate()}</span></td>`;
        const st=STATUTS[sh.type]; const dow=d.getDay(); const isWE=dow===0||dow===6;
        const style=`color:${st.color};background:${st.bg};font-size:8px;border-radius:3px;padding:1px 3px`;
        const note=sh.note?`<br><i style="color:#888;font-size:7px">💬${sh.note.slice(0,20)}</i>`:"";
        return `<td style="text-align:center;${isWE?'background:#fff8f8':''}">
          <div style="font-size:8px;color:${isWE?'#BF360C':'#666'};font-weight:bold">${dayNames[dow]} ${d.getDate()}</div>
          <span style="${style}">${sh.type==="travail"?`${sh.deb}→${sh.fin}<br><b>${Number(sh.h).toFixed(1)}h</b>`:st.label}</span>${note}
        </td>`;
      }).join("");
      const semLabel=wm.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});
      return `<tr><td style="font-size:9px;color:#558B2F;white-space:nowrap;padding:3px 6px"><b>Sem ${semLabel}</b>${wH>0?`<br><b style="color:#1B5E20">${wH.toFixed(1)}h</b>`:""}</td>${cells}</tr>`;
    }).join("");
    return `<tr style="background:#e8f5e9"><td colspan="8" style="padding:4px 8px;font-weight:bold">${emp.prenom?emp.prenom+" ":""}<b>${emp.nom}</b> — ${emp.poste} — ${emp.heures_mois}h/mois — CP: ${acquis}acq/${pris}posés/${restants}restants</td></tr>${weekRows}`;
  }).join("");

  const monthH = activeTeam.map(emp=>{
    let h=0;for(let i=1;i<=days;i++){const ds=`${year}-${String(month).padStart(2,"0")}-${String(i).padStart(2,"0")}`;const sh=shifts[`${emp.id}_${ds}`];if(sh?.type==="travail")h+=sh.h||0;}
    return {emp,h};
  });

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Planning ${MOIS_NOMS[month]} ${year}</title>
  <style>body{font-family:sans-serif;font-size:9px;margin:1cm}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:2px 4px}th{background:#c8e6c9;font-size:9px}h2{font-size:13px;margin:0 0 6px}@media print{@page{size:A4 landscape;margin:1cm}}</style>
  </head><body>
  <h2>🌿 AbracadaParc — Planning ${MOIS_NOMS[month]} ${year}</h2>
  <table><thead><tr><th style="min-width:70px">Semaine</th><th>Lu</th><th>Ma</th><th>Me</th><th>Je</th><th>Ve</th><th style="background:#ffe8e8">Sa</th><th style="background:#ffe8e8">Di</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <p style="margin-top:6px;font-size:8px;color:#888">Imprimé le ${new Date().toLocaleDateString("fr-FR")} · IDCC 1790 · Pause 30min déduite</p>
  <script>window.onload=function(){window.print();}<\/script></body></html>`;
  // Use Blob URL — works on mobile, no popup blocker
  const blob = new Blob([html], {type:"text/html"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.target = "_blank"; a.rel = "noopener";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);}, 1000);
}

// ── EXPORT PAIE (service social / comptable, 5 du mois) ─────────────────────
function exportPaie(team, shifts, year, month) {
  const MOIS_NOMS = ["","Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const days = new Date(year, month, 0).getDate();
  const season = {start:SEASON_START, end:SEASON_END};
  const activeTeam = team.filter(e=>e.actif);

  const rows = activeTeam.map(emp => {
    let travailH=0, travailJ=0, reposJ=0, congesJ=0, absentJ=0, maladeJ=0, retardH=0;
    for (let i=1;i<=days;i++) {
      const ds=`${year}-${String(month).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
      if (ds<emp.debut||ds>emp.fin) continue;
      const sh=shifts[`${emp.id}_${ds}`];
      if (!sh) continue;
      if (sh.type==="travail") { travailH+=sh.h||0; travailJ++; }
      else if (sh.type==="repos") reposJ++;
      else if (sh.type==="conges") congesJ++;
      else if (sh.type==="absent") absentJ++;
      else if (sh.type==="malade") maladeJ++;
      else if (sh.type==="retard") retardH+=sh.hRetard||0;
    }
    const brut = Math.round(travailH * emp.taux * 100)/100;
    const {acquis,pris,restants} = calcCP(emp,shifts,season);
    const ddn = emp.ddn ? new Date(emp.ddn).toLocaleDateString("fr-FR") : "—";
    const inContract = emp.debut <= `${year}-${String(month).padStart(2,"0")}-01` && emp.fin >= `${year}-${String(month).padStart(2,"0")}-${String(days).padStart(2,"0")}`;
    const status = !inContract ? "Hors période" : "";
    return `<tr ${status?"style='background:#fff8e1'":""}>
      <td><b>${emp.prenom?emp.prenom+" ":""}</b>${emp.nom}</td>
      <td>${emp.ss||"<span style='color:red'>MANQUANT</span>"}</td>
      <td>${ddn}</td>
      <td>${emp.contrat}</td>
      <td style="text-align:center">${emp.taux.toFixed(2)} €</td>
      <td style="text-align:center">${emp.heures_mois}h</td>
      <td style="text-align:center;font-weight:bold;color:#1B5E20">${travailH.toFixed(2)}h</td>
      <td style="text-align:center">${travailJ}j</td>
      <td style="text-align:center;color:${congesJ>0?"#E65100":"#ccc"}">${congesJ}j</td>
      <td style="text-align:center;color:${maladeJ>0?"#6A1B9A":"#ccc"}">${maladeJ}j</td>
      <td style="text-align:center;color:${absentJ>0?"#B71C1C":"#ccc"}">${absentJ}j</td>
      <td style="text-align:center;color:${retardH>0?"#BF360C":"#ccc"}">${retardH>0?retardH+"h":"—"}</td>
      <td style="text-align:right;font-weight:bold;color:#1B5E20">${brut.toFixed(2)} €</td>
      <td style="text-align:center">${restants}j CP</td>
      <td>${emp.iban||"<span style='color:orange'>IBAN manquant</span>"}</td>
      <td style="font-size:9px;color:#888">${status}</td>
    </tr>`;
  }).join("");

  const totalBrut = activeTeam.reduce((s,emp)=>{
    let h=0;for(let i=1;i<=days;i++){const ds=`${year}-${String(month).padStart(2,"0")}-${String(i).padStart(2,"0")}`;const sh=shifts[`${emp.id}_${ds}`];if(sh?.type==="travail")h+=sh.h||0;}
    return s+h*emp.taux;
  },0);

  const htmlP = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Export Paie ${MOIS_NOMS[month]} ${year}</title>
  <style>body{font-family:sans-serif;font-size:10px;margin:1cm}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:4px 6px}th{background:#e8f5e9;font-weight:bold;font-size:9px}h2{font-size:13px;margin:0 0 6px}@media print{@page{size:A3 landscape;margin:1cm}}</style>
  </head><body>
  <h2>🌿 AbracadaParc — Export Paie ${MOIS_NOMS[month]} ${year} — À transmettre avant le 5 du mois</h2>
  <p style="font-size:9px;color:#888;margin-bottom:8px">SIREN : 979 489 929 · IDCC 1790 · Gérante : Vanessa Schweitzer</p>
  <table>
    <thead><tr>
      <th>Salarié·e</th><th>N° SS</th><th>Date naiss.</th><th>Contrat</th><th>Taux/h</th><th>H contrat</th><th>H travaillées</th><th>J travaillés</th><th>Congés</th><th>Maladie</th><th>Absent</th><th>Retards</th><th>Brut calculé</th><th>CP restants</th><th>IBAN virement</th><th>Note</th>
    </tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr style="background:#c8e6c9;font-weight:bold">
      <td colspan="12">TOTAL MASSE SALARIALE BRUTE</td><td style="text-align:right">${totalBrut.toFixed(2)} €</td><td colspan="3"></td>
    </tr></tfoot>
  </table>
  <p style="margin-top:8px;font-size:9px;color:#888">Document de travail — Bruts indicatifs hors CP, primes, charges</p>
  <script>window.onload=function(){window.print();}<\/script></body></html>`;
  const blobP = new Blob([htmlP], {type:"text/html"});
  const urlP = URL.createObjectURL(blobP);
  const aP = document.createElement("a");
  aP.href=urlP; aP.target="_blank"; aP.rel="noopener";
  document.body.appendChild(aP); aP.click();
  setTimeout(()=>{document.body.removeChild(aP);URL.revokeObjectURL(urlP);}, 1000);
}
