function CPTab({team,shifts}) {
  const season={start:SEASON_START,end:SEASON_END};
  const activeTeam=team.filter(e=>e.actif);
  return (
    <div>
      <div style={{...S.card,marginBottom:18,background:"#FFF8E1",border:"1px solid #FFD54F"}}>
        <div style={{fontSize:12,color:"#E65100",lineHeight:1.8}}>
          📋 <strong>Règle légale :</strong> 2,5 jours ouvrables acquis par mois de travail effectif (Code du travail, art. L.3141-3)<br/>
          ⚠️ <strong>Alyssa :</strong> contrat jusqu'au 21/06 — les CP restants doivent être posés avant la fin du contrat ou payés dans le solde de tout compte.
        </div>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr style={{background:"#F1F8E9",borderBottom:"2px solid #C8E6C9"}}>
              {["Salarié·e","Contrat","Mois travaillés","CP acquis","CP posés","CP restants","Statut"].map(h=>(
                <th key={h} style={{padding:"10px 12px",fontSize:11,textAlign:"left",color:"#558B2F",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.04em",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {activeTeam.map(emp=>{
              const {acquis,pris,restants}=calcCP(emp,shifts,season);
              const months=new Set();
              Object.entries(shifts).forEach(([k,sh])=>{if(k.startsWith(emp.id+"_")&&sh.type==="travail")months.add(k.replace(emp.id+"_","").slice(0,7));});
              const status=restants===0?"ok":restants<3?"warn":"info";
              const statusColor=status==="ok"?"#1B5E20":status==="warn"?"#E65100":"#1565C0";
              const statusBg=status==="ok"?"#E8F5E9":status==="warn"?"#FFF8E1":"#E3F2FD";
              const statusMsg=status==="ok"?"✅ Soldé":status==="warn"?`⚠️ À poser avant fin contrat`:`${restants}j à planifier`;
              return (
                <tr key={emp.id} style={{borderBottom:"1px solid #F1F8E9"}}>
                  <td style={{padding:"11px 12px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:emp.color}}/>
                      <span style={{fontWeight:700,fontSize:13}}>{emp.prenom?`${emp.prenom} `:""}{emp.nom}</span>
                    </div>
                  </td>
                  <td style={{padding:"11px 12px",fontSize:11,color:"#757575"}}>{fmtFR(emp.debut)} → {fmtFR(emp.fin)}</td>
                  <td style={{padding:"11px 12px",textAlign:"center",fontWeight:600,color:"#424242"}}>{months.size}</td>
                  <td style={{padding:"11px 12px",textAlign:"center",fontWeight:700,color:"#1B5E20",fontSize:14}}>{acquis}j</td>
                  <td style={{padding:"11px 12px",textAlign:"center",fontWeight:600,color:"#E65100"}}>{pris}j</td>
                  <td style={{padding:"11px 12px",textAlign:"center"}}>
                    <span style={{padding:"4px 12px",borderRadius:20,fontSize:13,fontWeight:800,background:statusBg,color:statusColor}}>{restants}j</span>
                  </td>
                  <td style={{padding:"11px 12px"}}>
                    <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:statusBg,color:statusColor}}>{statusMsg}</span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function PlanningEquipeTab({team,shifts,setShifts,readonly}) {
  const [monday,setMonday]=useState(getMondayLocal);

  const [editing,setEditing]=useState(null);
  const [dupTarget,setDupTarget]=useState(null);

  const safeMon=getMondayOf(monday); // toujours normaliser au lundi réel
  const week=Array.from({length:7},(_,i)=>addDaysLocal(safeMon,i));
  const todayStr=fmtLocal(new Date());
  const activeTeam=team.filter(e=>e.actif);
  const displayTeam=filterEmp==="equipe"?activeTeam:activeTeam.filter(e=>e.id===filterEmp);

  const getShift=(eid,ds)=>shifts[`${eid}_${ds}`];
  const putShift=(eid,ds,data)=>{if(readonly)return;setShifts(p=>{const n={...p};data===null?delete n[`${eid}_${ds}`]:(n[`${eid}_${ds}`]=data);return n;});};
  const weekH=eid=>week.reduce((s,d)=>{return s+shH(getShift(eid,fmtLocal(d)));},0);
  const dayH=d=>displayTeam.reduce((s,e)=>{const sh=getShift(e.id,fmtLocal(d));return s+(sh?.type==="travail"?(sh.h||0):0);},0);
  const weekLabel=()=>{const a=safeMon.toLocaleDateString("fr-FR",{day:"2-digit",month:"long"});const b=addDaysLocal(safeMon,6).toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});return `${a} → ${b}`;};
  const dtColor={mercredi:"#1565C0",weekend:"#BF360C",vacances:"#2E7D32"};
  const dtLabel={mercredi:"MER",weekend:"WE",vacances:"VAC"};
  const dayNames=["Di","Lu","Ma","Me","Je","Ve","Sa"];

  const applyDup=target=>{const updates={};for(let i=0;i<7;i++){const s=fmtLocal(addDaysLocal(monday,i)),t=fmtLocal(addDaysLocal(target,i));activeTeam.forEach(emp=>{const sh=shifts[`${emp.id}_${s}`];if(sh)updates[`${emp.id}_${t}`]={...sh};});}setShifts(p=>({...p,...updates}));setDupTarget(null);};

  const monthView=()=>{
    const m=monday.getMonth(),y=monday.getFullYear();

    const weeks=Array.from({length:6},(_,i)=>({mon:addDaysLocal(firstMon,i*7),days:Array.from({length:7},(_,j)=>addDaysLocal(firstMon,i*7+j))})).filter(w=>w.days.some(d=>d.getMonth()===m));
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <button onClick={()=>setMonday(new Date(monday.getFullYear(),monday.getMonth()-1,15,12))} style={{...S.btn,...S.btnS,padding:"6px 14px"}}>←</button>
          <span style={{fontSize:15,fontWeight:700,color:"#2E7D32",flex:1}}>{monday.toLocaleDateString("fr-FR",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase())}</span>
          <button onClick={()=>setMonday(new Date(monday.getFullYear(),monday.getMonth()+1,15,12))} style={{...S.btn,...S.btnS,padding:"6px 14px"}}>→</button>
          <button onClick={()=>setMonday(getMondayLocal())} style={{...S.btn,background:"#DCEDC8",color:"#33691E",border:"none"}}>Ce mois</button>
          {!readonly&&<button onClick={()=>exportPDFMois(team,shifts,monday.getFullYear(),monday.getMonth()+1)} style={{...S.btn,background:"#E8F5E9",color:"#1B5E20",border:"none",fontSize:11}} className="no-print">🖨️ PDF ce mois</button>}
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"separate",borderSpacing:"0 3px",width:"100%",minWidth:500}}>
            <thead><tr>
              <th style={{padding:"6px 8px",textAlign:"left",fontSize:11,color:"#9E9E9E",fontWeight:500,minWidth:110}}>Salarié·e</th>

              {displayTeam.map(emp=>{
                const weekTotals=weeks.map(({days})=>days.reduce((s,d)=>{if(d.getMonth()!==m)return s;return s+shH(getShift(emp.id,fmtLocal(d)));},0));
                const monthTotal=weekTotals.reduce((s,h)=>s+h,0);
                return (<tr key={emp.id} style={{background:"#fff"}}>

                    </div>
                  </td>
                </tr>);
              })}
            </tbody>
          </table>
        </div>
      </div>
    );

            {displayTeam.map(emp=>(
              <tr key={emp.id}>
                <td style={{padding:"3px 6px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{width:9,height:9,borderRadius:"50%",background:emp.color,flexShrink:0}}/>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:"#212121"}}>{emp.prenom?emp.prenom.split(" ")[0]:emp.nom}</div>
                      <div style={{fontSize:9,color:"#AAAAAA"}}>{emp.type==="apprenti"?"App.":emp.heures_mois+"h"}</div>
                    </div>
                  </div>
                </td>
                {week.map((d,i)=>{
                  const ds=fmtLocal(d);const sh=getShift(emp.id,ds);const st=sh?STATUTS[sh.type]:null;
                  const effD=(emp.poei_debut&&emp.poei_debut<emp.debut)?emp.poei_debut:emp.debut;const hors=ds<effD||ds>emp.fin;const isOuvert=!!getDayType(ds);const is1Mai=ds==="2026-05-01";
                  return <td key={i} style={{padding:2,verticalAlign:"top"}}>
                    {hors?(<div style={{minHeight:52,borderRadius:7,background:"#FAFAFA",border:"1px dashed #EEEEEE",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,color:"#E0E0E0"}}>—</span></div>):(
                      <div onClick={()=>!readonly&&setEditing({empId:emp.id,date:ds})}
                        style={{minHeight:52,padding:"4px 3px",cursor:readonly?"default":"pointer",borderRadius:7,background:st?st.bg:isOuvert?"#F9FBE7":"#FAFAFA",border:`1.5px solid ${st?st.border:isOuvert?"#EDF5C2":"#EEEEEE"}`,position:"relative",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}
                        onMouseEnter={e=>!readonly&&(e.currentTarget.style.filter="brightness(0.94)")}
                        onMouseLeave={e=>e.currentTarget.style.filter=""}>
                        {is1Mai&&<span style={{position:"absolute",top:2,right:2,fontSize:7,background:"#E53935",color:"#fff",padding:"0 3px",borderRadius:5,fontWeight:700}}>×2</span>}
                        {sh&&sh.note&&<span style={{position:"absolute",top:2,left:3,fontSize:9}}>💬</span>}
                        {sh?(<>
                          <span style={{fontSize:10,fontWeight:700,color:st.color,lineHeight:1.2}}>{st.label}</span>
                          {sh.type==="travail"&&sh.deb&&<span style={{fontSize:9,color:st.color}}>{sh.deb}–{sh.fin}</span>}
                          {sh.type==="travail"&&sh.h>0&&<span style={{fontSize:11,fontWeight:800,color:st.color}}>{Number(sh.h).toFixed(1)}h</span>}
                          {sh.type==="retard"&&sh.hRetard>0&&<span style={{fontSize:9,color:st.color}}>-{sh.hRetard}h</span>}
                        </>):(<span style={{color:"#CCCCCC",fontSize:readonly?11:18}}>{readonly?"—":"+"}</span>)}
                      </div>
                    )}
                  </td>;
                })}
                <td style={{padding:"3px 6px",textAlign:"center",verticalAlign:"middle"}}>
                  <span style={{padding:"3px 8px",borderRadius:20,fontSize:12,fontWeight:700,background:weekH(emp.id)>0?"#E8F5E9":"#F5F5F5",color:weekH(emp.id)>0?"#1B5E20":"#CCCCCC"}}>{weekH(emp.id).toFixed(1)}h</span>
                </td>
                <td style={{padding:"3px 6px",textAlign:"center",verticalAlign:"middle"}}>
                  {(()=>{
                  // Proportional delta: only count contract days in this week
                  const contractDays = week.filter(d=>{const ds=fmtLocal(d);return ds>=emp.debut&&ds<=emp.fin&&getDayType(ds)!==null||ds>=emp.debut&&ds<=emp.fin}).length;
                  const openDays = week.filter(d=>{const ds=fmtLocal(d);return ds>=emp.debut&&ds<=emp.fin&&getDayType(ds)}).length;
                  if(openDays===0&&weekH(emp.id)===0) return null;
                  // Theoretical hours = (heures_mois / 30) * contract days in week
                  const dailyH = emp.heures_mois / 30;
                  const contractDaysInWeek = week.filter(d=>{const ds=fmtLocal(d);return ds>=emp.debut&&ds<=emp.fin;}).length;
                  const theo = dailyH * contractDaysInWeek;
                  const delta = weekH(emp.id) - theo;
                  const pos = delta >= 0;
                  return <span title={`Théorique: ${theo.toFixed(1)}h (${contractDaysInWeek}j × ${dailyH.toFixed(1)}h/j)`} style={{padding:"3px 7px",borderRadius:20,fontSize:11,fontWeight:700,background:pos?"#E8F5E9":"#FFEBEE",color:pos?"#1B5E20":"#C62828",cursor:"help"}}>{pos?"+":""}{delta.toFixed(1)}h</span>;
                })()}
                </td>
              </tr>
            ))}
          </tbody>
          <tfoot><tr>
            <td style={{padding:"6px 8px",fontSize:11,color:"#9E9E9E",fontWeight:600}}>TOTAL/JOUR</td>
            {week.map((d,i)=>{const tot=dayH(d);return <td key={i} style={{padding:"3px 4px",textAlign:"center"}}><span style={{fontSize:11,fontWeight:700,color:tot>0?"#2E7D32":"#E0E0E0"}}>{tot>0?`${tot.toFixed(1)}h`:"—"}</span></td>;})}
            <td colSpan={2}/>
          </tr></tfoot>
        </table>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14,alignItems:"center"}}>
        <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #C8E6C9"}}>
          {[["semaine","Semaine"],["mois","Mois"]].map(([k,l])=>(
            <button key={k} onClick={()=>setViewMode(k)} style={{padding:"6px 16px",border:"none",cursor:"pointer",fontSize:12,fontFamily:"inherit",background:viewMode===k?"#2E7D32":"#fff",color:viewMode===k?"#fff":"#558B2F",fontWeight:viewMode===k?700:400}}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <button onClick={()=>setFilterEmp("equipe")} style={{...S.btn,padding:"5px 12px",fontSize:11,background:filterEmp==="equipe"?"#2E7D32":"#F1F8E9",color:filterEmp==="equipe"?"#fff":"#2E7D32",border:filterEmp==="equipe"?"none":"1px solid #C8E6C9"}}>👥 Équipe</button>
          {activeTeam.map(e=><button key={e.id} onClick={()=>setFilterEmp(e.id)} style={{...S.btn,padding:"5px 12px",fontSize:11,background:filterEmp===e.id?e.color:"#F5F5F5",color:filterEmp===e.id?"#fff":"#424242",border:"none"}}>{e.prenom?e.prenom.split(" ")[0]:e.nom.split(" ")[0]}</button>)}
        </div>
        {!readonly&&<span style={{fontSize:10,color:"#AAAAAA",marginLeft:"auto"}}>Cliquez · 💬 note · 🖨️ PDF</span>}
      </div>

      {viewMode==="semaine"?weekView():monthView()}

      <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap",alignItems:"center"}}>
        {Object.entries(STATUTS).map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:10,height:10,borderRadius:3,background:v.bg,border:`1px solid ${v.border}`,display:"inline-block"}}/>
            <span style={{fontSize:11,color:"#757575"}}>{v.label}</span>
          </div>
        ))}
        <span style={{fontSize:10,color:"#AAAAAA",marginLeft:"auto"}}>Pause 30min déduite automatiquement</span>
      </div>

      {dupTarget&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#fff",borderRadius:16,padding:"24px 28px",maxWidth:380,width:"100%"}}>
            <div style={{fontSize:15,fontWeight:800,color:"#1B5E20",marginBottom:10}}>📋 Dupliquer la semaine</div>
            <div style={{fontSize:13,color:"#424242",marginBottom:14,lineHeight:1.7}}>
              Copier <strong>{weekLabel()}</strong> vers :<br/>
              <strong style={{color:"#1565C0"}}>{addDaysLocal(dupTarget,0).toLocaleDateString("fr-FR",{day:"2-digit",month:"long"})} → {addDaysLocal(dupTarget,6).toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"})}</strong>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <button onClick={()=>setDupTarget(addDaysLocal(monday,7))} style={{...S.btn,...S.btnS,flex:1,fontSize:12}}>→ +1 semaine</button>
              <button onClick={()=>setDupTarget(addDaysLocal(monday,14))} style={{...S.btn,...S.btnS,flex:1,fontSize:12}}>→ +2 semaines</button>
              <button onClick={()=>setDupTarget(addDaysLocal(monday,21))} style={{...S.btn,...S.btnS,flex:1,fontSize:12}}>→ +3 semaines</button>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>applyDup(dupTarget)} style={{...S.btn,...S.btnG,flex:1}}>✅ Dupliquer</button>
              <button onClick={()=>setDupTarget(null)} style={{...S.btn,...S.btnS}}>Annuler</button>
            </div>
          </div>
        </div>
      )}

      {editing&&(()=>{const emp=team.find(e=>e.id===editing.empId);const sh=getShift(editing.empId,editing.date);return <ShiftModal emp={emp} date={editing.date} shift={sh} onSave={data=>{putShift(editing.empId,editing.date,data);setEditing(null);}} onClose={()=>setEditing(null)}/>;})()}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MON PLANNING (salarié)
// ═══════════════════════════════════════════════════════════

function MonPlanningTab({emp,shifts,setShifts}) {
  const [monday,setMonday]=useState(getMondayLocal);
  const [viewMode,setViewMode]=useState("mois");
  const [commenting,setCommenting]=useState(null);
  const safeMon=getMondayOf(monday); // normaliser au lundi
  const week=Array.from({length:7},(_,i)=>addDaysLocal(safeMon,i));
  const todayStr=fmtLocal(new Date());
  const m=monday.getMonth(),y=monday.getFullYear();
  const dayNames=["Di","Lu","Ma","Me","Je","Ve","Sa"];

  const weekH=week.reduce((s,d)=>{const sh=shifts[`${emp.id}_${fmtLocal(d)}`];return s+(sh?.type==="travail"?(sh.h||0):0);},0);
  const monthH=(()=>{const days=new Date(y,m+1,0).getDate();let h=0;for(let i=1;i<=days;i++){const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;h+=shH(shifts[`${emp.id}_${ds}`]);}return h;})();
  const {acquis,pris,restants}=calcCP(emp,shifts,{start:SEASON_START,end:SEASON_END});
  const saveComment=(ds,data)=>{setShifts(p=>({...p,[`${emp.id}_${ds}`]:data}));setCommenting(null);};

  const weekLabel=()=>{const a=safeMon.toLocaleDateString("fr-FR",{day:"2-digit",month:"long"});const b=addDaysLocal(safeMon,6).toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});return `${a} → ${b}`;};

  const monthView=()=>{
    const firstMon=getMondayOf(new Date(y,m,1,12));
    const weeks=Array.from({length:6},(_,i)=>({mon:addDaysLocal(firstMon,i*7),days:Array.from({length:7},(_,j)=>addDaysLocal(firstMon,i*7+j))})).filter(w=>w.days.some(d=>d.getMonth()===m));
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <button onClick={()=>setMonday(new Date(monday.getFullYear(),monday.getMonth()-1,15,12))} style={{...S.btn,...S.btnS,padding:"6px 14px"}}>←</button>
          <span style={{fontSize:15,fontWeight:700,color:"#2E7D32",flex:1}}>{monday.toLocaleDateString("fr-FR",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase())}</span>
          <button onClick={()=>setMonday(new Date(monday.getFullYear(),monday.getMonth()+1,15,12))} style={{...S.btn,...S.btnS,padding:"6px 14px"}}>→</button>
          <button onClick={()=>setMonday(getMondayLocal())} style={{...S.btn,background:"#DCEDC8",color:"#33691E",border:"none"}}>Mois actuel</button>
          <button onClick={()=>exportPDFMois([emp],shifts,monday.getFullYear(),monday.getMonth()+1)} style={{...S.btn,background:"#F3E5F5",color:"#6A1B9A",border:"none",fontSize:11}}>🖨️ PDF mon planning</button>
        </div>
        {weeks.map(({mon:wm,days},wi)=>{
          const wH=days.reduce((s,d)=>{if(d.getMonth()!==m)return s;return s+shH(shifts[`${emp.id}_${fmtLocal(d)}`]);},0);
          const theo=emp.heures_mois/4.33,delta=wH-theo;
          return (<div key={wi} style={{...S.card,marginBottom:8,padding:"10px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,fontWeight:700,color:"#558B2F"}}>Sem. {wm.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})} → {addDaysLocal(wm,6).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})}</span>
                {days.some(d=>d.getMonth()!==m)&&<span style={{fontSize:10,color:"#AAAAAA"}}>({days.filter(d=>d.getMonth()===m).length}j ce mois)</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {wH>0&&<span style={{fontWeight:800,color:"#1B5E20",fontSize:13}}>{wH.toFixed(1)}h</span>}
                {(()=>{
                    const contractDaysInWeek = days.filter(d=>fmtLocal(d)>=emp.debut&&fmtLocal(d)<=emp.fin).length;
                    if(contractDaysInWeek===0) return null;
                    const theoW = (emp.heures_mois/30)*contractDaysInWeek;
                    const deltaW = wH - theoW;
                    const pos = deltaW>=0;
                    return wH>0?<span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,background:pos?"#E8F5E9":"#FFEBEE",color:pos?"#1B5E20":"#C62828"}}>{pos?"+":""}{deltaW.toFixed(1)}h</span>:null;
                  })()}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
              {days.map((d,di)=>{
                const ds=fmtLocal(d);const sh=shifts[`${emp.id}_${ds}`];const st=sh?STATUTS[sh.type]:null;
                const isToday=ds===todayStr;const dow=d.getDay();const isWE=dow===0||dow===6;
                const isOuvert=!!getDayType(ds);const effD3=(emp.poei_debut&&emp.poei_debut<emp.debut)?emp.poei_debut:emp.debut;const hors=ds<effD3||ds>emp.fin;const wrongMonth=d.getMonth()!==m;
                return (<div key={di} onClick={()=>!hors&&!wrongMonth&&setCommenting({empId:emp.id,date:ds})}
                  style={{borderRadius:8,padding:"5px 3px",textAlign:"center",cursor:!hors&&!wrongMonth?"pointer":"default",
                    background:hors||wrongMonth?"#FAFAFA":st?st.bg:isToday?"#FFFDE7":isOuvert?"#F9FBF9":"#F5F5F5",
                    border:`1.5px solid ${isToday?"#DCE775":st?st.border:"#EEEEEE"}`,opacity:wrongMonth?0.25:1}}
                  onMouseEnter={e=>!hors&&!wrongMonth&&(e.currentTarget.style.filter="brightness(0.95)")}
                  onMouseLeave={e=>e.currentTarget.style.filter=""}>
                  <div style={{fontSize:9,fontWeight:600,color:isWE?"#BF360C":"#9E9E9E"}}>{dayNames[dow]}</div>
                  <div style={{fontSize:9,color:"#AAAAAA"}}>{d.getDate()}</div>
                  {!hors&&sh?(<>
                    <div style={{fontSize:9,fontWeight:700,color:st.color,marginTop:1,lineHeight:1.1}}>{st.label.slice(0,3)}</div>
                    {sh.type==="travail"&&sh.h>0&&<div style={{fontSize:10,fontWeight:800,color:st.color}}>{Number(sh.h).toFixed(1)}h</div>}
                    {sh.type==="travail"&&sh.deb&&<div style={{fontSize:8,color:st.color,lineHeight:1.2}}>{sh.deb}<br/>→{sh.fin}</div>}
                    {sh.note&&<div style={{fontSize:9,color:"#9E9E9E",marginTop:1}}>💬</div>}
                  </>):!hors&&isOuvert?<div style={{fontSize:8,color:"#CCCCCC",marginTop:2}}>—</div>:null}
                </div>);
              })}
            </div>
          </div>);
        })}
      </div>
    );
  };

  const weekView=()=>(
    <div>
      <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center"}}>
        <button onClick={()=>setMonday(addDaysLocal(safeMon,-7))} style={{...S.btn,...S.btnS,padding:"6px 14px"}}>←</button>
        <span style={{fontSize:13,fontWeight:700,color:"#2E7D32",flex:1}}>{weekLabel()}</span>
        <button onClick={()=>setMonday(addDaysLocal(safeMon,7))} style={{...S.btn,...S.btnS,padding:"6px 14px"}}>→</button>
        <button onClick={()=>setMonday(getMondayLocal())} style={{...S.btn,background:"#DCEDC8",color:"#33691E",border:"none"}}>Aujourd'hui</button>
          <button onClick={()=>exportPDF([emp],shifts,safeMon)} style={{...S.btn,background:"#F3E5F5",color:"#6A1B9A",border:"none",fontSize:11}}>🖨️ PDF semaine</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
        {week.map((d,i)=>{
          const ds=fmtLocal(d);const isToday=ds===todayStr;const sh=shifts[`${emp.id}_${ds}`];const st=sh?STATUTS[sh.type]:null;
          const hors=ds<emp.debut||ds>emp.fin;const dt=getDayType(ds);const dow=d.getDay();const isWE=dow===0||dow===6;
          return (<div key={i} onClick={()=>!hors&&setCommenting({empId:emp.id,date:ds})}
            style={{borderRadius:10,padding:"10px 6px",textAlign:"center",minHeight:110,cursor:hors?"default":"pointer",
              background:hors?"#FAFAFA":st?st.bg:isToday?"#FFFDE7":dt?"#F9FBF9":"#F5F5F5",
              border:`1.5px solid ${isToday?"#DCE775":st?st.border:"#EEEEEE"}`}}
            onMouseEnter={e=>!hors&&(e.currentTarget.style.filter="brightness(0.95)")}
            onMouseLeave={e=>e.currentTarget.style.filter=""}>
            <div style={{fontSize:12,fontWeight:700,color:isToday?"#2E7D32":isWE?"#BF360C":"#616161"}}>{dayNames[dow]}</div>
            <div style={{fontSize:10,color:"#9E9E9E",marginBottom:8}}>{fmtFR2(ds)}</div>
            {hors?<div style={{fontSize:10,color:"#E0E0E0"}}>—</div>:sh?(<>
              <div style={{fontSize:12,fontWeight:700,color:st.color,marginBottom:4}}>{st.label}</div>
              {sh.type==="travail"&&sh.deb&&<div style={{fontSize:11,color:st.color}}>{sh.deb}<br/>→{sh.fin}</div>}
              {sh.type==="travail"&&sh.h>0&&<div style={{fontSize:14,fontWeight:800,color:st.color,marginTop:4}}>{Number(sh.h).toFixed(1)}h</div>}
              {sh.note&&<div style={{fontSize:10,color:"#9E9E9E",marginTop:4,lineHeight:1.3}}>💬 {sh.note.slice(0,25)}{sh.note.length>25?"…":""}</div>}
            </>):<div style={{fontSize:10,color:"#CCCCCC"}}>{dt?"Non planifié":"Fermé"}</div>}
          </div>);
        })}
      </div>
    </div>
  );

  return (
    <div>
      <div style={{...S.card,marginBottom:14,background:"#F1F8E9",border:"1px solid #A5D6A7",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:42,height:42,borderRadius:"50%",background:emp.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:18,flexShrink:0}}>{(emp.prenom||emp.nom).charAt(0)}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:800,color:"#1B5E20"}}>{emp.prenom?`${emp.prenom} ${emp.nom}`:emp.nom}</div>
          <div style={{fontSize:11,color:"#558B2F"}}>{emp.poste}</div>
          <div style={{fontSize:10,color:"#9E9E9E",marginTop:2}}>{fmtFR(emp.debut)} → {fmtFR(emp.fin)} · {emp.heures_mois}h/mois</div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:20,fontWeight:800,color:"#1B5E20"}}>{weekH.toFixed(1)}h</div>
          <div style={{fontSize:10,color:"#9E9E9E"}}>cette semaine</div>
          <div style={{fontSize:12,fontWeight:700,color:"#558B2F"}}>{monthH.toFixed(1)}h ce mois</div>
        </div>
      </div>

      {/* Planning mis à jour banner */}
      {(()=>{
        const updated = localStorage.getItem("abr26_planning_updated");
        const seen    = localStorage.getItem(`abr26_seen_${emp.id}`);
        const hasNew  = updated && (!seen || Number(updated) > Number(seen));
        if (!hasNew) return null;
        return (
          <div style={{...S.card,marginBottom:14,background:"#FFEBEE",border:"2px solid #EF9A9A",display:"flex",alignItems:"center",gap:12,padding:"12px 16px",cursor:"pointer"}}
            onClick={()=>localStorage.setItem(`abr26_seen_${emp.id}`, Date.now().toString())}>
            <span style={{fontSize:24,flexShrink:0}}>🔔</span>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:800,color:"#C62828"}}>Planning mis à jour !</div>
              <div style={{fontSize:12,color:"#E53935",marginTop:2}}>Vérifiez vos horaires — {new Date(Number(updated)).toLocaleDateString("fr-FR",{day:"2-digit",month:"long",hour:"2-digit",minute:"2-digit"})}</div>
            </div>
            <span style={{fontSize:11,color:"#EF9A9A"}}>Appuyez pour marquer comme lu ✓</span>
          </div>
        );
      })()}

      {/* CP acquis */}
      <div style={{...S.card,marginBottom:14,background:"#FFF8E1",border:"1px solid #FFD54F",display:"flex",gap:16,flexWrap:"wrap",alignItems:"center",padding:"10px 16px"}}>
        <span style={{fontSize:13,fontWeight:700,color:"#E65100"}}>🌴 Congés payés</span>
        {[["Acquis",acquis,"#1B5E20"],["Posés",pris,"#E65100"],["Restants",restants,restants>0?"#1565C0":"#9E9E9E"]].map(([l,v,c])=>(
          <div key={l} style={{textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:800,color:c}}>{v}j</div>
            <div style={{fontSize:10,color:"#9E9E9E"}}>{l}</div>
          </div>
        ))}
        {restants>0&&<span style={{fontSize:11,color:"#1565C0",fontWeight:600,marginLeft:4}}>→ à poser avant le {fmtFR(emp.fin)}</span>}
      </div>

      <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #C8E6C9",marginBottom:14,width:"fit-content"}}>
        {[["mois","Mois"],["semaine","Semaine"]].map(([k,l])=>(

        ))}
      </div>

        {Object.entries(STATUTS).filter(([k])=>k!=="retard").map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:10,height:10,borderRadius:3,background:v.bg,border:`1px solid ${v.border}`,display:"inline-block"}}/>

        ))}

      </div>

      {commenting&&(()=>{const sh=shifts[`${commenting.empId}_${commenting.date}`];return <CommentModal emp={emp} date={commenting.date} shift={sh} onSave={data=>saveComment(commenting.date,data)} onClose={()=>setCommenting(null)}/>;})()}
    </div>
  );
}

// SYSTÈME DE POINTAGE

function PointageTab({emp, shifts, setShifts, isAdmin=false}) {
  const today = fmtLocal(new Date());
  const now = new Date();
  const timeNow = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  const sh = shifts[`${emp.id}_${today}`];
  const isOuvert = !!getDayType(today);
  const hors = today < emp.debut || today > emp.fin;

  // Geolocation state
  const [geoStatus, setGeoStatus] = useState("idle"); // idle|checking|ok|denied|far|error
  const [geoMsg,    setGeoMsg]    = useState("");
  const [geoCoords, setGeoCoords] = useState(null);

  // AbracadaParc coordinates (Goussainville 95190)
  const PARC_LAT = 49.01265, PARC_LNG = 2.46468, PARC_RADIUS = 1200; // AbracadaParc — Place Hyacinthe Drujon 95190 Goussainville (coords vérifiées OpenStreetMap)

  const haversine = (lat1,lng1,lat2,lng2) => {
    const R=6371000, phi1=lat1*Math.PI/180, phi2=lat2*Math.PI/180;
    const dphi=(lat2-lat1)*Math.PI/180, dlng=(lng2-lng1)*Math.PI/180;
    const a=Math.sin(dphi/2)**2+Math.cos(phi1)*Math.cos(phi2)*Math.sin(dlng/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  };

  const checkGeo = () => new Promise((resolve) => {
    if (!navigator.geolocation) { setGeoStatus("error"); setGeoMsg("GPS non disponible sur cet appareil"); resolve(false); return; }
    setGeoStatus("checking"); setGeoMsg("Vérification de votre position…");
    navigator.geolocation.getCurrentPosition(
      pos => {
        const {latitude:lat, longitude:lng, accuracy} = pos.coords;
        setGeoCoords({lat,lng,accuracy});
        const dist = haversine(lat,lng,PARC_LAT,PARC_LNG);
        if (dist <= PARC_RADIUS + Math.min(accuracy, 200)) { // Tolérance GPS mobile élargie
          setGeoStatus("ok");
          setGeoMsg(`✅ Position confirmée (${Math.round(dist)}m du parc)`);
          resolve(true);
        } else {
          setGeoStatus("far");
          setGeoMsg(`❌ Vous êtes à ${Math.round(dist/1000*10)/10}km du parc — pointage impossible à distance`);
          resolve(false);
        }
      },
      err => {
        setGeoStatus("denied");
        setGeoMsg("❌ Accès GPS refusé — autorisez la localisation dans les paramètres");
        resolve(false);
      },
      {enableHighAccuracy:true, timeout:10000, maximumAge:0}
    );
  });

  const ptg = (() => { try { return sh?.pointage ? JSON.parse(sh.pointage) : null; } catch { return null; } })();

  const savePointage = (data) => {
    const calcH = (deb, fin, pauseMin=30) => {
      if (!deb||!fin) return 0;
      const [ah,am]=deb.split(":").map(Number),[dh,dm]=fin.split(":").map(Number);
      return Math.max(0, Math.round(((dh*60+dm)-(ah*60+am)-pauseMin)/60*100)/100);
    };
    const pauseMin = data.pause_debut&&data.pause_fin ? (() => {
      const [ph,pm]=data.pause_debut.split(":").map(Number),[fh,fm]=data.pause_fin.split(":").map(Number);
      return fh*60+fm-(ph*60+pm);
    })() : 30;
    const h = data.arrivee&&data.depart ? calcH(data.arrivee,data.depart,pauseMin) : (sh?.h||0);
    const updated = {
      ...(sh||{type:"travail",deb:"",fin:"",h:0,note:""}),
      h, deb:data.arrivee||sh?.deb||"", fin:data.depart||sh?.fin||"",
      pointage: JSON.stringify(data),
      // LOCK after departure — only admin can unlock
      locked: data.status==="termine" ? true : (sh?.locked||false),
    };
    if (sh?.type==="ecole") { updated.type="ecole"; } // preserve école type
    setShifts(p => ({...p,[`${emp.id}_${today}`]:updated}));
  };

  const pointer = async (action) => {
    // Admin bypass — no geo check needed
    if (!isAdmin) {
      const geoOk = await checkGeo();
      if (!geoOk) return;
    }
    const ts = timeNow;
    const base = ptg || {};
    let newPtg = {...base};
    if (action==="arrivee")      newPtg = {...base, arrivee:ts, status:"en_cours", geo_arrivee:geoCoords};
    else if (action==="pause")   newPtg = {...base, pause_debut:ts, status:"en_pause"};
    else if (action==="reprise") newPtg = {...base, pause_fin:ts, status:"en_cours"};
    else if (action==="depart")  newPtg = {
      ...base, depart:ts, status:"termine",
      geo_depart:geoCoords,
      signature: btoa(unescape(encodeURIComponent(`${emp.id}-${today}-${ts}-ABR2026-${Math.random().toString(36).slice(2,8)}`)))
    };
    savePointage(newPtg);
  };

  const isLocked = sh?.locked && ptg?.status==="termine" && !isAdmin;

  const status = ptg?.status || "non_pointe";
  const sc = {
    non_pointe: {label:"Non pointé aujourd'hui", color:"#9E9E9E", bg:"#F5F5F5", icon:"⏰"},
    en_cours:   {label:"En service ▶",           color:"#1B5E20", bg:"#E8F5E9", icon:"🟢"},
    en_pause:   {label:"En pause ⏸",             color:"#E65100", bg:"#FFF8E1", icon:"🟡"},
    termine:    {label:"Journée terminée ✅",     color:"#1565C0", bg:"#E3F2FD", icon:"🔵"},
  }[status];

  if (hors) return (
    <div style={{padding:30,textAlign:"center",color:"#9E9E9E"}}>
      <div style={{fontSize:40,marginBottom:8}}>📅</div>
      Hors période de contrat
    </div>
  );

  return (
    <div>
      {/* Bandeau statut */}
      <div style={{...S.card,background:sc.bg,border:`1.5px solid ${sc.color}`,marginBottom:16,textAlign:"center",padding:"16px 20px"}}>
        <div style={{fontSize:28,marginBottom:4}}>{sc.icon}</div>
        <div style={{fontSize:16,fontWeight:800,color:sc.color}}>{sc.label}</div>
        <div style={{fontSize:32,fontWeight:800,color:sc.color,marginTop:6,letterSpacing:"0.05em"}}>{timeNow}</div>
        <div style={{fontSize:12,color:"#9E9E9E",marginTop:4}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}</div>
      </div>

      {/* Planning prévu */}
      {sh?.type==="travail"&&sh.deb&&(
        <div style={{...S.card,marginBottom:12,background:"#F1F8E9",border:"1px solid #C8E6C9",display:"flex",alignItems:"center",gap:10,padding:"10px 14px"}}>
          <span style={{fontSize:16}}>📋</span>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#2E7D32"}}>Planning prévu</div>
            <div style={{fontSize:13,color:"#558B2F"}}>{sh.deb} → {sh.fin} · {Number(sh.h).toFixed(1)}h</div>
          </div>
        </div>
      )}
      {sh?.type==="ecole"&&(
        <div style={{...S.card,marginBottom:12,background:"#E3F2FD",border:"1px solid #90CAF9",padding:"10px 14px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#1565C0"}}>🎓 Journée École — salaire maintenu</div>
        </div>
      )}
      {!isOuvert&&status==="non_pointe"&&(
        <div style={{...S.card,marginBottom:12,background:"#FFF8E1",border:"1px solid #FFD54F",padding:"10px 14px"}}>
          <div style={{fontSize:12,color:"#E65100"}}>⚠️ Le parc est fermé aujourd'hui</div>
        </div>
      )}

      {/* Géolocalisation status */}
      {geoStatus!=="idle"&&(
        <div style={{...S.card,marginBottom:12,padding:"10px 14px",
          background:geoStatus==="ok"?"#E8F5E9":geoStatus==="checking"?"#F1F8E9":"#FFEBEE",
          border:`1px solid ${geoStatus==="ok"?"#A5D6A7":geoStatus==="checking"?"#C8E6C9":"#FFCDD2"}`}}>
          <div style={{fontSize:12,fontWeight:600,color:geoStatus==="ok"?"#1B5E20":geoStatus==="checking"?"#558B2F":"#C62828"}}>
            📍 {geoMsg}
          </div>
        </div>
      )}

      {/* Timeline */}
      <div style={{...S.card,marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,color:"#2E7D32",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>Ma journée</div>
        {[
          {key:"arrivee",     label:"Arrivée au parc",  icon:"🟢", color:"#1B5E20"},
          {key:"pause_debut", label:"Début de pause",   icon:"⏸", color:"#E65100"},
          {key:"pause_fin",   label:"Fin de pause",     icon:"▶️", color:"#1565C0"},
          {key:"depart",      label:"Départ du parc",   icon:"🔴", color:"#B71C1C"},
        ].map(({key,label,icon,color})=>(
          <div key={key} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid #F5F5F5"}}>
            <span style={{fontSize:18,width:28,textAlign:"center"}}>{ptg?.[key]?icon:"○"}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:"#424242"}}>{label}</div>
              {ptg?.[key]?<div style={{fontSize:15,fontWeight:800,color}}>{ptg[key]}</div>
                         :<div style={{fontSize:11,color:"#BDBDBD"}}>Non enregistré</div>}
            </div>
            {key==="arrivee"&&ptg?.geo_arrivee&&<span style={{fontSize:9,color:"#9E9E9E"}}>📍{Math.round(haversine(ptg.geo_arrivee.lat,ptg.geo_arrivee.lng,PARC_LAT,PARC_LNG))}m</span>}
          </div>
        ))}
        {ptg?.depart&&ptg?.arrivee&&(
          <div style={{marginTop:10,padding:"8px 12px",background:"#E8F5E9",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:800,color:"#1B5E20",fontSize:16}}>
              {(()=>{const [ah,am]=ptg.arrivee.split(":").map(Number),[dh,dm]=ptg.depart.split(":").map(Number);const pmin=ptg.pause_debut&&ptg.pause_fin?((()=>{const[ph,pm]=ptg.pause_debut.split(":").map(Number),[fh,fm]=ptg.pause_fin.split(":").map(Number);return fh*60+fm-(ph*60+pm);})()):30;return Math.max(0,Math.round(((dh*60+dm)-(ah*60+am)-pmin)/60*100)/100).toFixed(2);})()} h effectives
            </span>
            {ptg?.signature&&<span style={{fontSize:10,color:"#9E9E9E"}}>🔏 Signé</span>}
          </div>
        )}
      </div>

      {/* Boutons d'action */}
      {!isLocked&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {status==="non_pointe"&&(
            <button onClick={()=>pointer("arrivee")} style={{...S.btn,...S.btnG,padding:"18px",fontSize:16,textAlign:"center",borderRadius:14}}>
              🟢 Pointer mon arrivée
              {!isAdmin&&<div style={{fontSize:11,opacity:0.8,marginTop:2}}>GPS requis — assurez-vous d'être au parc</div>}
            </button>
          )}
          {status==="en_cours"&&(<>
            <button onClick={()=>pointer("pause")} style={{...S.btn,background:"#FFF8E1",color:"#E65100",border:"1px solid #FFD54F",padding:"16px",fontSize:15,borderRadius:14}}>
              ⏸ Partir en pause — {timeNow}
            </button>
            <button onClick={()=>pointer("depart")} style={{...S.btn,background:"#FFEBEE",color:"#C62828",border:"1px solid #FFCDD2",padding:"16px",fontSize:15,borderRadius:14}}>
              🔴 Pointer ma sortie — {timeNow}
            </button>
          </>)}
          {status==="en_pause"&&(
            <button onClick={()=>pointer("reprise")} style={{...S.btn,background:"#E3F2FD",color:"#1565C0",border:"1px solid #90CAF9",padding:"16px",fontSize:15,borderRadius:14}}>
              ▶️ Reprendre le travail — {timeNow}
            </button>
          )}
          {status==="termine"&&(
            <div style={{padding:"16px",background:"#E8F5E9",borderRadius:12,textAlign:"center"}}>
              <div style={{fontWeight:800,color:"#1B5E20",fontSize:15}}>✅ Journée enregistrée</div>
              <div style={{fontSize:11,color:"#9E9E9E",marginTop:4}}>Seul l'administrateur peut modifier ces données</div>
            </div>
          )}
        </div>
      )}
      {isLocked&&(
        <div style={{padding:"16px",background:"#E3F2FD",borderRadius:12,textAlign:"center",border:"1px solid #90CAF9"}}>
          <div style={{fontWeight:800,color:"#1565C0",fontSize:15}}>🔒 Pointage verrouillé</div>
          <div style={{fontSize:11,color:"#9E9E9E",marginTop:4}}>Signature : {ptg?.signature?.slice(-8)}<br/>Seule Vanessa peut modifier</div>
        </div>
      )}
    </div>
  );
}

function AdminMonthView({team, shifts, setShifts}) {
  const [monday, setMonday] = useState(getMondayLocal);
  const [selEmp, setSelEmp] = useState(null);
  const [editing, setEditing] = useState(null);
  const m = monday.getMonth(), y = monday.getFullYear();
  const firstMon = getMondayOf(new Date(y,m,1,12));
  const weeks = Array.from({length:6},(_,i)=>({
    mon:addDaysLocal(firstMon,i*7),
    days:Array.from({length:7},(_,j)=>addDaysLocal(firstMon,i*7+j))
  })).filter(w=>w.days.some(d=>d.getMonth()===m));
  const dayNames = ["Di","Lu","Ma","Me","Je","Ve","Sa"];
  const todayStr = fmtLocal(new Date());
  const season = {start:SEASON_START,end:SEASON_END};
  const displayTeam = selEmp ? team.filter(e=>e.actif&&e.id===selEmp) : team.filter(e=>e.actif);

  const getShift=(eid,ds)=>shifts[`${eid}_${ds}`];
  const putShift=(eid,ds,data)=>{setShifts(p=>{const n={...p};data===null?delete n[`${eid}_${ds}`]:(n[`${eid}_${ds}`]=data);return n;});};

  return (
    <div>
      {/* Month nav */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>setMonday(new Date(y,m-1,15,12))} style={{...S.btn,...S.btnS,padding:"6px 14px"}}>←</button>
        <span style={{fontSize:15,fontWeight:700,color:"#2E7D32",flex:1}}>{monday.toLocaleDateString("fr-FR",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase())}</span>
        <button onClick={()=>setMonday(new Date(y,m+1,15,12))} style={{...S.btn,...S.btnS,padding:"6px 14px"}}>→</button>
        <button onClick={()=>setMonday(getMondayLocal())} style={{...S.btn,background:"#DCEDC8",color:"#33691E",border:"none"}}>Ce mois</button>
          <button onClick={()=>exportPDFMois(displayTeam,shifts,monday.getFullYear(),monday.getMonth()+1)} 
            style={{...S.btn,background:"#E8F5E9",color:"#1B5E20",border:"1px solid #A5D6A7",fontSize:12,padding:"6px 14px"}}>
            🖨️ Imprimer le planning du mois
          </button>
        </div>

      {/* Employee filter */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        <button onClick={()=>setSelEmp(null)} style={{...S.btn,padding:"5px 12px",fontSize:11,background:!selEmp?"#2E7D32":"#F1F8E9",color:!selEmp?"#fff":"#2E7D32",border:!selEmp?"none":"1px solid #C8E6C9"}}>👥 Tous</button>
        {team.filter(e=>e.actif).map(e=><button key={e.id} onClick={()=>setSelEmp(selEmp===e.id?null:e.id)} style={{...S.btn,padding:"5px 12px",fontSize:11,background:selEmp===e.id?e.color:"#F5F5F5",color:selEmp===e.id?"#fff":"#424242",border:"none"}}>{e.prenom?e.prenom.split(" ")[0]:e.nom.split(" ")[0]}</button>)}
      </div>

      {displayTeam.map(emp=>{
        const {acquis,pris,restants,deficit}=calcCP(emp,shifts,season);
        const monthH=weeks.flatMap(w=>w.days).reduce((s,d)=>{
          if(d.getMonth()!==m)return s;
          return s+shH(getShift(emp.id,fmtLocal(d)));
        },0);
        const delta=monthH-emp.heures_mois;

        return (
          <div key={emp.id} style={{...S.card,marginBottom:16}}>
            {/* Emp header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:emp.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:16,flexShrink:0}}>{(emp.prenom||emp.nom).charAt(0)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:800,color:"#212121"}}>{emp.prenom?`${emp.prenom} ${emp.nom}`:emp.nom}</div>
                <div style={{fontSize:11,color:"#9E9E9E"}}>{emp.poste} · {emp.heures_mois}h/mois contrat</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{padding:"4px 10px",borderRadius:20,fontSize:13,fontWeight:800,background:monthH>0?"#E8F5E9":"#F5F5F5",color:monthH>0?"#1B5E20":"#9E9E9E"}}>{monthH.toFixed(1)}h ce mois</span>
                <span style={{padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:700,background:delta>=0?"#E8F5E9":"#FFEBEE",color:delta>=0?"#1B5E20":"#C62828"}}>{delta>=0?"+":""}{delta.toFixed(1)}h vs contrat</span>
                <span style={{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:deficit?"#FFEBEE":"#FFF8E1",color:deficit?"#C62828":"#E65100"}}>🌴 {acquis}acq/{pris}pris/{restants}rest{deficit?" ⚠️":""}</span>
              </div>
            </div>

            {/* Weeks */}
            {weeks.map(({mon:wm,days},wi)=>{
              const wH=days.reduce((s,d)=>{if(d.getMonth()!==m)return s;return s+shH(getShift(emp.id,fmtLocal(d)));},0);
              const wDelta=wH-(emp.heures_mois/4.33);
              return (
                <div key={wi} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#558B2F"}}>Sem. {wm.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})} → {addDaysLocal(wm,6).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})}{days.some(d=>d.getMonth()!==m)?` (${days.filter(d=>d.getMonth()===m).length}j ce mois)`:""}</span>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      {wH>0&&<span style={{fontSize:12,fontWeight:800,color:"#1B5E20"}}>{wH.toFixed(1)}h</span>}
                      {wH>0&&<span style={{fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:20,background:wDelta>=0?"#E8F5E9":"#FFEBEE",color:wDelta>=0?"#1B5E20":"#C62828"}}>{wDelta>=0?"+":""}{wDelta.toFixed(1)}h</span>}
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
                    {days.map((d,di)=>{
                      const ds=fmtLocal(d);const sh=getShift(emp.id,ds);const st=sh?STATUTS[sh.type]:null;
                      const isToday=ds===todayStr;const dow=d.getDay();const isWE=dow===0||dow===6;
                      const effD2=(emp.poei_debut&&emp.poei_debut<emp.debut)?emp.poei_debut:emp.debut;const hors=ds<effD2||ds>emp.fin;const wrongM=d.getMonth()!==m;
                      const ptg=(() => {try{return sh?.pointage?JSON.parse(sh.pointage):null;}catch{return null;}})();
                      return (
                        <div key={di} onClick={()=>!hors&&!wrongM&&setEditing({empId:emp.id,date:ds})}
                          style={{borderRadius:7,padding:"4px 2px",textAlign:"center",
                            background:hors||wrongM?"#FAFAFA":st?st.bg:isToday?"#FFFDE7":getDayType(ds)?"#F9FBF9":"#F5F5F5",
                            border:`1.5px solid ${isToday?"#DCE775":st?st.border:"#EEEEEE"}`,
                            opacity:wrongM?0.25:1,cursor:!hors&&!wrongM?"pointer":"default",position:"relative"}}
                          onMouseEnter={e=>!hors&&!wrongM&&(e.currentTarget.style.filter="brightness(0.94)")}
                          onMouseLeave={e=>e.currentTarget.style.filter=""}>
                          {ptg?.signature&&<span style={{position:"absolute",top:1,right:2,fontSize:7}}>🔏</span>}
                          <div style={{fontSize:8,fontWeight:600,color:isWE?"#BF360C":"#9E9E9E"}}>{dayNames[dow]}</div>
                          <div style={{fontSize:8,color:"#AAAAAA"}}>{d.getDate()}</div>
                          {!hors&&sh?(<>
                            <div style={{fontSize:8,fontWeight:700,color:st.color,lineHeight:1.1}}>{st.label.slice(0,3)}</div>
                            {(sh.type==="travail"||sh.type==="ecole")&&<div style={{fontSize:9,fontWeight:800,color:st.color}}>{shH(sh).toFixed(1)}h</div>}
                            {sh.type==="travail"&&sh.deb&&<div style={{fontSize:7,color:st.color}}>{sh.deb}</div>}
                            {ptg?.arrivee&&!ptg?.depart&&<div style={{fontSize:7,color:"#1B5E20"}}>▶{ptg.arrivee}</div>}
                            {ptg?.depart&&<div style={{fontSize:7,color:"#1565C0"}}>✓{ptg.depart}</div>}
                          </>):!hors&&getDayType(ds)?<div style={{fontSize:7,color:"#CCCCCC",marginTop:2}}>—</div>:null}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}

      {editing&&(()=>{
        const emp2=team.find(e=>e.id===editing.empId);
        const sh=getShift(editing.empId,editing.date);
        return <ShiftModal emp={emp2} date={editing.date} shift={sh}
          onSave={data=>{putShift(editing.empId,editing.date,data);setEditing(null);}}
          onClose={()=>setEditing(null)}/>;
      })()}
    </div>
  );
}

function ValidationRow({r, i, valider, corriger}) {
  const [editDeb, setEditDeb] = useState(r.actual_deb||r.planned_deb);
  const [editFin, setEditFin] = useState(r.actual_fin||r.planned_fin);
  const [editing, setEditing] = useState(false);
  const st = STATUTS[r.sh.type];
  const deltaMin = r.delta;
  const deltaLabel = deltaMin===null ? "—" : `${deltaMin>=0?"+":""}${deltaMin}min`;
  const deltaColor = deltaMin===null ? "#9E9E9E" : Math.abs(deltaMin)<=5 ? "#1B5E20" : Math.abs(deltaMin)<=15 ? "#E65100" : "#C62828";
  const validColor = r.validation==="ok" ? "#1B5E20" : r.validation==="corrected" ? "#1565C0" : "#E65100";
  const validLabel = r.validation==="ok" ? "✅ Validé" : r.validation==="corrected" ? "✏️ Corrigé" : "⏳ En attente";
  return (
    <tr style={{borderBottom:"1px solid #F1F8E9",background:i%2===0?"#fff":"#FAFAFA"}}>
      <td style={{padding:"8px 12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:r.emp.color}}/>
          <span style={{fontSize:12,fontWeight:700}}>{r.emp.prenom?r.emp.prenom.split(" ")[0]:r.emp.nom}</span>
        </div>
      </td>
      <td style={{padding:"8px 12px",fontSize:12,color:"#424242",whiteSpace:"nowrap"}}>
        {new Date(r.ds+"T12:00").toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"})}
      </td>
      <td style={{padding:"8px 12px"}}>
        <span style={{fontSize:11,color:st.color,background:st.bg,padding:"2px 8px",borderRadius:20,display:"inline-block",whiteSpace:"nowrap"}}>
          {r.sh.type==="ecole" ? "École 7h" : `${r.planned_deb}→${r.planned_fin} · ${r.planned_h}h`}
        </span>
      </td>
      <td style={{padding:"8px 12px"}}>
        {r.actual_h!==null ? (
          <span style={{fontSize:11,color:"#1565C0",whiteSpace:"nowrap"}}>
            {r.actual_deb}→{r.actual_fin} · <strong>{r.actual_h.toFixed(2)}h</strong>
            {r.ptg?.signature&&<span style={{fontSize:9,color:"#9E9E9E",marginLeft:4}}>🔏</span>}
          </span>
        ) : (
          <span style={{fontSize:11,color:"#C62828",fontWeight:600}}>Non pointé</span>
        )}
      </td>
      <td style={{padding:"8px 12px",textAlign:"center"}}>
        <span style={{fontSize:12,fontWeight:700,color:deltaColor}}>{deltaLabel}</span>
      </td>
      <td style={{padding:"8px 12px"}}>
        <span style={{fontSize:11,fontWeight:600,color:validColor}}>{validLabel}</span>
      </td>
      <td style={{padding:"8px 12px"}}>
        {editing ? (
          <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
            <input type="time" value={editDeb} onChange={e=>setEditDeb(e.target.value)} style={{...S.inp,width:90,padding:"3px 6px",fontSize:11}}/>
            <input type="time" value={editFin} onChange={e=>setEditFin(e.target.value)} style={{...S.inp,width:90,padding:"3px 6px",fontSize:11}}/>
            <button onClick={()=>{corriger(r,editDeb,editFin);setEditing(false);}} style={{...S.btn,...S.btnG,padding:"3px 8px",fontSize:11}}>OK</button>
            <button onClick={()=>setEditing(false)} style={{...S.btn,...S.btnS,padding:"3px 8px",fontSize:11}}>×</button>
          </div>
        ) : (
          <div style={{display:"flex",gap:4}}>
            {r.validation!=="ok"&&<button onClick={()=>valider(r)} style={{...S.btn,...S.btnG,padding:"3px 10px",fontSize:11}}>✅</button>}
            <button onClick={()=>setEditing(true)} style={{...S.btn,background:"#E3F2FD",color:"#1565C0",border:"none",padding:"3px 10px",fontSize:11}}>✏️</button>
          </div>
        )}
      </td>
    </tr>
  );
}

function ValidationPaieTab({team, shifts, setShifts}) {
  const now = new Date();
  const [year,  setYear]  = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth()+1);
  const [filter, setFilter] = useState("tous");
  const MOIS_LONG = ["","Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const days = new Date(year, month, 0).getDate();
  const activeTeam = team.filter(e=>e.actif);

  const rows = [];
  activeTeam.forEach(emp => {
    for (let i=1; i<=days; i++) {
      const ds = `${year}-${String(month).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
      if (ds < emp.debut || ds > emp.fin) continue;
      const sh = shifts[`${emp.id}_${ds}`];
      if (!sh || sh.type==="repos") continue;
      const planned_h = sh.type==="travail"?(sh.h||0):sh.type==="ecole"?7:0;
      let ptg=null; try{ptg=sh.pointage?JSON.parse(sh.pointage):null;}catch{}
      const actual_deb=ptg?.arrivee||"", actual_fin=ptg?.depart||"";
      const actual_h = (() => {
        if (!actual_deb||!actual_fin) return null;
        const [ah,am]=actual_deb.split(":").map(Number),[dh,dm]=actual_fin.split(":").map(Number);
        const pmin=ptg?.pause_debut&&ptg?.pause_fin?((()=>{const[ph,pm]=ptg.pause_debut.split(":").map(Number),[fh,fm]=ptg.pause_fin.split(":").map(Number);return fh*60+fm-(ph*60+pm);})()):30;
        return Math.max(0,Math.round(((dh*60+dm)-(ah*60+am)-pmin)/60*100)/100);
      })();
      const validation=sh.validation||"pending";
      const validated_h=sh.validated_h!==undefined?sh.validated_h:actual_h;
      const delta=actual_h!==null?Math.round((actual_h-planned_h)*60):null;
      rows.push({emp,ds,sh,planned_h,planned_deb:sh.deb||"",planned_fin:sh.fin||"",actual_deb,actual_fin,actual_h,ptg,validation,validated_h,delta});
    }
  });

  const filtered = rows.filter(r => {
    if (filter==="ecarts") return r.delta!==null&&Math.abs(r.delta)>5;
    if (filter==="nonpointe") return r.actual_h===null&&r.sh.type==="travail";
    return true;
  });

  const totalPlanned=rows.reduce((s,r)=>s+r.planned_h,0);
  const totalActual=rows.filter(r=>r.actual_h!==null).reduce((s,r)=>s+r.actual_h,0);
  const nonPointes=rows.filter(r=>r.actual_h===null&&r.sh.type==="travail").length;
  const ecarts=rows.filter(r=>r.delta!==null&&Math.abs(r.delta)>5).length;

  const valider=(r,h_override)=>{
    const h=h_override!==undefined?h_override:(r.actual_h||r.planned_h);
    setShifts(p=>({...p,[`${r.emp.id}_${r.ds}`]:{...r.sh,h,validated_h:h,validation:"ok"}}));
  };
  const corriger=(r,nd,nf)=>{
    const [ah,am]=nd.split(":").map(Number),[dh,dm]=nf.split(":").map(Number);
    const h=Math.max(0,Math.round(((dh*60+dm)-(ah*60+am)-30)/60*100)/100);
    setShifts(p=>({...p,[`${r.emp.id}_${r.ds}`]:{...r.sh,deb:nd,fin:nf,h,validated_h:h,validation:"corrected"}}));
  };

  return (
    <div>
      <div style={{display:"flex",gap:12,marginBottom:18,flexWrap:"wrap"}}>
        {[
          {label:"Heures prévues",  val:`${totalPlanned.toFixed(1)}h`, bg:"#E8F5E9",color:"#1B5E20"},
          {label:"Heures pointées", val:`${totalActual.toFixed(1)}h`,  bg:"#E3F2FD",color:"#1565C0"},
          {label:"Non pointés",     val:`${nonPointes}j`,              bg:nonPointes>0?"#FFF8E1":"#F5F5F5",color:nonPointes>0?"#E65100":"#9E9E9E"},
          {label:"Écarts > 5min",   val:`${ecarts}`,                   bg:ecarts>0?"#FFEBEE":"#F5F5F5",color:ecarts>0?"#C62828":"#9E9E9E"},
        ].map(({label,val,bg,color})=>(
          <div key={label} style={{flex:1,minWidth:120,padding:"12px 16px",borderRadius:12,background:bg,textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800,color}}>{val}</div>
            <div style={{fontSize:11,color:"#9E9E9E",marginTop:2}}>{label}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #C8E6C9"}}>
          <button onClick={()=>setMonth(m=>m>1?m-1:12)} style={{padding:"6px 12px",border:"none",background:"#fff",cursor:"pointer"}}>←</button>
          <span style={{padding:"6px 14px",fontWeight:700,color:"#2E7D32",fontSize:13,background:"#F1F8E9"}}>{MOIS_LONG[month]} {year}</span>
          <button onClick={()=>setMonth(m=>m<12?m+1:1)} style={{padding:"6px 12px",border:"none",background:"#fff",cursor:"pointer"}}>→</button>
        </div>
        {["tous","ecarts","nonpointe"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{...S.btn,padding:"6px 14px",fontSize:11,background:filter===f?"#2E7D32":"#F1F8E9",color:filter===f?"#fff":"#2E7D32",border:filter===f?"none":"1px solid #C8E6C9"}}>
            {f==="tous"?"Tous":f==="ecarts"?"⚠️ Écarts":"🔴 Non pointés"}
          </button>
        ))}
        <button onClick={()=>rows.filter(r=>r.validation==="pending").forEach(r=>valider(r))} style={{...S.btn,...S.btnG,marginLeft:"auto",fontSize:12}}>✅ Tout valider</button>
      </div>
      <div style={{...S.card,padding:0,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr style={{background:"#F1F8E9",borderBottom:"2px solid #C8E6C9"}}>
              {["Salarié·e","Date","Prévu","Pointé","Écart","Statut","Action"].map(h=>(
                <th key={h} style={{padding:"10px 12px",fontSize:11,textAlign:"left",color:"#558B2F",fontWeight:700,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.length===0&&(
              <tr><td colSpan={7} style={{padding:"30px",textAlign:"center",color:"#9E9E9E",fontSize:13}}>
                {filter==="tous"?"Aucun jour travaillé ce mois":"Aucun élément dans ce filtre ✅"}
              </td></tr>
            )}
            {filtered.map((r,i)=>(
              <ValidationRow key={`${r.emp.id}_${r.ds}`} r={r} i={i} valider={valider} corriger={corriger}/>
            ))}
          </tbody>
        </table>
      </div>
      {rows.length>0&&(
        <div style={{...S.card,marginTop:14,background:"#E8F5E9",border:"1px solid #A5D6A7",display:"flex",gap:20,flexWrap:"wrap",alignItems:"center",padding:"12px 16px"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#1B5E20"}}>📊 Récap {MOIS_LONG[month]}</span>
          {activeTeam.map(emp=>{
            const empRows=rows.filter(r=>r.emp.id===emp.id);
            const h=empRows.reduce((s,r)=>s+(r.validated_h||r.planned_h),0);
            const brut=Math.round(h*emp.taux*100)/100;
            return empRows.length>0?(
              <div key={emp.id} style={{textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:800,color:"#1B5E20"}}>{h.toFixed(1)}h</div>
                <div style={{fontSize:10,color:"#558B2F"}}>{emp.prenom||emp.nom}</div>
                <div style={{fontSize:10,color:"#9E9E9E"}}>{brut.toFixed(2)}€ brut</div>
              </div>
            ):null;
          })}
        </div>
      )}
    </div>
  );
}

function LoginScreen({team,onAdmin,onEmployee}) {
  // ALL hooks at top level — never inside if blocks (React rule)
  const [mode,setMode]=useState("choose");
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [selEmp,setSelEmp]=useState(null);
  const [empPin,setEmpPin]=useState("");
  const [empErr,setEmpErr]=useState("");
  const [empLoading,setEmpLoading]=useState(false);
  const [changingPin,setChangingPin]=useState(false);
  const [newPin,setNewPin]=useState("");
  const [newPin2,setNewPin2]=useState("");
  const [pinMsg,setPinMsg]=useState("");

  const tryAdmin=async()=>{setLoading(true);const ok=await checkPwd(pin);setLoading(false);ok?onAdmin():setErr("Mot de passe incorrect");};

  if(mode==="admin") return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F4F8F4"}}>
      <div style={{...S.card,maxWidth:360,width:"100%",textAlign:"center",padding:"32px 28px"}}>
        <div style={{fontSize:36,marginBottom:12}}>🔐</div>
        <div style={{fontSize:17,fontWeight:800,color:"#1B5E20",marginBottom:4}}>Espace Gestion</div>
        <div style={{fontSize:12,color:"#9E9E9E",marginBottom:20}}>Accès Vanessa Schweitzer</div>
        <input type="password" value={pin} onChange={e=>{setPin(e.target.value);setErr("");}} placeholder="Mot de passe" style={{...S.inp,marginBottom:10,textAlign:"center",letterSpacing:"0.12em"}} onKeyDown={e=>{if(e.key==="Enter")tryAdmin();}}/>
        {err&&<div style={{color:"#C62828",fontSize:12,marginBottom:8}}>{err}</div>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={tryAdmin} disabled={loading} style={{...S.btn,...S.btnG,flex:1,opacity:loading?0.6:1}}>{loading?"Vérification…":"Accéder"}</button>
          <button onClick={()=>{setMode("choose");setPin("");setErr("");}} style={{...S.btn,...S.btnS}}>Retour</button>
        </div>
        <div style={{marginTop:10,fontSize:10,color:"#BDBDBD"}}>Mot de passe par défaut : Abracadaparc2026</div>
      </div>
    </div>
  );

  if(mode==="employee") {
    const tryEmpLogin=async()=>{
      setEmpLoading(true);
      const ok=await checkEmpPin(selEmp.id,empPin);
      setEmpLoading(false);
      ok?onEmployee(selEmp.id):setEmpErr("Code PIN incorrect (défaut : 1234)");
    };
    const handleChangePin=async()=>{
      if(!newPin||newPin!==newPin2){setPinMsg("Les codes ne correspondent pas");return;}
      if(newPin.length<4){setPinMsg("Minimum 4 chiffres");return;}
      await setEmpPin(selEmp.id,newPin);
      setPinMsg("✅ Code PIN mis à jour !");
      setNewPin(""); setNewPin2(""); setChangingPin(false);
    };

    if(selEmp) return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F4F8F4"}}>
        <div style={{...S.card,maxWidth:360,width:"100%",padding:"28px 24px",textAlign:"center"}}>
          <div style={{width:48,height:48,borderRadius:"50%",background:selEmp.color,margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:22}}>{(selEmp.prenom||selEmp.nom).charAt(0)}</div>
          <div style={{fontSize:16,fontWeight:800,color:"#1B5E20",marginBottom:2}}>{selEmp.prenom?`${selEmp.prenom} ${selEmp.nom}`:selEmp.nom}</div>
          <div style={{fontSize:11,color:"#9E9E9E",marginBottom:20}}>{selEmp.poste}</div>
          {!changingPin?(
            <>
              <input type="password" value={empPin} onChange={e=>{setEmpPin(e.target.value);setEmpErr("");}} placeholder="Code PIN (4 chiffres)" inputMode="numeric" maxLength={8} style={{...S.inp,textAlign:"center",letterSpacing:"0.3em",marginBottom:8,fontSize:20}} onKeyDown={e=>{if(e.key==="Enter")tryEmpLogin();}}/>
              {empErr&&<div style={{color:"#C62828",fontSize:12,marginBottom:8}}>{empErr}</div>}
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <button onClick={tryEmpLogin} disabled={empLoading} style={{...S.btn,...S.btnG,flex:1,opacity:empLoading?0.6:1}}>{empLoading?"…":"Se connecter"}</button>
                <button onClick={()=>{setSelEmp(null);setEmpPin("");setEmpErr("");}} style={{...S.btn,...S.btnS}}>Retour</button>
              </div>
              <button onClick={()=>setChangingPin(true)} style={{fontSize:11,color:"#1565C0",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Changer mon code PIN</button>
              <div style={{marginTop:8,fontSize:10,color:"#BDBDBD"}}>Code PIN par défaut : 1234</div>
            </>
          ):(
            <>
              <div style={{fontSize:13,fontWeight:700,color:"#1B5E20",marginBottom:14}}>Changer mon code PIN</div>
              <input type="password" value={newPin} onChange={e=>setNewPin(e.target.value)} placeholder="Nouveau code (min. 4 chiffres)" inputMode="numeric" style={{...S.inp,textAlign:"center",marginBottom:8}}/>
              <input type="password" value={newPin2} onChange={e=>setNewPin2(e.target.value)} placeholder="Confirmer le code" inputMode="numeric" style={{...S.inp,textAlign:"center",marginBottom:10}}/>
              {pinMsg&&<div style={{fontSize:12,color:pinMsg.startsWith("✅")?"#1B5E20":"#C62828",marginBottom:8,fontWeight:600}}>{pinMsg}</div>}
              <div style={{display:"flex",gap:8}}>
                <button onClick={handleChangePin} style={{...S.btn,...S.btnG,flex:1}}>Valider</button>
                <button onClick={()=>{setChangingPin(false);setPinMsg("");}} style={{...S.btn,...S.btnS}}>Annuler</button>
              </div>
            </>
          )}
        </div>
      </div>
    );

    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F4F8F4"}}>
        <div style={{...S.card,maxWidth:400,width:"100%",padding:"28px 24px"}}>
          <div style={{fontSize:36,textAlign:"center",marginBottom:10}}>👤</div>
          <div style={{fontSize:17,fontWeight:800,color:"#1B5E20",marginBottom:4,textAlign:"center"}}>Mon Planning</div>
          <div style={{fontSize:12,color:"#9E9E9E",marginBottom:18,textAlign:"center"}}>Choisissez votre nom, puis entrez votre code PIN</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {team.filter(e=>e.actif).map(e=>(
              <button key={e.id} onClick={()=>{setSelEmp(e);setEmpPin("");setEmpErr("");}} style={{...S.btn,padding:"11px 16px",textAlign:"left",display:"flex",alignItems:"center",gap:12,background:"#F9F9F9",border:"1.5px solid #E8F5E9",color:"#212121",fontWeight:400}}>
                <span style={{width:34,height:34,borderRadius:"50%",background:e.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:14,flexShrink:0}}>{(e.prenom||e.nom).charAt(0)}</span>
                <div><div style={{fontWeight:700,fontSize:13}}>{e.prenom?`${e.prenom} ${e.nom}`:e.nom}</div><div style={{fontSize:11,color:"#9E9E9E"}}>{e.poste}</div></div>
              </button>
            ))}
          </div>
          <button onClick={()=>setMode("choose")} style={{...S.btn,...S.btnS,width:"100%",marginTop:14}}>Retour</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F4F8F4"}}>
      <div style={{maxWidth:420,width:"100%",padding:20}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <span style={{fontSize:48}}>🌿</span>
          <h1 style={{fontSize:24,fontWeight:800,color:"#1B5E20",margin:"10px 0 4px"}}>AbracadaParc RH</h1>
          <p style={{fontSize:13,color:"#9E9E9E"}}>Saison 2026 · Goussainville (95)</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <button onClick={()=>setMode("employee")} style={{...S.btn,padding:"16px 20px",fontSize:14,textAlign:"left",display:"flex",alignItems:"center",gap:14,background:"#fff",border:"2px solid #C8E6C9",color:"#1B5E20",borderRadius:14}}>
            <span style={{fontSize:26}}>👤</span>
            <div><div style={{fontWeight:800}}>Mon planning</div><div style={{fontSize:11,color:"#9E9E9E",fontWeight:400,marginTop:2}}>Voir mes horaires · Congés · Commentaires</div></div>
          </button>
          <button onClick={()=>setMode("admin")} style={{...S.btn,padding:"16px 20px",fontSize:14,textAlign:"left",display:"flex",alignItems:"center",gap:14,background:"#fff",border:"2px solid #E8F5E9",color:"#424242",borderRadius:14}}>
            <span style={{fontSize:26}}>🔐</span>
            <div><div style={{fontWeight:800}}>Espace gestion</div><div style={{fontSize:11,color:"#9E9E9E",fontWeight:400,marginTop:2}}>Planning complet · RH · Finances · Paramètres</div></div>
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════

function App() {
  const [team,      setTeam,      tReady] = useStorage("abr26_team_v2",   TEAM_INIT);
  const [dayLevels, setDayLevels, dReady] = useStorage("abr26_levels_v1", {});
  const [shifts,    setShifts,    sReady] = useStorage("abr26_shifts_v4", {});

  const [alertes,    setAlertes,    aReady] = useStorage("abr26_notes_v1", ALERTES_INIT);
  const [tab,          setTab]          = useState("equipe_planning");
  const [empTab,       setEmpTab]       = useState("mon_planning");
  const [authMode,     setAuthMode]     = useState(()=>sessionStorage.getItem("abr_auth")||"login");
  const [currentEmpId, setCurrentEmpId] = useState(()=>sessionStorage.getItem("abr_emp")||null);

  // Init SHA-256 hash on first load
  useEffect(()=>{initHash();},[]);

  // Auto-fill shifts
  useEffect(()=>{
    if(sReady&&tReady&&Object.keys(shifts).length===0&&team.length>0) setShifts(generateDefaultShifts(team));
  },[sReady,tReady]);

  // Migration: convert old ecole shifts during POEI periods to poei type
  useEffect(()=>{
    if(!sReady||!tReady||Object.keys(shifts).length===0) return;
    const updates = {};
    team.filter(e=>e.poei_debut&&e.poei_fin).forEach(emp=>{
      let d=new Date(emp.poei_debut+"T12:00");
      while(fmt(d)<=emp.poei_fin){
        const ds=fmt(d);
        const k=`${emp.id}_${ds}`;
        const sh=shifts[k];
        if(sh&&sh.type==="ecole"&&sh.note&&sh.note.includes("POEI")){
          updates[k]={type:"poei",deb:"09:00",fin:"17:00",h:0,note:sh.note};
        }
        d=addDays(d,1);
      }
    });
    if(Object.keys(updates).length>0) setShifts(p=>({...p,...updates}));
  },[sReady,tReady]);

  const loginAdmin    = ()=>{sessionStorage.setItem("abr_auth","admin");setAuthMode("admin");};
  const loginEmployee = id=>{sessionStorage.setItem("abr_auth","employee");sessionStorage.setItem("abr_emp",id);setAuthMode("employee");setCurrentEmpId(id);};
  const logout        = ()=>{sessionStorage.clear();setAuthMode("login");setCurrentEmpId(null);};

  if(!tReady||!dReady||!sReady||!aReady) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:200,color:"#2E7D32",fontSize:15}}>Chargement AbracadaParc 2026…</div>;

  // ── VUE SALARIÉ ──
  if(authMode==="employee") {
    const emp=team.find(e=>e.id===currentEmpId);
    const resasData = (() => { try { const s = localStorage.getItem('abr_reservations'); return s ? JSON.parse(s) : {}; } catch { return {}; } })();
    if(!emp){logout();return null;}
    return (
      <div style={{fontFamily:"system-ui,-apple-system,'Segoe UI',sans-serif",background:"#F4F8F4",minHeight:"100vh"}}>
        <div style={{background:"linear-gradient(135deg,#1B5E20 0%,#2E7D32 100%)",padding:"13px 18px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:34,height:34,borderRadius:"50%",background:emp.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:16}}>{(emp.prenom||emp.nom).charAt(0)}</div>
              <div><div style={{fontSize:14,fontWeight:800,color:"#fff"}}>{emp.prenom?`${emp.prenom} ${emp.nom}`:emp.nom}</div><div style={{fontSize:10,color:"#A5D6A7"}}>AbracadaParc 2026</div></div>
            </div>
            <button onClick={logout} style={{...S.btn,background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",fontSize:11}}>Déconnexion</button>
          </div>
        </div>
        <div style={{background:"#fff",borderBottom:"1.5px solid #E8F5E9",padding:"0 14px",display:"flex"}}>
          {[["mon_planning","👤 Mon planning"],["pointage","⏱ Pointage"],["mes_resas","📋 Réservations"],["equipe","👥 Planning équipe"]].map(([k,l])=>(
            <button key={k} onClick={()=>setEmpTab(k)} style={{padding:"10px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,whiteSpace:"nowrap",fontWeight:empTab===k?700:400,color:empTab===k?"#2E7D32":"#9E9E9E",borderBottom:`2.5px solid ${empTab===k?"#2E7D32":"transparent"}`,fontFamily:"inherit"}}>{l}</button>
          ))}
        </div>
        <div style={{padding:"16px",maxWidth:900,margin:"0 auto"}}>
          {empTab==="mon_planning"&&<MonPlanningTab emp={emp} shifts={shifts} setShifts={setShifts}/>}
          {empTab==="pointage"   &&<PointageTab emp={emp} shifts={shifts} setShifts={setShifts}/>}
          {empTab==="mes_resas"  &&<MesResasTab emp={emp} reservations={resasData}/>}
          {empTab==="equipe"     &&<PlanningEquipeTab team={team} shifts={shifts} setShifts={()=>{}} readonly={true}/>}
        </div>
      </div>
    );
  }

  // ── LOGIN ──
  if(authMode!=="admin") return <LoginScreen team={team} onAdmin={loginAdmin} onEmployee={loginEmployee}/>;

  // ── VUE ADMIN ──
  const TABS=[
    {id:"equipe_planning",icon:"📅",label:"Planning équipe"},
    {id:"mois_admin",    icon:"🗓", label:"Vue mensuelle"},
    {id:"cp",            icon:"🌴",label:"Congés payés"},
    {id:"validation",    icon:"✅",label:"Validation paie"},
    {id:"notes",         icon:"📌",label:"Notes / Alertes"},
    {id:"planning",      icon:"📋",label:"Prévisionnel"},
    {id:"recap",         icon:"📤",label:"Expert-Comptable"},
    {id:"contrats",      icon:"📄",label:"Contrats"},
    {id:"dashboard",     icon:"📊",label:"Tableau de bord"},
    {id:"calendrier",    icon:"🗓", label:"Calendrier"},
    {id:"reservations",  icon:"📋",label:"Réservations"},
    {id:"equipe",        icon:"👥",label:"Équipe"},
    {id:"parametres",    icon:"⚙️", label:"Paramètres"},
  ];
  const now=new Date();
  const dateFR=now.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  const daysToOpen=Math.max(0,Math.round((new Date("2026-04-01T08:00")-now)/(1000*60*60*24)));

  return (
    <div style={{fontFamily:"system-ui,-apple-system,'Segoe UI',sans-serif",background:"#F4F8F4",minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg,#1B5E20 0%,#2E7D32 60%,#388E3C 100%)",padding:"13px 20px 11px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:28}}>🌿</span>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <h1 style={{margin:0,fontSize:18,fontWeight:800,color:"#fff",letterSpacing:"-0.01em"}}>AbracadaParc · Saison 2026</h1>
                {alertes.filter(a=>!a.done).length>0&&(
                  <span onClick={()=>setTab("notes")} style={{padding:"2px 10px",borderRadius:20,background:"#E53935",color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer"}} title="Tâches en attente">
                    {alertes.filter(a=>!a.done).length}
                  </span>
                )}
              </div>
              <p style={{margin:0,fontSize:10,color:"#A5D6A7"}}>IDCC 1790 · SMIC 12,50€/h · Myron 929,75€/mois · {daysToOpen>0?`Ouverture dans ${daysToOpen}j`:"Saison en cours"}</p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:10,color:"#C8E6C9",textTransform:"capitalize",textAlign:"right"}}>{dateFR}</div>
            <button onClick={logout} style={{...S.btn,background:"rgba(255,255,255,0.15)",color:"#fff",border:"none",fontSize:11,padding:"5px 12px"}}>Déconnexion</button>
          </div>
        </div>
      </div>
      <div style={{background:"#fff",borderBottom:"1.5px solid #E8F5E9",padding:"0 10px",display:"flex",gap:0,overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 11px",background:"none",border:"none",cursor:"pointer",fontSize:11,whiteSpace:"nowrap",fontWeight:tab===t.id?700:400,color:tab===t.id?"#2E7D32":"#9E9E9E",borderBottom:`2.5px solid ${tab===t.id?"#2E7D32":"transparent"}`,fontFamily:"inherit"}}>
            <span style={{marginRight:4,fontSize:13}}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>
      <div style={{padding:"16px",maxWidth:1150,margin:"0 auto"}}>
        {tab==="equipe_planning"&&<PlanningEquipeTab team={team} shifts={shifts} setShifts={setShifts}/>}
        {tab==="mois_admin"    &&<AdminMonthView team={team} shifts={shifts} setShifts={setShifts}/>}
        {tab==="cp"            &&<CPTab team={team} shifts={shifts}/>}
        {tab==="validation"   &&<ValidationPaieTab team={team} shifts={shifts} setShifts={setShifts}/>}
        {tab==="notes"        &&<NotesAlertes alertes={alertes} setAlertes={setAlertes}/>}
        {tab==="planning"      &&<PlanningPrevTab team={team}/>}
        {tab==="recap"         &&<RecapECTab team={team} shifts={shifts}/>}
        {tab==="contrats"      &&<ContratsTabV2 team={team}/>}
        {tab==="dashboard"     &&<DashboardTab dayLevels={dayLevels}/>}
        {tab==="calendrier"    &&<CalendrierTab dayLevels={dayLevels} setDayLevels={setDayLevels}/>}
        {tab==="reservations"  &&<ReservationsTabWrapper/>}
        {tab==="equipe"        &&<EquipeTab team={team} setTeam={setTeam}/>}
        {tab==="parametres"    &&<ParametresTab onChangePwd={async()=>{}} team={team}/>}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
