}

function buildSemaine(){
  const jours=[]; for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);jours.push(d.toISOString().slice(0,10));}
  let html=`<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:11px;"><thead><tr style="background:#F1F8E9;">
    <th style="padding:8px 10px;text-align:left;color:#558B2F;font-weight:700;border-bottom:2px solid #C8E6C9;">Salarié</th>
    ${jours.map(d=>{const dt=new Date(d+'T12:00'),it=d===todayKey();return`<th style="padding:7px 5px;text-align:center;color:${it?'#2E7D32':'#558B2F'};font-weight:${it?800:600};border-bottom:2px solid #C8E6C9;">${dt.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit'})}</th>`;}).join('')}
    <th style="padding:8px 10px;text-align:right;color:#558B2F;font-weight:700;border-bottom:2px solid #C8E6C9;">Total</th>
  </tr></thead><tbody>`;

  EQUIPE.forEach(emp=>{
    let totMs=0;
    html+=`<tr><td style="padding:7px 10px;font-weight:600;white-space:nowrap;border-bottom:1px solid #F5F5F5;">${esc(emp.nom.split(' ')[0])}<br><span style="font-size:9px;color:#9E9E9E;font-weight:400;">${emp.contrat}</span></td>`;
    jours.forEach(d=>{
      const pt=(S.pointages[d]||{})[emp.id]||{};
      let cell='<span style="color:#E0E0E0;">—</span>',bg='transparent';
      if(pt.arrive){
        let ms=(pt.depart||0)-pt.arrive;
        if(pt.pause_debut&&pt.pause_fin)ms-=(pt.pause_fin-pt.pause_debut);
        if(ms>0)totMs+=ms;
        const dur=pt.depart?fmtDur(ms):'…';
        bg=pt.depart?'#F1F8E9':'#FFF8E1';
        cell=`<span style="font-weight:700;color:#1B5E20;">${dur}</span>${pt.retard_min>0?`<br><span style="color:#C62828;font-size:9px;">+${pt.retard_min}min</span>`:''}${pt.valide_admin?'<br><span style="color:#2E7D32;font-size:9px;">✓</span>':'<br><span style="color:#E65100;font-size:9px;">⏳</span>'}`;
      }
      html+=`<td style="padding:5px;text-align:center;background:${bg};border-bottom:1px solid #F5F5F5;">${cell}</td>`;
    });
    html+=`<td style="padding:7px 10px;text-align:right;font-weight:700;color:#1B5E20;border-bottom:1px solid #F5F5F5;">${totMs>0?fmtDur(totMs):'—'}</td></tr>`;
  });

  html+='</tbody></table></div>';
  return html;
}

function buildAdmin(dk){
  const todayPt=S.pointages[dk]||{};
  const aValider=EQUIPE.filter(e=>todayPt[e.id]&&!todayPt[e.id].valide_admin&&todayPt[e.id].arrive);

  let html=`<div style="background:#FFF8E1;border:1px solid #FFD54F;border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:12px;color:#E65100;">
    <strong>⚙️ Vue Admin</strong> — Validation heures · Retards · Export CSV<br>
    <span style="font-size:11px;color:#757575;">Heures hors planning → comptées seulement après votre validation. Alternance & stage : jamais de dépassement automatique.</span>
  </div>`;

  // Retards
  html+=`<div style="margin-bottom:14px;"><div style="font-size:12px;font-weight:700;color:#2E7D32;margin-bottom:8px;">Retards ce mois</div><div style="display:flex;gap:7px;flex-wrap:wrap;">`;
  EQUIPE.forEach(emp=>{
    const nb=S.retards[emp.id]||0;
    const c=nb>=RETARD_ALERTE?'#C62828':nb>0?'#E65100':'#2E7D32';
    const bg=nb>=RETARD_ALERTE?'#FFEBEE':nb>0?'#FFF3E0':'#E8F5E9';
    html+=`<div style="background:${bg};border-radius:8px;padding:8px 12px;text-align:center;min-width:90px;">
      <div style="font-size:18px;font-weight:800;color:${c};">${nb}</div>
      <div style="font-size:10px;color:${c};margin-top:2px;">${esc(emp.nom.split(' ')[0])}</div>
      ${nb>0?`<button data-pt-reset-retard="${emp.id}" style="font-size:9px;background:none;border:none;color:#1565C0;cursor:pointer;text-decoration:underline;font-family:inherit;margin-top:3px;">Reset</button>`:''}
    </div>`;
  });
  html+=`</div></div>`;

  // À valider
  if(aValider.length){
    html+=`<div style="font-size:12px;font-weight:700;color:#E65100;margin-bottom:7px;">⏳ En attente de validation (${aValider.length})</div>`;
    aValider.forEach(emp=>{
      const pt=todayPt[emp.id];
      html+=`<div style="background:#FFF8E1;border:1px solid #FFD54F;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div style="flex:1;"><div style="font-size:13px;font-weight:700;">${esc(emp.nom)}</div>
        <div style="font-size:11px;color:#757575;">Arrivée : ${fmtTime(pt.arrive)}${pt.depart?' · Départ : '+fmtTime(pt.depart):''}${pt.retard_min>0?` · <span style="color:#C62828;">Retard +${pt.retard_min}min</span>`:''}</div></div>
        <button data-pt-valider="${emp.id}" data-pt-date="${dk}" style="padding:7px 14px;background:#2E7D32;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">✅ Valider</button>
      </div>`;
    });
  } else {
    html+=`<div style="background:#E8F5E9;border-radius:8px;padding:10px 14px;font-size:12px;color:#2E7D32;margin-bottom:10px;">✅ Tous les pointages du jour sont validés</div>`;
  }

  html+=`<div style="margin-top:12px;"><button data-pt-export style="padding:8px 16px;background:#1565C0;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">⬇️ Exporter CSV semaine</button></div>`;
  return html;
}

// ── events ───────────────────────────────────────────────────────────────────
function handleClick(e){
  const t=e.target;
  const ptv=t.closest('[data-pt-view]'); if(ptv){S.view=ptv.dataset.ptView;render();return;}
  const pta=t.closest('[data-pt-action]'); if(pta){pointer(pta.dataset.ptEmp,pta.dataset.ptAction,null);return;}
  const ptval=t.closest('[data-pt-valider]'); if(ptval){valider(ptval.dataset.ptValider,ptval.dataset.ptDate);return;}
  const ptrr=t.closest('[data-pt-reset-retard]'); if(ptrr){resetRetard(ptrr.dataset.ptResetRetard);return;}
  const ptex=t.closest('[data-pt-export]'); if(ptex){exportCSV();return;}
}

// ── init public ──────────────────────────────────────────────────────────────
window.initPointageTab = function(userEmail, isAdmin){
  S.user=userEmail; S.admin=isAdmin;
  fbListen2('pointages',d=>{if(d&&typeof d==='object'){S.pointages=d;render();}});
  fbListen2('retards',d=>{if(d&&typeof d==='object'){S.retards=d;render();}});
  // Rafraîchir la durée toutes les 60s si présent
  setInterval(()=>{ if(S.view==='today') render(); },60000);
  render();
};

window._ptDebug = S;

})();
</script>
