<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AbracadaParc RH · Saison 2026</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#F4F8F4;min-height:100vh}
input,select,textarea,button{font-family:inherit}
input[type=date],input[type=time],input[type=number],input[type=text],input[type=email],input[type=color],input[type=password]{appearance:auto}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#C8E6C9;border-radius:3px}
@media print{.no-print{display:none!important}body{background:white!important}}

</head>
<body>
<div id="root"></div>
<div id="fallback-loader" style="font-family:system-ui;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#F4F8F4;gap:16px;">
  <span style="font-size:48px">🌿</span>
  <div style="font-size:18px;font-weight:800;color:#1B5E20">AbracadaParc RH</div>
  <div style="font-size:13px;color:#9E9E9E">Chargement en cours...</div>
  <div id="fallback-error" style="display:none;color:#C62828;font-size:12px;background:#FFEBEE;padding:12px 20px;border-radius:8px;max-width:400px;text-align:center"></div>
</div>
<script>
  // Masquer le fallback dès que React est monté
  var _fallbackTimer = setTimeout(function() {
    var fb = document.getElementById('fallback-loader');
    var root = document.getElementById('root');
    if (fb && root && !root.children.length) {
      document.getElementById('fallback-error').style.display = 'block';
      document.getElementById('fallback-error').textContent = 
        'Erreur de chargement. Vérifiez votre connexion puis rechargez la page (Ctrl+R).';
    }
  }, 6000);
  var _origRender = null;
  window.addEventListener('load', function() {
    setTimeout(function() {
      var root = document.getElementById('root');
      var fb = document.getElementById('fallback-loader');
      if (root && root.children.length > 0 && fb) {
        fb.style.display = 'none';
        clearTimeout(_fallbackTimer);
      }
    }, 500);
  });
  // Capturer les erreurs JS globales
  window.addEventListener('error', function(e) {
    var err = document.getElementById('fallback-error');
    if (err) {
      err.style.display = 'block';
      err.textContent = 'Erreur JS: ' + (e.message || 'inconnue') + ' (ligne ' + e.lineno + ')';
    }
  });
</script>
<script>
/**
 * ReservationsTab v5 — AbracadaParc
 * Nouveautés v5 :
 *   - ⚡ Mode "Sur place" (walk-in) accessible à tous y compris salariés
 *   - 📝 Onglet Mémos / Leads avec brouillon Gmail pré-rempli
 *   - Convertir un mémo en réservation en 1 clic
 */

(function () {
  'use strict';

  // ─── CONSTANTES ──────────────────────────────────────────────────────────────

  const FORMULES = [
    { id: 'magique',     label: "Abracada'Niv Magique",      prix: 160, prix_matin: 160, prix_apm: 160, base: 8, adultes_inclus: 2, desc: "8 enfants + 2 adultes inclus" },
    { id: 'fantastique', label: "Abracada'Niv Fantastique",  prix: 176, prix_matin: 176, prix_apm: 208, base: 8, adultes_inclus: 2, desc: "Matin 176€ · Après-midi 208€" },
    { id: 'gourmand',    label: "Abracada'Niv Gourmand",     prix: 232, base: 10, adultes_inclus: 2, desc: "Fantastique + repas inclus" },
    { id: 'classique',   label: "Abracada'Niv Classique",    prix: 250, base: 10, desc: "Formule complète standard" },
    { id: 'garden',      label: "Garden Party",              prix: 350, base: 15, desc: "Espace extérieur privatisé" },
    { id: 'night',       label: "Abracada'Night",            prix: 490, base: 20, desc: "Soirée privatisation complète" },
    { id: 'mesure',      label: "Sur mesure",                prix: 0,   base: 0,  desc: "Tarif personnalisé" },
  ];

  const SEGMENTS = [
    { id: 'anniversaire', label: '🎂 Anniversaire',       color: '#AD1457' },
    { id: 'scolaire',     label: '🏫 Scolaire',           color: '#1565C0' },
    { id: 'alsh',         label: '🏕️ ALSH / CDL',         color: '#2E7D32' },
    { id: 'privatisation',label: '🏡 Privatisation',      color: '#6A1B9A' },
    { id: 'groupe',       label: '👨‍👩‍👧 Groupe privé',       color: '#E65100' },
    { id: 'association',  label: '🌟 Association / IME',  color: '#00695C' },
    { id: 'entreprise',   label: '🏢 Entreprise / CE',    color: '#37474F' },
  ];

const CAL_EVENT_TYPES = [
  { id:"groupe", label:"Groupe prive", color:"#E65100", bg:"#FFF3E0" },
  { id:"scolaire", label:"Scolaire ALSH", color:"#1565C0", bg:"#E3F2FD" },
  { id:"association", label:"Association IME", color:"#00695C", bg:"#E0F2F1" },
  { id:"privatisation", label:"Privatisation", color:"#6A1B9A", bg:"#F3E5F5" },
  { id:"evenement", label:"Evenement", color:"#AD1457", bg:"#FCE4EC" },
];

  const STATUTS = [
    { id: '1', label: '1 — Demande reçue',          color: '#9E9E9E', bg: '#F5F5F5' },
    { id: '2', label: '2 — Devis envoyé',            color: '#1565C0', bg: '#E3F2FD' },
    { id: '3', label: '3 — Devis signé · Attente BC',color: '#E65100', bg: '#FFF3E0' },
    { id: '4', label: '4 — Confirmé · BC reçu',      color: '#2E7D32', bg: '#E8F5E9' },
    { id: '5', label: '5 — Visite · Facturation',    color: '#6A1B9A', bg: '#F3E5F5' },
    { id: '6', label: '6 — Chorus Pro déposé ✓',     color: '#1B5E20', bg: '#C8E6C9' },
  ];

  const NACIMA_TEL = '06 19 30 06 39';

  // ─── ÉTAT INTERNE ────────────────────────────────────────────────────────────

  let state = {
    reservations: {},
    memos: {},
    gateaux: {},
    view: 'liste',         // liste | calendrier | gateaux | memos
    segmentFilter: 'tous',
    statutFilter: 'tous',
    showForm: false,
    editId: null,
    walkin: false,         // ⚡ mode sur place
    showMemoForm: false,
    editMemoId: null,
    formData: {},
    memoData: {},
    alertsShown: false,
  };

  // ─── FIREBASE ────────────────────────────────────────────────────────────────

  function save(path, data) {
    // RÈGLE ABSOLUE : passer l'objet directement à fbSave — jamais JSON.stringify ici
    // fbSave normalise lui-même les données selon le path
    try { if (typeof fbSave === 'function') fbSave(path, data); } catch (e) {}
    try { localStorage.setItem('abr_' + path, JSON.stringify(data)); } catch (e) {}
  }

  function load(path, fallback) {
    try {
      const s = localStorage.getItem('abr_' + path);
      return s ? JSON.parse(s) : fallback;
    } catch (e) { return fallback; }
  }

  function listen(path, cb) {
    try {
      if (typeof fbListen === 'function') {
        fbListen(path, (raw) => {
          try { cb(typeof raw === 'string' ? JSON.parse(raw) : raw); } catch (e) {}
        });
      }
    } catch (e) {}
  }

  // ─── HELPERS ─────────────────────────────────────────────────────────────────

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function today() { return new Date().toISOString().slice(0, 10); }
  function nowTime() {
    const d = new Date();
    const h = d.getHours();
    const hNext = h < 23 ? h + 1 : 23;
    return String(hNext).padStart(2, '0') + ':00';
  }
  function fmtDate(s) {
    if (!s) return '—';
    const [y, m, d] = s.split('-');
    return `${d}/${m}/${y}`;
  }
  function fmtDateShort(s) {
    if (!s) return '—';
    const d = new Date(s + 'T12:00');
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
  }
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function getStatut(id) { return STATUTS.find(s => s.id === id) || STATUTS[0]; }
  function getSegment(id) { return SEGMENTS.find(s => s.id === id) || SEGMENTS[0]; }
  function getFormule(id) { return FORMULES.find(f => f.id === id); }

  function calcTotal(r) {
    // Lire directement le montant Firebase — source de vérité unique
    if (r.montant_total && parseFloat(r.montant_total) > 0) return parseFloat(r.montant_total);
    if (r.total        && parseFloat(r.total)         > 0) return parseFloat(r.total);
    return 0;
  }

  // SOURCE DE VÉRITÉ UNIQUE — utilisée par toutes les vues
  // Déduplique par r.id, filtre les parasites, trie par date
  function getReservations() {
    var seen = {};
    var result = [];
    // Accepte toutes les fiches valides quelle que soit la forme de l'ID
    // Une fiche valide = objet avec un id string + (segment OU date OU organisation)
    function estFicheValide(r) {
      if (!r || typeof r !== 'object') return false;
      if (!r.id || typeof r.id !== 'string' || r.id.length < 3) return false;
      // Exclure les clés système Firebase (abr_memos, abr_reservations, etc.)
      if (/^abr_/.test(r.id)) return false;
      // Doit avoir au moins un champ métier
      
      // Masquer les REFUSÉS (gardés dans Firebase pour historique)
      var _dec = ((r.decision || '')).toString().toUpperCase();
      if (_dec === 'REFUSE' || _dec === 'REFUSÉ') return false;
      // Masquer les devis refusés blacklistés (pas de client, pas de date)
      var REFUSES_IDS = ['DEV20250184','DEV20250185','DEV20250187','DEV20250191',
                         'DEV20250192','DEV20250193','DEV20250194','DEV20250201'];
      if (REFUSES_IDS.indexOf((r.id||'').toString()) >= 0) return false;
      if (REFUSES_IDS.indexOf((r.organisation||'').toString()) >= 0) return false;
      // Masquer fiches orphelines : id=ref devis, aucun nom client, aucune date
      if (!r.date && !r.prenom_enfant && !r.nom_contact && r.organisation &&
          /DEV\d{8}/.test(r.organisation)) return false;
      return !!(r.segment || r.date || r.organisation || r.prenom_enfant || r.nom_contact);
    }
    // Passe 1 : clé Firebase = id de la fiche (fiches propres)
    Object.keys(state.reservations).forEach(function(key) {
      var r = state.reservations[key];
      if (!estFicheValide(r)) return;
      if (key === r.id && !seen[r.id]) { seen[r.id] = true; result.push(r); }
    });
    // Passe 2 : clé Firebase différente de l'id (fiches temporaires ou mal indexées)
    Object.keys(state.reservations).forEach(function(key) {
      var r = state.reservations[key];
      if (!estFicheValide(r)) return;
      var idKey = r.id || key;
      if (!seen[idKey]) { seen[idKey] = true; result.push(r); }
    });
    const _today = today();
    return result.sort(function(a, b) {
      const aDate = a.date || '';
      const bDate = b.date || '';
      const aFut = aDate >= _today;
      const bFut = bDate >= _today;
      // Futurs en premier, passés en bas
      if (aFut && !bFut) return -1;
      if (!aFut && bFut) return 1;
      // Dans chaque groupe : tri par date ASC
      return aDate.localeCompare(bDate);
    });
  }

  function filteredReservations() {
    return getReservations().filter(function(r) {
      if (state.segmentFilter !== 'tous' && r.segment !== state.segmentFilter) return false;
      if (state.statutFilter !== 'tous' && String(r.statut) !== String(state.statutFilter)) return false;
      return true;
    });
  }

  // ─── GMAIL COMPOSE URL ───────────────────────────────────────────────────────

  function openGmailDraft(to, subject, body) {
    const url = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(to)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.open(url, '_blank');
  }

  function buildEmailInfos(memo) {
    const subject = `AbracadaParc — Votre demande de renseignements`;
    const body = `Bonjour ${memo.prenom || ''} ${memo.nom || ''},

Merci de l'intérêt que vous portez à AbracadaParc !

Suite à votre demande concernant : ${memo.type_event || 'votre événement'}
Date souhaitée : ${fmtDate(memo.date_souhaitee) || 'à définir'}
Nombre de personnes : ${memo.nb_personnes || 'à préciser'}

Nous serions ravis de vous accueillir à Goussainville pour cet événement.

${memo.type_event === 'anniversaire' ? `Nos formules anniversaire démarrent à 160 € pour 8 enfants et incluent décoration, bonbons et animation. Voici le lien de réservation en ligne : https://abracadaparc.fr/anniversaire` : `Pour toute privatisation ou réservation de groupe, nous vous invitons à nous contacter directement afin d'établir un devis personnalisé.`}

N'hésitez pas à nous appeler au 06 64 03 56 73 ou à répondre à cet email.

À très bientôt à AbracadaParc !

Vanessa Schweitzer
Fondatrice & Dirigeante — AbracadaParc
contact@abracadaparc.fr | 06 64 03 56 73
abracadaparc.fr`;
    return { subject, body };
  }

  function buildEmailDevis(memo) {
    const f = FORMULES[1]; // Fantastique par défaut
    const subject = `AbracadaParc — Devis ${memo.type_event || 'événement'} · ${memo.nom || ''}`;
    const body = `Bonjour ${memo.prenom || ''} ${memo.nom || ''},

Suite à votre passage au parc, veuillez trouver ci-après notre proposition pour votre ${memo.type_event || 'événement'}.

📅 Date souhaitée : ${fmtDate(memo.date_souhaitee) || 'à définir'}
👥 Nombre de personnes : ${memo.nb_personnes || 'à préciser'}
📌 Type d'événement : ${memo.type_event || ''}

--- DEVIS ---
[À compléter selon la formule choisie]

Pour valider votre réservation, un acompte de 100 € est demandé.

Je reste disponible pour toute question au 06 64 03 56 73.

À très bientôt,

Vanessa Schweitzer
AbracadaParc · Goussainville (95)
contact@abracadaparc.fr`;
    return { subject, body };
  }

  // ─── ALERTES GÂTEAUX ─────────────────────────────────────────────────────────

  function getGateauxAlertes() {
    const alertes = [];
    const todayStr = today();
    Object.values(state.reservations).forEach(r => {
      if (!r.gateau_nacima || !r.date) return;
      const dateVisite = new Date(r.date + 'T12:00');
      const diffJ = Math.round((dateVisite - new Date(todayStr + 'T12:00')) / 86400000);
      if (diffJ <= 10 && diffJ >= 0) {
        alertes.push({ r, diffJ, urgent: diffJ <= 7 });
      }
    });
    return alertes.sort((a, b) => a.diffJ - b.diffJ);
  }

  // ─── RENDU PRINCIPAL ─────────────────────────────────────────────────────────

  function render() {
    const el = document.getElementById('tab-reservations');
    if (!el) return;
    // Si un employé se retrouve sur l'onglet Liste (non autorisé), rediriger
    if (state.currentUser !== 'Admin' && (state.view === 'liste' || state.view === 'memos')) {
      state.view = 'calendrier';
    }
    el.innerHTML = buildHTML();
    bindEvents();
  }

  function buildHTML() {
    const alertes = getGateauxAlertes();
    const memos = Object.values(state.memos).filter(m => !m.converted);
    return `
<div id="res-root" style="font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#212121;">

  ${/* ALERTES GÂTEAUX */ alertes.length ? `
  <div style="background:#FBE9E7;border:2px solid #FFAB91;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;">
    <span style="font-size:22px;flex-shrink:0;">🎂</span>
    <div style="flex:1;">
      <div style="font-size:13px;font-weight:800;color:#BF360C;margin-bottom:6px;">Commandes gâteaux à passer — ${NACIMA_TEL}</div>
      ${alertes.map(a => `
      <div style="font-size:12px;color:${a.urgent ? '#C62828' : '#E65100'};margin-bottom:2px;">
        ${a.urgent ? '🔴' : '🟡'} <strong>${a.r.prenom_enfant || a.r.nom_contact || 'Réservation'}</strong> · ${fmtDate(a.r.date)} · J-${a.diffJ}
        · ${a.r.gateau_type || 'gâteau'} ${a.r.gateau_inscription ? `"${esc(a.r.gateau_inscription)}"` : ''}
      </div>`).join('')}
    </div>
    <a href="tel:${NACIMA_TEL.replace(/ /g,'')}" style="background:#C62828;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;text-decoration:none;flex-shrink:0;cursor:pointer;">
      📞 Nacima
    </a>
  </div>` : ''}

  ${/* ONGLETS — Liste et Mémos masqués pour les employés */`
  <div style="display:flex;gap:0;border-bottom:2px solid #E8F5E9;margin-bottom:16px;overflow-x:auto;">
    ${(state.currentUser === 'Admin' ? [
      ['liste',      '📋 Liste'],
      ['calendrier', '📅 Calendrier'],
      ['terrain',    '📍 Terrain'],
      ['gateaux',    '🎂 Gâteaux'],
      ['memos',      '📝 Mémos' + (memos.length ? ' <span style="background:#E53935;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;">' + memos.length + '</span>' : '')],
    ] : [
      ['calendrier', '📅 Calendrier'],
      ['terrain',    '📍 Terrain'],
      ['gateaux',    '🎂 Gâteaux'],
    ]).map(([v, l]) =>
      '<button data-view="' + v + '" style="padding:10px 16px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:12px;white-space:nowrap;font-weight:' + (state.view===v?700:400) + ';color:' + (state.view===v?'#2E7D32':'#9E9E9E') + ';border-bottom:' + (state.view===v?'2.5px solid #2E7D32':'2.5px solid transparent') + ';margin-bottom:-2px;">' + l + '</button>'
    ).join('')}
    <div style="flex:1;"></div>
    ${state.currentUser === 'Admin' ? (
      '<button id="btn-new-res" style="margin:4px 8px;padding:7px 14px;background:#2E7D32;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">+ Réservation</button>' +
      '<button id="btn-walkin" style="margin:4px 8px;padding:7px 14px;background:#E65100;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">⚡ Sur place</button>' +
      '<button id="btn-new-memo" style="margin:4px 8px;padding:7px 14px;background:#1565C0;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">📝 Mémo</button>'
    ) : (
      '<button id="btn-walkin" style="margin:4px 8px;padding:7px 14px;background:#E65100;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">⚡ Sur place</button>'
    )}
  </div>`}

  ${/* CONTENU SELON VUE */
    state.view === 'liste'      ? buildListeView() :
    state.view === 'calendrier' ? buildCalView() :
    state.view === 'terrain'    ? buildTerrainView() :
    state.view === 'gateaux'    ? buildGateauxView() :
    state.view === 'memos'      ? buildMemosView() : ''}

  ${/* MODAL RÉSERVATION */ state.showForm ? buildFormModal() : ''}
  ${/* MODAL MÉMO */ state.showMemoForm ? buildMemoModal() : ''}

</div>`;
  }

  // ─── MODAL HISTORIQUE ────────────────────────────────────────────────────────
  function buildHistoryModal(r) {
    var nom = esc(r.prenom_enfant || r.organisation || r.nom_contact || 'Réservation');
    var history = r.history || [];
    var rows = history.length === 0
      ? '<div style="text-align:center;padding:30px;color:#9E9E9E;font-size:13px;">Aucune modification enregistrée</div>'
      : history.map(function(h) {
          var changes = (h.changes || []).map(function(c) {
            return '<div style="font-size:12px;color:#424242;padding:2px 0;">• ' + esc(c) + '</div>';
          }).join('');
          var alertBg = h.alert ? '#FFF8E1' : '#F9F9F9';
          var alertBorder = h.alert ? '#FFD54F' : '#EEEEEE';
          var date = h.ts ? new Date(h.ts).toLocaleString('fr-FR', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
          return '<div style="background:' + alertBg + ';border:1px solid ' + alertBorder + ';border-radius:8px;padding:10px 14px;margin-bottom:8px;">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
              '<span style="font-size:12px;font-weight:700;color:#2E7D32;">' + esc(h.by || 'Admin') + '</span>' +
              '<span style="font-size:11px;color:#9E9E9E;">' + date + '</span>' +
            '</div>' +
            changes +
          '</div>';
        }).join('');

    return '<div id="history-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px">' +
      '<div style="background:#fff;border-radius:16px;padding:24px 28px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.25);max-height:80vh;overflow-y:auto">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
          '<div style="font-size:15px;font-weight:800;color:#1B5E20">📋 Historique</div>' +
          '<button id="close-history-modal" style="background:none;border:none;font-size:24px;cursor:pointer;color:#9E9E9E">×</button>' +
        '</div>' +
        '<div style="font-size:12px;color:#9E9E9E;margin-bottom:16px;">' + nom + ' · ' + (r.date || '—') + '</div>' +
        '<div>' + rows + '</div>' +
      '</div>' +
    '</div>';
  }

  // ─── VUE LISTE ────────────────────────────────────────────────────────────────

  function buildListeView() {
    const list = filteredReservations();
    return `
<div>
  <!-- Filtres -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
    <select id="flt-segment" style="padding:6px 10px;border:1.5px solid #C8E6C9;border-radius:8px;font-size:12px;font-family:inherit;color:#2E7D32;background:#fff;">
      <option value="tous">Tous segments</option>
      ${SEGMENTS.map(s => `<option value="${s.id}" ${state.segmentFilter===s.id?'selected':''}>${s.label}</option>`).join('')}
    </select>
    <select id="flt-statut" style="padding:6px 10px;border:1.5px solid #C8E6C9;border-radius:8px;font-size:12px;font-family:inherit;color:#2E7D32;background:#fff;">
      <option value="tous">Tous statuts</option>
      ${STATUTS.map(s => `<option value="${s.id}" ${state.statutFilter===s.id?'selected':''}>${s.label}</option>`).join('')}
    </select>
    <div style="margin-left:auto;font-size:11px;color:#9E9E9E;align-self:center;">${list.length} réservation${list.length>1?'s':''}</div>
  </div>

  <!-- Stats rapides -->
  ${buildStats()}

  <!-- Liste -->
  <div style="display:flex;flex-direction:column;gap:8px;">
    ${list.length === 0 ? '<div style="text-align:center;padding:40px;color:#9E9E9E;font-size:13px;">Aucune réservation — cliquez sur + Réservation ou ⚡ Sur place</div>' :
      (function() {
        var todayS2 = today();
        var futurs2 = list.filter(function(r){ return !r.date || r.date >= todayS2; });
        var passes2  = list.filter(function(r){ return r.date && r.date < todayS2; });
        var out = futurs2.map(function(r){ return buildReservationCard(r); }).join('');
        if (passes2.length > 0) {
          out += '<div style="margin:16px 0 8px;display:flex;align-items:center;gap:10px;">' +
            '<div style="flex:1;height:1px;background:#E0E0E0;"></div>' +
            '<span style="font-size:11px;font-weight:700;color:#BDBDBD;white-space:nowrap;">— ' + passes2.length + ' visite(s) passée(s) —</span>' +
            '<div style="flex:1;height:1px;background:#E0E0E0;"></div>' +
            '</div>';
          out += passes2.map(function(r){ return buildReservationCard(r); }).join('');
        }
        return out;
      })()}
  </div>
</div>`;
  }

  function buildGCalUrl(r, hFinOverride) {
    if (!r || !r.date) return '#';
    var d = r.date.replace(/-/g, '');
    var debH = (r.heure_debut || '10:00').replace(':', '') + '00';
    var hFin = hFinOverride || r.heure_fin || '';
    if (!hFin) {
      var cr = (r.creneau || r.formule || '').toLowerCase();
      if (cr.includes('matin') || cr.includes('12h30') || cr.includes('12:30')) hFin = '12:30';
      else if (cr.includes('après-midi') || cr.includes('apres-midi') || cr.includes('standard')) hFin = '17:00';
      else if (r.heure_debut === '14:00' || r.heure_debut === '14h') hFin = '17:00';
      else hFin = '17:00';
    }
    var finH = hFin.replace(':', '') + '00';
    var titre = encodeURIComponent('🌿 AbracadaParc — ' + (r.prenom_enfant || r.organisation || r.nom_contact || 'Réservation'));
    var details = encodeURIComponent([
      'N° : ' + (r.id || ''),
      r.organisation ? '🏫 ' + r.organisation : '',
      r.effectif_total ? '👥 ' + r.effectif_total + ' pers.' : (r.effectif_enfants ? '👶 ' + r.effectif_enfants + ' enf.' : ''),
      'Total : ' + (r.montant_total || calcTotal(r) || '') + '€',
      r.nom_contact ? '👤 ' + r.nom_contact : '',
      r.tel ? '📞 ' + r.tel : '',
      r.notes ? '💬 ' + r.notes.slice(0, 100) : ''
    ].filter(Boolean).join('\n'));
    var lieu = encodeURIComponent('AbracadaParc, 6 Place Hyacinthe Drujon, 95190 Goussainville');
    return 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
      '&text=' + titre +
      '&dates=' + d + 'T' + debH + '/' + d + 'T' + finH +
      '&details=' + details +
      '&location=' + lieu;
  }

  function buildStats() {
    var all = getReservations();
    var todayS = today();
    var futurs = all.filter(function(r){ return !r.date || r.date >= todayS; });

    // CA par décision
    var caValides   = all.filter(function(r){ return (r.decision||'').toUpperCase() === 'VALIDE'; })
                         .reduce(function(s,r){ return s + calcTotal(r); }, 0);
    var caAttente   = all.filter(function(r){ var d=(r.decision||'').toUpperCase(); return d !== 'VALIDE' && d !== 'REFUSE'; })
                         .reduce(function(s,r){ return s + calcTotal(r); }, 0);
    var caTotal     = caValides + caAttente;
    var caConf      = all.filter(function(r){ return parseInt(r.statut||'1') >= 4; })
                         .reduce(function(s,r){ return s + calcTotal(r); }, 0);

    // Soldes dus = futurs uniquement (pas les passés déjà honorés)
    var soldes = futurs.filter(function(r){ return r.statut !== '6'; })
                    .reduce(function(s,r){
                      var t = calcTotal(r), a = parseFloat(r.acompte_paye)||0;
                      return s + Math.max(0, t - a);
                    }, 0);
    var walkins = all.filter(function(r){ return r.walkin; }).length;

    // KPIs principaux
    var kpis = [
      {l:'Total réservations', v: String(all.length),                          c:'#2E7D32', bg:'#E8F5E9'},
      {l:'CA total',           v: caTotal.toLocaleString('fr') + ' €',    c:'#1565C0', bg:'#E3F2FD'},
      {l:'Soldes dus',         v: soldes.toLocaleString('fr') + ' €',     c: soldes>0?'#C62828':'#2E7D32', bg: soldes>0?'#FFEBEE':'#E8F5E9'},
      {l:'Walk-ins sur place', v: String(walkins),                              c:'#E65100', bg:'#FFF3E0'},
    ];
    var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:8px;">';
    kpis.forEach(function(k) {
      html += '<div style="background:' + k.bg + ';border-radius:10px;padding:10px 12px;text-align:center;">'
            + '<div style="font-size:18px;font-weight:800;color:' + k.c + ';">' + k.v + '</div>'
            + '<div style="font-size:10px;color:' + k.c + ';opacity:0.8;margin-top:2px;">' + k.l + '</div>'
            + '</div>';
    });
    html += '</div>';

    // Ligne CA décomposé : validés vs en attente
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center;">';
    html += '<div style="display:flex;align-items:center;gap:6px;background:#E8F5E9;border-radius:8px;padding:6px 12px;">'
          + '<span style="font-size:11px;font-weight:700;color:#2E7D32;">✅ Validés</span>'
          + '<span style="font-size:13px;font-weight:800;color:#1B5E20;">' + caValides.toLocaleString('fr') + ' €</span>'
          + '</div>';
    html += '<div style="font-size:14px;color:#BDBDBD;">+</div>';
    html += '<div style="display:flex;align-items:center;gap:6px;background:#FFF8E1;border-radius:8px;padding:6px 12px;">'
          + '<span style="font-size:11px;font-weight:700;color:#F57F17;">⏳ En attente</span>'
          + '<span style="font-size:13px;font-weight:800;color:#E65100;">' + caAttente.toLocaleString('fr') + ' €</span>'
          + '</div>';
    html += '<div style="font-size:14px;color:#BDBDBD;">=</div>';
    html += '<div style="display:flex;align-items:center;gap:6px;background:#E3F2FD;border-radius:8px;padding:6px 12px;">'
          + '<span style="font-size:11px;font-weight:700;color:#1565C0;">📊 Total pipeline</span>'
          + '<span style="font-size:13px;font-weight:800;color:#0D47A1;">' + caTotal.toLocaleString('fr') + ' €</span>'
          + '</div>';
    html += '</div>';

    html += '<div style="font-size:10px;color:#9E9E9E;margin-bottom:10px;text-align:right;">'
          + 'dont ' + caConf.toLocaleString('fr') + ' € confirmés (S4+)</div>';
    return html;
  }

  function buildReservationCard(r) {
    const st = getStatut(r.statut || '1');
    const seg = getSegment(r.segment);
    const total = calcTotal(r);
    const acompte = parseFloat(r.acompte_paye) || 0;
    const solde = Math.max(0, total - acompte);
    // Griser les réservations passées (date < aujourd'hui)
    const isPast = r.date && r.date < today() && r.statut !== '0';
    return `
<div style="background:${isPast?'#FAFAFA':'#fff'};border:1px solid ${isPast?'#EEEEEE':'#E8F5E9'};border-radius:12px;padding:14px 16px;border-left:4px solid ${isPast?'#BDBDBD':seg.color};opacity:${isPast?0.6:1};">
  <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;">
    <div style="flex:1;min-width:200px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
        <span style="font-size:13px;font-weight:800;color:#212121;">
          ${esc(r.prenom_enfant || r.nom_contact || r.ref || '—')}
          ${r.nom_contact && r.prenom_enfant ? `<span style="font-weight:400;color:#9E9E9E;">· ${esc(r.nom_contact)}</span>` : ''}
        </span>
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:${seg.color}18;color:${seg.color};">${seg.label}</span>
        ${r.walkin ? '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:#FFF3E0;color:#E65100;">⚡ Sur place</span>' : ''}
      </div>
      <div style="font-size:12px;color:#616161;">
        📅 ${fmtDate(r.date)} ${(function() {
          if (!r.heure_debut) return '';
          var fin = r.heure_fin || '';
          // Déduire heure_fin si absente depuis la formule/créneau
          if (!fin) {
            var cren = (r.creneau || r.formule || '').toLowerCase();
            if (cren.includes('matin') || cren.includes('12h30') || cren.includes('12:30')) fin = '12:30';
            else if (cren.includes('après-midi') || cren.includes('apres-midi') || cren.includes('14h') || cren === 'standard') fin = '17:00';
            else if (r.heure_debut === '10:00' || r.heure_debut === '10h') fin = '17:00';
            else if (r.heure_debut === '14:00' || r.heure_debut === '14h') fin = '17:00';
          }
          return '· ' + r.heure_debut + (fin ? '–' + fin : '');
        })()}
        ${r.effectif_total ? `· 👥 ${r.effectif_total} pers.` : ''}
        ${r.formule_id ? `· ${getFormule(r.formule_id)?.label || ''}` : ''}
      </div>
      ${r.notes ? `<div style="font-size:11px;color:#9E9E9E;margin-top:4px;font-style:italic;">💬 ${esc(r.notes.slice(0,80))}${r.notes.length>80?'…':''}</div>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
      <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:${st.bg};color:${st.color};">${st.label}</span>
      ${total > 0 ? `
      <div style="text-align:right;">
        <div style="font-size:13px;font-weight:800;color:#1B5E20;">${total.toLocaleString('fr')} €</div>
        ${acompte > 0 ? `<div style="font-size:10px;color:#9E9E9E;">Acompte : ${acompte.toLocaleString('fr')} €</div>` : ''}
        ${solde > 0 ? `<div style="font-size:11px;font-weight:700;color:#C62828;">Solde : ${solde.toLocaleString('fr')} €</div>` : `<div style="font-size:10px;color:#2E7D32;">✅ Réglé</div>`}
        ${r.mode_paiement ? `<div style="font-size:10px;color:#757575;margin-top:1px;">${({'internet_cb':'💳 CB','virement':'🏦 Virement','especes':'💵 Espèces','cheque':'📝 Chèque','cheque_vacances':'🏖️ CV','bon_commande':'📋 BC','cb':'💳 CB sur place','Carte':'💳 Carte','Virement':'🏦 Virement','BC':'📋 BC','Chèque':'📝 Chèque','Espèces':'💵 Espèces'}[r.mode_paiement] || r.mode_paiement)}</div>` : ''}
      </div>` : ''}
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        ${r.statut !== '6' ? `
        <button data-advance="${r.id}" style="padding:4px 8px;background:#E8F5E9;color:#2E7D32;border:1px solid #C8E6C9;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;">Avancer →</button>` : ''}
        <button data-edit="${r.id}" style="padding:4px 8px;background:#F5F5F5;color:#424242;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;">✏️</button>
        <button data-history="${r.id}" style="padding:4px 8px;background:#E3F2FD;color:#1565C0;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;">📋 ${r.history && r.history.length > 0 ? r.history.length : ''}</button>
        ${r.drive_dossier_url ? `<a href="${r.drive_dossier_url}" target="_blank" title="Dossier Drive" style="padding:4px 8px;background:#E8F5E9;color:#2E7D32;border:none;border-radius:6px;font-size:11px;text-decoration:none;display:inline-flex;align-items:center;">📁</a>` : ''}
        ${r.gmail_devis_url ? `<a href="${r.gmail_devis_url}" target="_blank" title="Devis Gmail" style="padding:4px 8px;background:#FFF3E0;color:#E65100;border:none;border-radius:6px;font-size:11px;text-decoration:none;display:inline-flex;align-items:center;">📧</a>` : ''}
        ${r.gmail_bc_url ? `<a href="${r.gmail_bc_url}" target="_blank" title="BC Gmail" style="padding:4px 8px;background:#E3F2FD;color:#1565C0;border:none;border-radius:6px;font-size:11px;text-decoration:none;display:inline-flex;align-items:center;">📋 BC</a>` : ''}
        <button data-delete="${r.id}" style="padding:4px 8px;background:#FFEBEE;color:#C62828;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;">🗑</button>
      </div>
    </div>
  </div>
</div>`;
  }

  // ─── MODAL DÉTAIL RÉSERVATION (clic calendrier) ─────────────────────────────
  function buildResaDetailModal(r) {
    var seg = getSegment(r.segment);
    var st = getStatut(r.statut || '1');
    var isAnniv = r.segment === 'anniversaire' && (r.type === 'anniversaire' || r.type === 'anniv' || (!r.type && r.prenom_enfant));
    var nom = esc(r.prenom_enfant || r.organisation || r.nom_contact || r.client || '—');
    var dateStr = r.date ? new Date(r.date + 'T12:00').toLocaleDateString('fr-FR', {weekday:'long',day:'2-digit',month:'long',year:'numeric'}) : '—';
    var total = calcTotal(r);
    var acompte = parseFloat(r.acompte_paye || r.acompte_recu || 0);
    var solde = Math.max(0, total - acompte);
    var soldeColor = solde > 0 ? '#C62828' : '#1B5E20';
    var hFin = r.heure_fin || r.creneau_fin || '';
    if (!hFin) {
      var crLow = (r.creneau || r.formule || '').toLowerCase();
      if (r.creneau && r.creneau.indexOf(' - ') >= 0) {
        hFin = r.creneau.split(' - ')[1] || '';
      } else if (crLow.indexOf('13h') >= 0 || crLow.indexOf('13:') >= 0) { hFin = '13:00'; }
      else if (crLow.indexOf('17h30') >= 0) { hFin = '17:30'; }
      else if (r.heure_debut === '10:00' || r.heure_debut === '10h') { hFin = '17:00'; }
      else if (r.heure_debut === '14:00' || r.heure_debut === '14h' || r.heure_debut === '14:30') { hFin = '17:00'; }
    }

    // ── LIGNE TAGS ──────────────────────────────────────────────────────────────
    var tagsHtml = '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;">';
    tagsHtml += '<span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:' + seg.color + '18;color:' + seg.color + ';">' + seg.label + '</span>';
    tagsHtml += '<span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:' + st.bg + ';color:' + st.color + ';">' + st.label + '</span>';
    if (r.ref || r.id) tagsHtml += '<span style="padding:3px 10px;border-radius:20px;font-size:10px;background:#F5F5F5;color:#9E9E9E;">' + esc(r.ref || r.id) + '</span>';
    if (r.formule || r.formule_id) tagsHtml += '<span style="padding:3px 10px;border-radius:20px;font-size:10px;background:#E8F5E9;color:#2E7D32;">' + esc(r.formule || r.formule_id || '') + '</span>';
    tagsHtml += '</div>';

    // ── SECTION DATE / HORAIRES ─────────────────────────────────────────────────
    var dateHtml = '<div style="background:#F1F8E9;border-radius:10px;padding:10px 14px;margin-bottom:10px;">';
    dateHtml += '<div style="font-size:13px;font-weight:800;color:#1B5E20;margin-bottom:4px;">📅 ' + dateStr + '</div>';
    dateHtml += '<div style="font-size:12px;color:#424242;">⏰ ' + (r.heure_debut || r.creneau || '—') + (hFin ? ' → ' + hFin : '') + '</div>';
    dateHtml += '</div>';

    // ── SECTION PARTICIPANTS ─────────────────────────────────────────────────────
    var nbEnf = parseInt(r.enfants || r.nb_enfants || r.effectif_enfants || 0);
    var nbAduInclus = parseInt(r.adultes_inclus || 2);
    var nbAduSupp = parseInt(r.adultes_supp || r.effectif_adultes_supp || 0);
    var nbAduTotal = nbAduInclus + nbAduSupp;
    var participantsHtml = '';
    if (isAnniv && (nbEnf > 0 || nbAduTotal > 0)) {
      participantsHtml = '<div style="background:#FFF8E1;border-radius:10px;padding:10px 14px;margin-bottom:10px;">';
      participantsHtml += '<div style="font-size:11px;font-weight:700;color:#E65100;text-transform:uppercase;margin-bottom:6px;">👥 Participants</div>';
      participantsHtml += '<div style="font-size:13px;color:#424242;">';
      if (nbEnf > 0) participantsHtml += '👶 <strong>' + nbEnf + ' enfant' + (nbEnf > 1 ? 's' : '') + '</strong>';
      if (nbAduTotal > 0) participantsHtml += ' · 👨‍👩‍👧 ' + nbAduInclus + ' adulte' + (nbAduInclus > 1 ? 's' : '') + ' inclus' + (nbAduSupp > 0 ? ' + ' + nbAduSupp + ' supp.' : '');
      participantsHtml += '</div>';
      // Enfant star
      if (r.prenom_enfant || r.enfant) {
        participantsHtml += '<div style="margin-top:5px;font-size:12px;color:#424242;">🎂 <strong>' + esc(r.prenom_enfant || r.enfant || '') + '</strong>';
        if (r.age_enfant || r.age) participantsHtml += ' · ' + (r.age_enfant || r.age) + ' ans';
        if (r.ddn) participantsHtml += ' · né(e) le ' + new Date(r.ddn).toLocaleDateString('fr-FR');
        participantsHtml += '</div>';
      }
      // Liste invités
      if (r.invites) {
        participantsHtml += '<div style="margin-top:5px;font-size:11px;color:#757575;">🎈 <em>' + esc(r.invites) + '</em></div>';
      }
      participantsHtml += '</div>';
    } else if (!isAnniv) {
      var nbGroupe = parseInt(r.enfants || r.nb_enfants || r.effectif_total || 0);
      if (nbGroupe > 0) {
        participantsHtml = '<div style="background:#FFF8E1;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#424242;">';
        participantsHtml += '👥 <strong>' + nbGroupe + ' enfant' + (nbGroupe > 1 ? 's' : '') + '</strong>';
        if (r.organisation || r.client) participantsHtml += ' · ' + esc(r.organisation || r.client);
        participantsHtml += '</div>';
      }
    }

    // ── SECTION GÂTEAU ──────────────────────────────────────────────────────────
    var gateauHtml = '';
    var gateauVal = r.gateau || r.gateau_nacima || r.gateau_type || '';
    if (isAnniv && gateauVal) {
      gateauHtml = '<div style="background:#FCE4EC;border-radius:10px;padding:10px 14px;margin-bottom:10px;">';
      gateauHtml += '<div style="font-size:11px;font-weight:700;color:#AD1457;text-transform:uppercase;margin-bottom:4px;">🎂 Gâteau Nacima</div>';
      gateauHtml += '<div style="font-size:13px;color:#424242;">' + esc(gateauVal) + '</div>';
      if (r.gateau_inscription) gateauHtml += '<div style="font-size:11px;color:#757575;margin-top:2px;">✏️ Inscription : "' + esc(r.gateau_inscription) + '"</div>';
      if (r.gateau_allergies && r.gateau_allergies !== 'aucune' && r.gateau_allergies !== '') {
        gateauHtml += '<div style="margin-top:4px;font-size:12px;font-weight:700;color:#C62828;">⚠️ Allergies : ' + esc(r.gateau_allergies) + '</div>';
      }
      var gcmd = r.gateau_commande;
      var gcmdLabel = gcmd === 'livre' ? '🎂 Réceptionné ✅' : gcmd === 'prevu' ? '📅 Livraison prévue' : gcmd ? '✅ Commandé' : '⏳ À commander chez Nacima';
      gateauHtml += '<div style="margin-top:4px;font-size:11px;color:' + (gcmd ? '#2E7D32' : '#E65100') + ';">' + gcmdLabel + '</div>';
      gateauHtml += '</div>';
    }

    // ── SECTION ANIMATEUR ───────────────────────────────────────────────────────
    var animHtml = '';
    if (isAnniv && (r.animateur || r.option_animateur)) {
      animHtml = '<div style="background:#E8EAF6;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#3949AB;">🎭 <strong>Animateur</strong> inclus</div>';
    }

    // ── SECTION CONTACT ─────────────────────────────────────────────────────────
    var contactHtml = '';
    var clientNom = r.nom_contact || r.client || r.structure || '';
    var tel = r.tel || r.tel_contact || r.tel_client || '';
    var email = r.email_contact || r.email || r.email_client || '';
    var adresse = r.adresse || r.adresse_facturation || '';
    if (clientNom || tel || email) {
      contactHtml = '<div style="border-top:1px solid #E8F5E9;padding-top:10px;margin-bottom:10px;">';
      if (clientNom) contactHtml += '<div style="font-size:12px;color:#424242;margin-bottom:2px;">👤 ' + esc(clientNom) + '</div>';
      if (tel) contactHtml += '<div style="font-size:12px;"><a href="tel:' + esc(tel) + '" style="color:#1565C0;text-decoration:none;">📞 ' + esc(tel) + '</a></div>';
      if (email) contactHtml += '<div style="font-size:11px;color:#757575;">📧 ' + esc(email) + '</div>';

      payHtml += '<div><div style="font-size:10px;color:#9E9E9E;">Solde à encaisser</div><div style="font-size:15px;font-weight:900;color:' + soldeColor + ';">' + solde.toLocaleString('fr') + ' €</div></div>';

    // ── NOTES ────────────────────────────────────────────────────────────────────

    // ── ALERTE SOLDE EN ROUGE SI FUTUR ──────────────────────────────────────────
    var alertHtml = '';
    if (solde > 0 && r.date && r.date >= new Date().toISOString().slice(0,10)) {

      '<div style="background:#fff;border-radius:16px;padding:20px 24px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.25);max-height:90vh;overflow-y:auto">' +

  // ─── VUE CALENDRIER ──────────────────────────────────────────────────────────

  function buildCalView() {
    if (!state.calYear) { state.calYear = new Date().getFullYear(); state.calMonth = new Date().getMonth(); }
    const year = state.calYear;
    const month = state.calMonth;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const nomsMois = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

    // Indexer les réservations par jour (S3+ pour groupes, toujours pour anniversaires)
    var byDay = {};
    getReservations().forEach(function(r) {
      if (!r.date) return;
      var isAnniv = r.segment === 'anniversaire' && (r.type === 'anniversaire' || r.type === 'anniv' || (!r.type && r.prenom_enfant));
      var statutNum = parseInt(r.statut || '1');
      if (!isAnniv && statutNum < 3) return;
      if (!byDay[r.date]) byDay[r.date] = [];
      byDay[r.date].push(r);
    });

    const todayStr = today();
    const offset = firstDay === 0 ? 6 : firstDay - 1;

    // ── Cellules jours ──
    let cells = '';
    // Cellules vides avant le 1er
    for (let i = 0; i < offset; i++) {
      cells += '<div style="height:64px;"></div>';
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const ds = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const items = byDay[ds] || [];
      const isToday  = ds === todayStr;
      const isPast   = ds < todayStr;
      const dow      = new Date(ds + 'T12:00').getDay();
      const isWE     = dow === 0 || dow === 6;

      // Fond et bordure de la cellule
      var cellBg     = isToday ? '#E8F5E9' : isPast ? '#F8F8F8' : isWE ? '#FFFBF5' : '#FFFFFF';
      var cellBorder = isToday ? '2px solid #2E7D32' : isPast ? '1px solid #EEEEEE' : isWE ? '1px solid #FFE0B2' : '1px solid #E8F5E9';
      var numColor   = isToday ? '#2E7D32' : isPast ? '#CCCCCC' : isWE ? '#E65100' : '#424242';
      var numWeight  = isToday ? '800' : '600';

      // Points colorés (max 3 + overflow)
      var dots = items.slice(0, 3).map(function(r) {
        var seg = getSegment(r.segment);
        var c = (r.date < todayStr) ? '#CCCCCC' : seg.color;
        return '<span data-cal-resa="' + r.id + '" title="' + esc(r.prenom_enfant || r.organisation || r.nom_contact || '') + '" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + c + ';cursor:pointer;flex-shrink:0;"></span>';
      }).join('');
      var overflow = items.length > 3
        ? '<span style="font-size:8px;color:#9E9E9E;font-weight:700;line-height:1;">+' + (items.length-3) + '</span>'
        : '';

      // Première réservation — nom court affiché sous le numéro
      var firstLabel = '';
      if (items.length === 1) {
        var r0 = items[0];
        var seg0 = getSegment(r0.segment);
        var c0 = (r0.date < todayStr) ? '#BBBBBB' : seg0.color;
        var nom0 = esc((r0.prenom_enfant || r0.organisation || r0.nom_contact || '').split(' ')[0].slice(0, 10));
        var h0 = r0.heure_debut ? r0.heure_debut.slice(0,5) : '';
        firstLabel = '<div data-cal-resa="' + r0.id + '" style="font-size:8px;color:' + c0 + ';font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;margin-top:2px;">' + nom0 + (h0 ? ' ' + h0 : '') + '</div>';
      }

      cells += '<div style="height:64px;border:' + cellBorder + ';border-radius:8px;padding:5px 4px 4px;background:' + cellBg + ';box-sizing:border-box;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;">' +
        '<div style="font-size:12px;font-weight:' + numWeight + ';color:' + numColor + ';line-height:1;">' + d + '</div>' +
        (items.length > 1 ?
          '<div style="display:flex;align-items:center;gap:2px;flex-wrap:wrap;margin-top:2px;">' + dots + overflow + '</div>'
          : firstLabel) +
        '</div>';
    }

    // Nombre de jours avec resa ce mois
    var nbJours = Object.keys(byDay).filter(function(d) {
      return d.startsWith(year + '-' + String(month+1).padStart(2,'0'));
    }).length;

    return '<div style="max-width:100%;box-sizing:border-box;">' +

      // ── Navigation ──
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
        '<button id="cal-prev" style="min-width:44px;height:44px;background:#F1F8E9;border:1.5px solid #C8E6C9;border-radius:10px;cursor:pointer;font-size:20px;color:#2E7D32;touch-action:manipulation;display:flex;align-items:center;justify-content:center;">←</button>' +
        '<div style="text-align:center;line-height:1.2;">' +
          '<div style="font-size:18px;font-weight:800;color:#2E7D32;">' + nomsMois[month] + '</div>' +
          '<div style="font-size:12px;color:#9E9E9E;font-weight:600;">' + year + '</div>' +
        '</div>' +
        '<div style="display:flex;gap:6px;align-items:center;">' +
          '<button id="cal-today" style="height:44px;padding:0 14px;background:#2E7D32;border:none;border-radius:10px;cursor:pointer;font-size:12px;font-weight:700;color:#fff;touch-action:manipulation;">Auj.</button>' +
          '<button id="cal-next" style="min-width:44px;height:44px;background:#F1F8E9;border:1.5px solid #C8E6C9;border-radius:10px;cursor:pointer;font-size:20px;color:#2E7D32;touch-action:manipulation;display:flex;align-items:center;justify-content:center;">→</button>' +
        '</div>' +
      '</div>' +

      // ── En-têtes jours ──
      '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;">' +
        ['Lu','Ma','Me','Je','Ve','Sa','Di'].map(function(j, i) {
          var c = i >= 5 ? '#E65100' : '#9E9E9E';
          return '<div style="text-align:center;font-size:10px;font-weight:700;color:' + c + ';padding:3px 0;">' + j + '</div>';
        }).join('') +
      '</div>' +

      // ── Grille ──
      '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">' + cells + '</div>' +

      // ── Légende ──
      '<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;">' +
        [['anniversaire','🎂 Anniv.'],['scolaire','🏫 Scolaire'],['alsh','🏕️ ALSH'],['groupe','👨‍👩‍👧 Groupe']].map(function(s) {
          var seg = getSegment(s[0]);
          return '<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#616161;background:#F5F5F5;padding:3px 8px;border-radius:20px;">' +
            '<span style="width:8px;height:8px;border-radius:50%;background:' + seg.color + ';display:inline-block;flex-shrink:0;"></span>' + s[1] + '</span>';
        }).join('') +
      '</div>' +
      '<div style="margin-top:6px;font-size:11px;color:#BDBDBD;text-align:center;">' + nbJours + ' jour(s) avec réservation</div>' +
    '</div>';
  }

  // ─── VUE TERRAIN ─────────────────────────────────────────────────────────────
  // Permet à l'équipe de saisir les effectifs réels le jour de la visite
  // Calcule automatiquement le solde ajusté (règle -10% max CGV)
  function buildTerrainView() {
    var aujourd_hui = today();
    var dans7j = new Date();
    dans7j.setDate(dans7j.getDate() + 7);
    var ds7 = dans7j.toISOString().slice(0,10);

    var visites = Object.values(state.reservations)
      .filter(function(r) {
        if (!r.date) return false;
        var isGroupe = r.segment !== 'anniversaire' && !(r.type === 'anniversaire');
        var dateOk = r.date >= aujourd_hui && r.date <= ds7;
        var statutOk = parseInt(r.statut || '1') >= 3;
        return isGroupe && dateOk && statutOk;
      })
      .sort(function(a,b){ return a.date.localeCompare(b.date); });

    if (visites.length === 0) {
      return '<div style="text-align:center;padding:60px 20px;color:#9E9E9E;">' +
        '<div style="font-size:40px;margin-bottom:12px;">📍</div>' +
        '<div style="font-size:14px;font-weight:700;margin-bottom:6px;">Aucune visite dans les 7 prochains jours</div>' +
        '<div style="font-size:12px;">Les visites confirmées (statut 3+) apparaîtront ici</div>' +
        '</div>';
    }

    var rows = visites.map(function(r) {
      var enf_p   = parseInt(r.enfants || r.nb_enfants || r.effectif_enfants || 0);
      var acc_p   = parseInt(r.accompagnants || r.nb_adultes || r.effectif_adultes || 0);
      var enf_r   = parseInt(r.effectif_enfants_reel || 0);
      var acc_r   = parseInt(r.effectif_adultes_reel || 0);
      var montant = parseFloat(r.montant_total || r.total || 0);
      var acompte = parseFloat(r.acompte_paye || r.acompte_recu || r.acompte || 0);

      var isToday = r.date === aujourd_hui;
      var diffJ   = Math.round((new Date(r.date + 'T12:00') - new Date(aujourd_hui + 'T12:00')) / 86400000);
      var urgBg   = isToday ? '#E8F5E9' : diffJ === 1 ? '#FFF8E1' : '#FAFAFA';
      var urgBorder = isToday ? '#A5D6A7' : diffJ === 1 ? '#FFD54F' : '#EEEEEE';
      var saisiOk = enf_r > 0;

      // ── CALCUL CGV ──────────────────────────────────────────────────────────
      // Calcul en temps réel uniquement si réel saisi
      var calcHtml = '';
      var soldeDevis = Math.max(0, montant - acompte);

      if (saisiOk && enf_p > 0) {
        var diffPct  = (enf_p - enf_r) / enf_p; // positif si moins d'enfants
        var plusEnf  = enf_r - enf_p;            // positif si plus d'enfants

        if (plusEnf > 0) {
          // ── CAS : PLUS d'enfants que prévu ──────────────────────────────────
          // Calculer tarif unitaire moyen
          var tarifUnit = enf_p > 0 ? montant / enf_p : 0;
          var supplement = Math.round(plusEnf * tarifUnit * 100) / 100;
          var nouveauMontant = montant + supplement;
          var soldeSupplement = Math.max(0, nouveauMontant - acompte);

          calcHtml = '<div style="background:#E3F2FD;border:1.5px solid #90CAF9;border-radius:10px;padding:12px 14px;margin-bottom:10px;">' +
            '<div style="font-size:11px;font-weight:700;color:#1565C0;text-transform:uppercase;margin-bottom:8px;">📊 Calcul CGV — Effectif supérieur au devis</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;margin-bottom:10px;">' +
              '<div style="background:#fff;border-radius:8px;padding:8px;">' +
                '<div style="font-size:10px;color:#9E9E9E;">Prévu</div>' +
                '<div style="font-size:16px;font-weight:800;color:#1565C0;">' + enf_p + ' enf.</div>' +
              '</div>' +
              '<div style="background:#fff;border-radius:8px;padding:8px;">' +
                '<div style="font-size:10px;color:#9E9E9E;">Réel</div>' +
                '<div style="font-size:16px;font-weight:800;color:#E65100;">+' + plusEnf + ' enf.</div>' +
              '</div>' +
              '<div style="background:#E3F2FD;border-radius:8px;padding:8px;">' +
                '<div style="font-size:10px;color:#1565C0;">Supplément</div>' +
                '<div style="font-size:16px;font-weight:800;color:#1565C0;">+' + supplement.toFixed(2) + ' €</div>' +
              '</div>' +
            '</div>' +
            '<div style="background:#1565C0;color:#fff;border-radius:8px;padding:10px;text-align:center;">' +
              '<div style="font-size:11px;opacity:0.85;">SOLDE À ENCAISSER (avec supplément)</div>' +
              '<div style="font-size:22px;font-weight:900;">' + soldeSupplement.toFixed(2) + ' €</div>' +
              '<div style="font-size:10px;opacity:0.75;margin-top:2px;">Montant recalculé : ' + nouveauMontant.toFixed(2) + ' € (vs devis ' + montant.toFixed(2) + ' €)</div>' +
            '</div>' +
          '</div>';

        } else if (diffPct > 0 && diffPct <= 0.10) {
          // ── CAS : Moins d'enfants ≤ 10% — réduction possible sur demande ──
          var nvMontant10 = Math.round(montant * (1 - diffPct) * 100) / 100;
          var soldeAvecReduc = Math.max(0, nvMontant10 - acompte);
          var econom = Math.round((montant - nvMontant10) * 100) / 100;

          calcHtml = '<div style="background:#FFF8E1;border:1.5px solid #FFD54F;border-radius:10px;padding:12px 14px;margin-bottom:10px;">' +
            '<div style="font-size:11px;font-weight:700;color:#E65100;text-transform:uppercase;margin-bottom:8px;">📊 Calcul CGV — Effectif inférieur (dans la limite -10%)</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;margin-bottom:10px;">' +
              '<div style="background:#fff;border-radius:8px;padding:8px;">' +
                '<div style="font-size:10px;color:#9E9E9E;">Prévu</div>' +
                '<div style="font-size:16px;font-weight:800;color:#424242;">' + enf_p + ' enf.</div>' +
              '</div>' +
              '<div style="background:#fff;border-radius:8px;padding:8px;">' +
                '<div style="font-size:10px;color:#9E9E9E;">Réel</div>' +
                '<div style="font-size:16px;font-weight:800;color:#E65100;">' + enf_r + ' enf.</div>' +
              '</div>' +
              '<div style="background:#FFF8E1;border-radius:8px;padding:8px;">' +
                '<div style="font-size:10px;color:#E65100;">Écart</div>' +
                '<div style="font-size:16px;font-weight:800;color:#E65100;">-' + Math.round(diffPct * 100) + '%</div>' +
              '</div>' +
            '</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">' +
              '<div style="background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:10px;text-align:center;">' +
                '<div style="font-size:10px;color:#9E9E9E;margin-bottom:2px;">Sans ajustement</div>' +
                '<div style="font-size:16px;font-weight:800;color:#2E7D32;">' + soldeDevis.toFixed(2) + ' €</div>' +
                '<div style="font-size:9px;color:#9E9E9E;">Montant devis maintenu</div>' +
              '</div>' +
              '<div style="background:#FFF8E1;border:1px solid #FFD54F;border-radius:8px;padding:10px;text-align:center;">' +
                '<div style="font-size:10px;color:#E65100;margin-bottom:2px;">Avec ajustement (-' + Math.round(diffPct*100) + '%)</div>' +
                '<div style="font-size:16px;font-weight:800;color:#E65100;">' + soldeAvecReduc.toFixed(2) + ' €</div>' +
                '<div style="font-size:9px;color:#E65100;">Économie client : -' + econom.toFixed(2) + ' €</div>' +
              '</div>' +
            '</div>' +
            '<div style="font-size:11px;color:#757575;font-style:italic;text-align:center;">⚠️ Ajustement sur demande uniquement — pas automatique</div>' +
          '</div>';

        } else if (diffPct > 0.10) {
          // ── CAS : Moins d'enfants > 10% — CGV : montant devis maintenu ──
          calcHtml = '<div style="background:#FFEBEE;border:1.5px solid #EF9A9A;border-radius:10px;padding:12px 14px;margin-bottom:10px;">' +
            '<div style="font-size:11px;font-weight:700;color:#C62828;text-transform:uppercase;margin-bottom:8px;">📊 Calcul CGV — Écart > 10% : montant devis maintenu</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;margin-bottom:10px;">' +
              '<div style="background:#fff;border-radius:8px;padding:8px;">' +
                '<div style="font-size:10px;color:#9E9E9E;">Prévu</div>' +
                '<div style="font-size:16px;font-weight:800;color:#424242;">' + enf_p + ' enf.</div>' +
              '</div>' +
              '<div style="background:#fff;border-radius:8px;padding:8px;">' +
                '<div style="font-size:10px;color:#9E9E9E;">Réel</div>' +
                '<div style="font-size:16px;font-weight:800;color:#C62828;">' + enf_r + ' enf.</div>' +
              '</div>' +
              '<div style="background:#FFEBEE;border-radius:8px;padding:8px;">' +
                '<div style="font-size:10px;color:#C62828;">Écart</div>' +
                '<div style="font-size:16px;font-weight:800;color:#C62828;">-' + Math.round(diffPct*100) + '%</div>' +
              '</div>' +
            '</div>' +
            '<div style="background:#C62828;color:#fff;border-radius:8px;padding:10px;text-align:center;">' +
              '<div style="font-size:11px;opacity:0.85;">CGV : SOLDE DEVIS MAINTENU</div>' +
              '<div style="font-size:22px;font-weight:900;">' + soldeDevis.toFixed(2) + ' €</div>' +
              '<div style="font-size:10px;opacity:0.75;margin-top:2px;">Écart > 10% — aucune réduction applicable (CGV)</div>' +
            '</div>' +
          '</div>';

        } else {
          // ── CAS : Effectif identique ──────────────────────────────────────
          calcHtml = '<div style="background:#E8F5E9;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:#2E7D32;text-align:center;">✅ Effectif conforme au devis — solde standard : <strong>' + soldeDevis.toFixed(2) + ' €</strong></div>';
        }
      }

      // ── BOUTONS VALIDATION ──────────────────────────────────────────────────
      var btnHtml = '';
      if (saisiOk) {
        var diffPctBtn = enf_p > 0 ? (enf_p - enf_r) / enf_p : 0;
        var plusEnfBtn = enf_r - enf_p;

        // Bouton "Valider sans ajustement" → toujours présent
        btnHtml += '<button data-terrain-save="' + r.id + '" data-ajust="non" ' +
          'style="flex:1;padding:10px;background:#2E7D32;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">' +
          '✅ Valider (' + soldeDevis.toFixed(0) + ' €)</button>';

        // Bouton "Demander ajustement" → seulement si écart ≤ 10% et négatif
        if (diffPctBtn > 0 && diffPctBtn <= 0.10) {
          var tarifUnitBtn = enf_p > 0 ? montant / enf_p : 0;
          var nvMontantBtn = Math.round(montant * (1 - diffPctBtn) * 100) / 100;
          var soldeAjustBtn = Math.max(0, nvMontantBtn - acompte);
          btnHtml += '<button data-terrain-save="' + r.id + '" data-ajust="oui" data-montant-ajust="' + nvMontantBtn + '" data-solde-ajust="' + soldeAjustBtn + '" ' +
            'style="flex:1;padding:10px;background:#E65100;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">' +
            '📧 Demander ajustement (' + soldeAjustBtn.toFixed(0) + ' €)</button>';
        }

        // Bouton "Valider supplément" → si plus d'enfants
        if (plusEnfBtn > 0) {
          var tarifUnitSupp = enf_p > 0 ? montant / enf_p : 0;
          var supplement = Math.round(plusEnfBtn * tarifUnitSupp * 100) / 100;
          var nouveauMontantSupp = montant + supplement;
          var soldeSupp = Math.max(0, nouveauMontantSupp - acompte);
          btnHtml += '<button data-terrain-save="' + r.id + '" data-ajust="supplement" data-montant-ajust="' + nouveauMontantSupp + '" data-solde-ajust="' + soldeSupp + '" ' +
            'style="flex:1;padding:10px;background:#1565C0;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">' +
            '📧 Valider supplément +' + supplement.toFixed(0) + ' € (' + soldeSupp.toFixed(0) + ' €)</button>';
        }
      }

      return '<div style="background:' + urgBg + ';border:1.5px solid ' + urgBorder + ';border-radius:12px;padding:14px 16px;margin-bottom:12px;">' +
        // En-tête
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">' +
          '<div>' +
            '<div style="font-size:13px;font-weight:800;color:#1B5E20;">' + esc(r.organisation || r.client || r.nom_contact || r.id) + '</div>' +
            '<div style="font-size:11px;color:#757575;margin-top:2px;">' +
              fmtDate(r.date) + ' · ' + (r.heure_debut||'') + (r.creneau && r.creneau.indexOf(' - ') >= 0 ? ' - ' + r.creneau.split(' - ')[1] : '') +
              ' · ' + esc(r.formule || '') +
            '</div>' +
            (r.tel || r.tel_contact ? '<a href="tel:' + esc(r.tel||r.tel_contact||'') + '" style="font-size:11px;color:#1565C0;text-decoration:none;">📞 ' + esc(r.tel||r.tel_contact||'') + '</a>' : '') +
          '</div>' +
          '<div style="text-align:right;">' +
            '<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:' + (isToday?'#2E7D32':'#FFF8E1') + ';color:' + (isToday?'#fff':'#E65100') + ';">' +
              (isToday ? "🟢 Aujourd'hui" : 'J-' + diffJ) +
            '</span>' +
          '</div>' +
        '</div>' +

        // Ligne devis
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;">' +
          '<div style="background:#fff;border-radius:8px;padding:8px 6px;text-align:center;">' +
            '<div style="font-size:9px;color:#9E9E9E;margin-bottom:2px;">Devis enf.</div>' +
            '<div style="font-size:16px;font-weight:800;color:#1B5E20;">' + (enf_p||'?') + '</div>' +
          '</div>' +
          '<div style="background:#fff;border-radius:8px;padding:8px 6px;text-align:center;">' +
            '<div style="font-size:9px;color:#9E9E9E;margin-bottom:2px;">Devis acc.</div>' +
            '<div style="font-size:16px;font-weight:800;color:#1B5E20;">' + (acc_p||'?') + '</div>' +
          '</div>' +
          '<div style="background:#fff;border-radius:8px;padding:8px 6px;text-align:center;">' +
            '<div style="font-size:9px;color:#9E9E9E;margin-bottom:2px;">Montant devis</div>' +
            '<div style="font-size:13px;font-weight:800;color:#1B5E20;">' + montant.toFixed(2) + '€</div>' +
          '</div>' +
          '<div style="background:' + (soldeDevis > 0 ? '#FFF8E1' : '#E8F5E9') + ';border-radius:8px;padding:8px 6px;text-align:center;">' +
            '<div style="font-size:9px;color:#9E9E9E;margin-bottom:2px;">Solde devis</div>' +
            '<div style="font-size:14px;font-weight:900;color:' + (soldeDevis > 0 ? '#C62828' : '#2E7D32') + ';">' + soldeDevis.toFixed(2) + '€</div>' +
          '</div>' +
        '</div>' +

        // Saisie effectif réel
        '<div style="background:#fff;border:1px solid #C8E6C9;border-radius:10px;padding:12px;margin-bottom:8px;">' +
          '<div style="font-size:11px;font-weight:700;color:#2E7D32;margin-bottom:8px;">📍 Effectif réel du jour</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
            '<div>' +
              '<label style="font-size:11px;color:#757575;display:block;margin-bottom:4px;">Enfants présents</label>' +
              '<input type="number" min="0" max="500" ' +
                'data-terrain-id="' + r.id + '" data-terrain-field="effectif_enfants_reel" ' +
                'data-enf-p="' + enf_p + '" data-montant="' + montant + '" data-acompte="' + acompte + '" ' +
                'value="' + (enf_r || '') + '" placeholder="' + enf_p + '" ' +
                'oninput="terrainCGVLive(this)" ' +
                'style="width:100%;padding:8px;border:1.5px solid ' + (saisiOk?'#A5D6A7':'#FFD54F') + ';border-radius:8px;font-size:14px;font-weight:700;text-align:center;box-sizing:border-box;">' +
            '</div>' +
            '<div>' +
              '<label style="font-size:11px;color:#757575;display:block;margin-bottom:4px;">Accompagnants présents</label>' +
              '<input type="number" min="0" max="100" ' +
                'data-terrain-id="' + r.id + '" data-terrain-field="effectif_adultes_reel" ' +
                'value="' + (acc_r || '') + '" placeholder="' + acc_p + '" ' +
                'style="width:100%;padding:8px;border:1.5px solid #E8F5E9;border-radius:8px;font-size:14px;font-weight:700;text-align:center;box-sizing:border-box;">' +
            '</div>' +
          '</div>' +
          // Indicateur CGV live
          '<div id="cgv_' + r.id + '" style="margin-top:8px;font-size:12px;font-weight:600;color:#9E9E9E;min-height:18px;">' +
            (saisiOk ? (function() {
              var d = enf_p > 0 ? (enf_p - enf_r) / enf_p : 0;
              var p = enf_r - enf_p;
              if (p > 0) return '🔵 +' + p + ' enf. → supplément applicable';
              if (d > 0 && d <= 0.1) return '🟡 -' + Math.round(d*100) + '% (≤10%) → réduction possible sur demande';
              if (d > 0.1) return '🔴 -' + Math.round(d*100) + '% (>10%) → CGV : montant devis maintenu';
              return '✅ Effectif conforme';
            })() : '') +
          '</div>' +
        '</div>' +

        // Calcul CGV (affiché si réel saisi)
        calcHtml +

        // Boutons validation
        (saisiOk ? '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">' + btnHtml + '</div>' : '') +

        // Notes terrain
        '<div>' +
          '<textarea data-terrain-id="' + r.id + '" data-terrain-field="notes_terrain" ' +
            'placeholder="Notes terrain (incidents, retard, remarques...)..." ' +
            'style="width:100%;padding:8px;border:1px solid #E8F5E9;border-radius:8px;font-size:11px;font-family:inherit;resize:vertical;min-height:44px;box-sizing:border-box;">' +
            esc(r.notes_terrain || '') +
          '</textarea>' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div>' +
      '<div style="background:#E8F5E9;border:1px solid #A5D6A7;border-radius:12px;padding:12px 16px;margin-bottom:14px;">' +
        '<div style="font-size:13px;font-weight:700;color:#1B5E20;">📍 Vue Terrain — ' + visites.length + ' visite(s) dans les 7 prochains jours</div>' +
        '<div style="font-size:11px;color:#2E7D32;margin-top:3px;">Saisir l'effectif réel · Le calcul CGV s'affiche automatiquement · Ajustement sur demande uniquement</div>' +
      '</div>' +
      rows +
    '</div>';
  }

      const urgColor = diffJ <= 7 ? '#C62828' : diffJ <= 10 ? '#E65100' : '#2E7D32';

      var allergieColor = r.gateau_allergies && r.gateau_allergies !== 'aucune' && r.gateau_allergies !== '' ? '#C62828' : '#2E7D32';
      var statutLabel = r.gateau_commande === 'livre' ? '🎂 Réceptionné ✅' : r.gateau_commande === 'prevu' ? '📅 Livraison prévue' : r.gateau_commande ? '✅ Commandé' : '⏳ À commander';
      var statutBg = r.gateau_commande === 'livre' ? '#E8F5E9' : r.gateau_commande === 'prevu' ? '#E3F2FD' : r.gateau_commande ? '#FFF8E1' : '#FBE9E7';
      var statutColor = r.gateau_commande === 'livre' ? '#1B5E20' : r.gateau_commande === 'prevu' ? '#1565C0' : r.gateau_commande ? '#E65100' : '#C62828';
      return '<tr style="border-bottom:1px solid #F5F5F5;">' +
        '<td style="padding:8px 10px;font-size:12px;font-weight:700;">' + fmtDate(r.date) + '</td>' +
        '<td style="padding:8px 10px;font-size:12px;">' + esc(r.prenom_enfant || r.nom_contact || '—') + '</td>' +
        '<td style="padding:8px 10px;font-size:12px;">' + esc(r.gateau_type || '—') + '</td>' +
        '<td style="padding:8px 10px;font-size:12px;">' + esc(r.gateau_inscription || '—') + '</td>' +
        '<td style="padding:8px 10px;font-size:11px;font-weight:700;color:' + allergieColor + ';">' + esc(allergiesTxt) + '</td>' +
        '<td style="padding:8px 10px;"><span style="font-weight:800;color:' + urgColor + ';">J-' + diffJ + '</span></td>' +
        '<td style="padding:8px 10px;">' +
          '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">' +
            '<span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:' + statutBg + ';color:' + statutColor + ';">' + statutLabel + '</span>' +
            (r.gateau_date_livraison ? '<span style="font-size:10px;color:#9E9E9E;">📅 ' + fmtDate(r.gateau_date_livraison) + '</span>' : '') +
            '<button data-gateau-edit="' + r.id + '" style="padding:3px 10px;background:#F1F8E9;color:#2E7D32;border:1px solid #C8E6C9;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;">✏️ Modifier</button>' +
          '</div>' +
        '</td>' +
      '</tr>'
    ;
    }).join('')}
    </tbody>
  </table>`}
</div>`;
  }

  <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;">

      </div>
