    if (!el) return;

    el.addEventListener('click', function (e) {
      // Clic sur réservation dans le calendrier
      var calResa = e.target.closest('[data-cal-resa]');
      if (calResa) {
        var calId = calResa.dataset.calResa;
        var calR = state.reservations[calId];
        if (!calR) return;
        var existingDet = document.getElementById('resa-detail-modal');
        if (existingDet) existingDet.remove();
        var detDiv = document.createElement('div');
        detDiv.innerHTML = buildResaDetailModal(calR);
        document.getElementById('res-root').appendChild(detDiv.firstChild);
        var closeDetModal = function() { var m = document.getElementById('resa-detail-modal'); if(m) m.remove(); };
        var closeDet = document.getElementById('close-resa-detail');
        if (closeDet) closeDet.addEventListener('click', closeDetModal);
        var detModal = document.getElementById('resa-detail-modal');
        if (detModal) detModal.addEventListener('click', function(ev) { if(ev.target.id==='resa-detail-modal') closeDetModal(); });
        var detEdit = document.getElementById('detail-edit-btn');
        if (detEdit) detEdit.addEventListener('click', function() {
          closeDetModal();
          state.editId = calId; state.walkin = false; state.showForm = true; state.formData = Object.assign({}, calR);
          render();
        });
        var detHist = document.getElementById('detail-hist-btn');
        if (detHist) detHist.addEventListener('click', function() {
          closeDetModal();
          var hDiv = document.createElement('div');
          hDiv.innerHTML = buildHistoryModal(calR);
          document.getElementById('res-root').appendChild(hDiv.firstChild);
          var closeH = function() { var m = document.getElementById('history-modal'); if(m) m.remove(); };
          var closeHBtn = document.getElementById('close-history-modal');
          if (closeHBtn) closeHBtn.addEventListener('click', closeH);
          var hModal = document.getElementById('history-modal');
          if (hModal) hModal.addEventListener('click', function(ev) { if(ev.target.id==='history-modal') closeH(); });
        });
        return;
      }

      const t = e.target.closest('[data-view]');
      if (t) { state.view = t.dataset.view; render(); return; }

      if (e.target.closest('#btn-new-res')) {
        state.showForm = true; state.editId = null; state.walkin = false;
        state.formData = { segment: 'anniversaire', statut: '1', date: '' };
        render(); return;
      }
      if (e.target.closest('#btn-walkin')) {
        state.showForm = true; state.editId = null; state.walkin = true;
        state.formData = { segment: 'anniversaire', statut: '4', date: today(), heure_debut: nowTime(), walkin: true };
        render(); return;
      }
      if (e.target.closest('#btn-new-memo') || e.target.closest('#btn-new-memo-2')) {
        state.showMemoForm = true; state.editMemoId = null;
        state.memoData = {};
        render(); return;
      }

      // Walk-in memo
      const wm = e.target.closest('[data-walkin-memo]');
      if (wm) {
        state.showMemoForm = true; state.editMemoId = null;
        state.memoData = { walkin: true, created_at: new Date().toISOString() };
        render(); return;
      }

      // Segment picker in form
      const seg = e.target.closest('[data-seg]');
      if (seg) { state.formData.segment = seg.dataset.seg; state.formData.formule_id = null; render(); return; }

      // Formule picker
      const form = e.target.closest('[data-formule]');
      if (form) { state.formData.formule_id = form.dataset.formule; render(); return; }

      // Memo type picker
      const mtype = e.target.closest('[data-memo-type]');
      if (mtype) { state.memoData.type_event = mtype.dataset.memoType; render(); return; }

      // History modal
      const histBtn = e.target.closest('[data-history]');
      if (histBtn) {
        var histId = histBtn.dataset.history;
        var histResa = state.reservations[histId];
        if (!histResa) return;
        var existingHist = document.getElementById('history-modal');
        if (existingHist) existingHist.remove();
        var histDiv = document.createElement('div');
        histDiv.innerHTML = buildHistoryModal(histResa);
        document.getElementById('res-root').appendChild(histDiv.firstChild);
        var closeHist = function() { var m = document.getElementById('history-modal'); if(m) m.remove(); };
        var closeBtn = document.getElementById('close-history-modal');
        if (closeBtn) closeBtn.addEventListener('click', closeHist);
        document.getElementById('history-modal').addEventListener('click', function(ev) { if(ev.target.id==='history-modal') closeHist(); });
        return;
      }

      // Advance statut
      const adv = e.target.closest('[data-advance]');
      if (adv) {
        const r = state.reservations[adv.dataset.advance];
        if (r) { const idx = STATUTS.findIndex(s => s.id === r.statut); if (idx < STATUTS.length - 1) r.statut = STATUTS[idx + 1].id; saveAll(); render(); } return;
      }

      // Edit reservation
      const edit = e.target.closest('[data-edit]');
      if (edit) {
        const r = state.reservations[edit.dataset.edit];
        if (r) { state.editId = r.id; state.walkin = false; state.showForm = true; state.formData = { ...r }; render(); } return;
      }

      // Delete reservation
      const del = e.target.closest('[data-delete]');
      if (del) {
        if (confirm('Supprimer cette réservation ?')) { delete state.reservations[del.dataset.delete]; saveAll(); render(); } return;
      }

      // Close form
      if (e.target.closest('#close-form') || e.target.closest('#close-form-2')) {
        state.showForm = false; render(); return;
      }

      // Save form
      if (e.target.closest('#save-form')) { saveReservation(); return; }

      // Memo actions
      const gmailI = e.target.closest('[data-gmail-infos]');
      if (gmailI) {
        const m = state.memos[gmailI.dataset.gmailInfos];
        if (m) { const {subject, body} = buildEmailInfos(m); openGmailDraft(m.email, subject, body); } return;
      }
      const gmailD = e.target.closest('[data-gmail-devis]');
      if (gmailD) {
        const m = state.memos[gmailD.dataset.gmailDevis];
        if (m) { const {subject, body} = buildEmailDevis(m); openGmailDraft(m.email, subject, body); } return;
      }
      const convMemo = e.target.closest('[data-convert-memo]');
      if (convMemo) {
        const m = state.memos[convMemo.dataset.convertMemo];
        if (m) {
          m.converted = true;
          state.formData = {
            segment: m.type_event === 'anniversaire' ? 'anniversaire' :
                     m.type_event === 'sortie scolaire' ? 'scolaire' :
                     m.type_event === 'ALSH / CDL' ? 'alsh' :
                     m.type_event === 'privatisation' ? 'privatisation' :
                     m.type_event === 'entreprise' ? 'entreprise' : 'groupe',
            statut: '1', date: m.date_souhaitee || '',
            nom_contact: (m.prenom || '') + ' ' + (m.nom || ''),
            tel: m.tel || '', effectif_total: m.nb_personnes || '',
            notes: m.note || '', organisation: '',
          };
          state.showForm = true; state.editId = null; state.walkin = false;
          saveAll(); render();
        } return;
      }
      const editMemo = e.target.closest('[data-edit-memo]');
      if (editMemo) {
        const m = state.memos[editMemo.dataset.editMemo];
        if (m) { state.editMemoId = m.id; state.showMemoForm = true; state.memoData = {...m}; render(); } return;
      }
      const delMemo = e.target.closest('[data-delete-memo]');
      if (delMemo) {
        if (confirm('Supprimer ce mémo ?')) { delete state.memos[delMemo.dataset.deleteMemo]; saveAll(); render(); } return;
      }

      // Close memo
      if (e.target.closest('#close-memo') || e.target.closest('#close-memo-2')) {
        state.showMemoForm = false; render(); return;
      }

      // Save memo
      if (e.target.closest('#save-memo')) { saveMemo(); return; }
    });

    // Calendar navigation
    const calPrev = el.querySelector('#cal-prev');
    if (calPrev) calPrev.addEventListener('click', () => {
      if (!state.calYear) { state.calYear = new Date().getFullYear(); state.calMonth = new Date().getMonth(); }
      state.calMonth--; if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
      render();
    });
    const calNext = el.querySelector('#cal-next');
    if (calNext) calNext.addEventListener('click', () => {
      if (!state.calYear) { state.calYear = new Date().getFullYear(); state.calMonth = new Date().getMonth(); }
      state.calMonth++; if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
      render();
    });
    const calToday = el.querySelector('#cal-today');
    if (calToday) calToday.addEventListener('click', () => {
      state.calYear = new Date().getFullYear(); state.calMonth = new Date().getMonth(); render();
    });
    // Gâteau edit
    el.querySelectorAll('[data-gateau-edit]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.dataset.gateauEdit;
        var r = state.reservations[id];
        if (!r) return;
        var existing = document.getElementById('gateau-modal');
        if (existing) existing.remove();
        var div = document.createElement('div');
        div.innerHTML = buildGateauEditModal(r);
        document.getElementById('res-root').appendChild(div.firstChild);
        var closeModal = function() { var m = document.getElementById('gateau-modal'); if(m) m.remove(); };
        document.getElementById('close-gateau-modal').addEventListener('click', closeModal);
        document.getElementById('close-gateau-modal-2').addEventListener('click', closeModal);
        document.getElementById('save-gateau-modal').addEventListener('click', function() {
          var rid = this.dataset.id;
          if (!state.reservations[rid]) return;
          var allergies = document.getElementById('gm-allergies').value.trim();
          var statut = document.getElementById('gm-statut').value;
          var dateLiv = document.getElementById('gm-date').value;
          state.reservations[rid].gateau_allergies = allergies || 'aucune';
          state.reservations[rid].gateau_commande = statut || false;
          state.reservations[rid].gateau_date_livraison = dateLiv;
          state.reservations[rid].updated_at = new Date().toISOString();
          saveAll();
          closeModal();
          render();
        });
      });
    });

    // ── Terrain : sauvegarder effectif réel + calcul CGV + email ────────────
    el.querySelectorAll('[data-terrain-save]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id        = this.getAttribute('data-terrain-save');
        var ajust     = this.getAttribute('data-ajust') || 'non';
        var montantAjust = parseFloat(this.getAttribute('data-montant-ajust') || '0');
        var soldeAjust   = parseFloat(this.getAttribute('data-solde-ajust') || '0');
        var r = state.reservations[id];
        if (!r) return;

        var enfInput   = el.querySelector('[data-terrain-id="' + id + '"][data-terrain-field="effectif_enfants_reel"]');
        var accInput   = el.querySelector('[data-terrain-id="' + id + '"][data-terrain-field="effectif_adultes_reel"]');
        var notesInput = el.querySelector('[data-terrain-id="' + id + '"][data-terrain-field="notes_terrain"]');
        var enfR  = enfInput   ? (parseInt(enfInput.value)  || 0) : 0;
        var accR  = accInput   ? (parseInt(accInput.value)  || 0) : 0;
        var notes = notesInput ? notesInput.value : '';

        var enf_p   = parseInt(r.enfants || r.nb_enfants || r.effectif_enfants || 0);
        var montant = parseFloat(r.montant_total || r.total || 0);
        var acompte = parseFloat(r.acompte_paye || r.acompte_recu || r.acompte || 0);

        // Déterminer montant final selon bouton cliqué
        var montantFinal, soldeFinal, labelAction;
        if (ajust === 'non') {
          montantFinal = montant;
          soldeFinal   = Math.max(0, montant - acompte);
          labelAction  = 'Maintien montant devis';
        } else if (ajust === 'oui') {
          montantFinal = montantAjust;
          soldeFinal   = soldeAjust;
          labelAction  = 'Ajustement demandé (CGV ≤10%)';
        } else if (ajust === 'supplement') {
          montantFinal = montantAjust;
          soldeFinal   = soldeAjust;
          labelAction  = 'Supplément enfants';
        }

        var nomGroupe = r.organisation || r.client || r.nom_contact || r.id;
        var dateVisite = r.date ? new Date(r.date + 'T12:00').toLocaleDateString('fr-FR', {weekday:'long',day:'2-digit',month:'long',year:'numeric'}) : r.date;

        // Sauvegarder dans Firebase
        var updated = Object.assign({}, r, {
          effectif_enfants_reel: enfR,
          effectif_adultes_reel: accR,
          effectif_total_reel:   enfR + accR,
          montant_final:         montantFinal,
          solde_encaisse:        soldeFinal,
          ajustement_cgv:        ajust,
          notes_terrain:         notes,
          modified_at:           Date.now(),
          modified_by:           state.currentUser || 'Equipe',
          statut:                '5'
        });
        fbSave(id, updated);
        state.reservations[id] = updated;

        // Générer brouillon Gmail si ajustement ou supplément
        if (ajust === 'oui' || ajust === 'supplement') {
          var sujet = '[AbracadaParc] Ajustement facturation — ' + nomGroupe + ' — ' + (r.date || '');
          var corps = 'Bonjour,

' +
            'Suite à la visite du ' + dateVisite + ', voici le récapitulatif pour facturation :

' +
            '═══════════════════════════════════
' +
            'GROUPE : ' + nomGroupe + '
' +
            'DATE   : ' + dateVisite + '
' +
            'CRÉNEAU: ' + (r.creneau || r.heure_debut || '') + '
' +
            '═══════════════════════════════════

' +
            '📋 EFFECTIFS
' +
            '  Prévu au devis   : ' + enf_p + ' enfants
' +
            '  Présents réels   : ' + enfR + ' enfants / ' + accR + ' accompagnants
' +
            '  Écart            : ' + (enfR - enf_p > 0 ? '+' : '') + (enfR - enf_p) + ' enfants

' +
            '💶 FACTURATION
' +
            '  Montant devis    : ' + montant.toFixed(2) + ' €
' +
            '  Acompte reçu     : ' + acompte.toFixed(2) + ' €
' +
            '  ' + labelAction + '
' +
            '  ─────────────────────────────────
' +
            '  MONTANT FINAL    : ' + montantFinal.toFixed(2) + ' €
' +
            '  SOLDE À FACTURER : ' + soldeFinal.toFixed(2) + ' €

' +
            (notes ? '📝 Notes terrain : ' + notes + '

' : '') +
            '→ À saisir dans MEG / Pennylane pour établir la facture.

' +
            'Cordialement,
AbracadaParc';

          // Ouvrir Gmail avec brouillon pré-rempli
          var gmailUrl = 'https://mail.google.com/mail/?view=cm&fs=1' +
            '&to=' + encodeURIComponent('contact@abracadaparc.fr') +
            '&su=' + encodeURIComponent(sujet) +
            '&body=' + encodeURIComponent(corps);
          window.open(gmailUrl, '_blank');
        }

        // Feedback visuel
        var btn2 = this;
        var origText = btn2.textContent;
        var origBg   = btn2.style.background;
        btn2.textContent = '✅ Enregistré !';
        btn2.style.background = '#388E3C';
        setTimeout(function() {
          btn2.textContent = origText;
          btn2.style.background = origBg;
          render();
        }, 2000);
      });
    });

    // Filtres
    const fltSeg = el.querySelector('#flt-segment');
    if (fltSeg) fltSeg.addEventListener('change', e => { state.segmentFilter = e.target.value; render(); });
    const fltSt = el.querySelector('#flt-statut');
    if (fltSt) fltSt.addEventListener('change', e => { state.statutFilter = e.target.value; render(); });
  }

  // ─── SAUVEGARDE RÉSERVATION ──────────────────────────────────────────────────

  function saveReservation() {
    const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    const d = state.formData;

    const nom = get('f-nom');
    if (!nom) { alert('Le nom du contact est requis.'); return; }

    const r = {
      id: state.editId || uid(),
      segment: d.segment || 'anniversaire',
      statut: get('f-statut') || d.statut || '1',
      nom_contact: nom,
      tel: get('f-tel'),
      date: get('f-date'),
      heure_debut: get('f-hdeb'),
      heure_fin: get('f-hfin'),
      montant_total: get('f-total'),
      acompte_paye: get('f-acompte'),
      mode_paiement: get('f-mode'),
      notes: get('f-notes'),
      walkin: d.walkin || false,
      created_at: state.editId ? (state.reservations[state.editId]?.created_at || new Date().toISOString()) : new Date().toISOString(),
      updated_at: new Date().toISOString(),
    };

    if (d.segment === 'anniversaire') {
      r.prenom_enfant = get('f-prenom');
      r.age_enfant = get('f-age');
      r.effectif_enfants = get('f-enf');
      r.formule_id = d.formule_id || '';
      r.gateau_nacima = document.getElementById('f-gateau')?.value === '1';
      r.gateau_type = get('f-gateau-type');
      r.gateau_inscription = get('f-gateau-insc');
      r.gateau_allergies = get('f-allergies');
    } else {
      r.organisation = get('f-org');
      r.effectif_total = get('f-eff');
    }

    // Traçabilité — qui a fait la modification
    r.modified_by = "Admin";
    r.modified_at = new Date().toISOString();
    if (state.editId && state.reservations[state.editId]) {
      r.created_by = state.reservations[state.editId].created_by || "Auto";
      r.created_at = state.reservations[state.editId].created_at;
    } else {
      r.created_by = "Admin";
    }
    // Traçabilité + Historique
    var prevResa = state.reservations[r.id] ? JSON.parse(JSON.stringify(state.reservations[r.id])) : null;
    r.modified_by = state.currentUser || 'Admin';
    r.modified_at = new Date().toISOString();
    if (!r.created_by) r.created_by = r.modified_by;

    // Construire l'entrée d'historique
    var histEntry = {
      ts: r.modified_at,
      by: r.modified_by,
      changes: []
    };
    if (prevResa) {
      // Détecter changements statut pipeline
      if (prevResa.statut !== r.statut) {
        var stLabels = {'1':'Demande reçue','2':'Devis envoyé','3':'Devis signé','4':'Confirmé BC reçu','5':'Visite Facturation','6':'Chorus Pro'};
        histEntry.changes.push('Pipeline: ' + (stLabels[prevResa.statut]||prevResa.statut) + ' → ' + (stLabels[r.statut]||r.statut));
        histEntry.alert = true;
      }
      // Détecter changements financiers
      if (prevResa.montant_total !== r.montant_total) {
        histEntry.changes.push('Total: ' + prevResa.montant_total + '€ → ' + r.montant_total + '€');
        histEntry.alert = true;
      }
      if (prevResa.acompte_paye !== r.acompte_paye) {
        histEntry.changes.push('Acompte: ' + prevResa.acompte_paye + '€ → ' + r.acompte_paye + '€');
        histEntry.alert = true;
      }
      // Autres changements
      if (prevResa.gateau_commande !== r.gateau_commande) histEntry.changes.push('Gâteau statut: ' + (prevResa.gateau_commande||'À commander') + ' → ' + (r.gateau_commande||'À commander'));
      if ((prevResa.gateau_allergies||'') !== (r.gateau_allergies||'')) histEntry.changes.push('Allergies: "' + (prevResa.gateau_allergies||'aucune') + '" → "' + (r.gateau_allergies||'aucune') + '"');
    } else {
      histEntry.changes.push('Réservation créée');
    }

    // Sauvegarder dans l'historique Firebase
    if (histEntry.changes.length > 0) {
      r.history = prevResa && prevResa.history ? prevResa.history : [];
      r.history.unshift(histEntry); // plus récent en premier
      if (r.history.length > 50) r.history = r.history.slice(0, 50); // max 50 entrées

      // Envoyer email si changement statut ou financier
      if (histEntry.alert) {
        var nomResa = r.prenom_enfant || r.organisation || r.nom_contact || 'Réservation';
        var emailBody = 'Modification détectée dans AbracadaParc RH\n\n';
        emailBody += 'Réservation : ' + nomResa + (r.ref ? ' (' + r.ref + ')' : '') + '\n';
        emailBody += 'Date visite : ' + (r.date || '—') + '\n';
        emailBody += 'Modifié par : ' + r.modified_by + '\n';
        emailBody += 'Le : ' + new Date(r.modified_at).toLocaleString('fr-FR') + '\n\n';
        emailBody += 'Changements :\n';
        histEntry.changes.forEach(function(c) { emailBody += '  • ' + c + '\n'; });
        emailBody += '\nAccéder à l\'outil : https://abracadaparc.github.io/-rh/';
        try {
          save('alert_email_queue', {
            to: 'contact@abracadaparc.fr',
            subject: '🔔 AbracadaParc — Modification réservation : ' + nomResa,
            body: emailBody,
            ts: r.modified_at
          });
        } catch (e) {}
      }
    }

    // ── BUG FIX : merger avec l'existant pour préserver tous les champs Firebase ──
    // Sans ce merge, les champs non présents dans le formulaire (gateau_commande,
    // gateau_date_livraison, option_animateur, formule_label, ref_commande, solde, etc.)
    // sont écrasés et perdus à chaque sauvegarde.
    var existing = state.reservations[r.id] || {};
    var merged = Object.assign({}, existing, r);
    state.reservations[r.id] = merged;
    // ── FIN BUG FIX ──

    state.showForm = false;
    state.walkin = false;
    saveAll();
    render();
  }

  // ─── SAUVEGARDE MÉMO ─────────────────────────────────────────────────────────

  function saveMemo() {
    const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    const d = state.memoData;

    const nom = get('m-nom');
    if (!nom) { alert('Le nom est requis.'); return; }

    const m = {
      id: state.editMemoId || uid(),
      prenom: get('m-prenom'),
      nom,
      tel: get('m-tel'),
      email: get('m-email'),
      type_event: d.type_event || '',
      date_souhaitee: get('m-date'),
      nb_personnes: get('m-nb'),
      note: get('m-note'),
      walkin: d.walkin || false,
      converted: false,
      created_at: state.editMemoId ? (state.memos[state.editMemoId]?.created_at || new Date().toISOString()) : new Date().toISOString(),
    };

    state.memos[m.id] = m;
    state.showMemoForm = false;
    saveAll();
    render();

    // ── Email auto à Vanessa pour les nouveaux leads ──────────
    if (!state.editMemoId) {
      try {
        var types = { anniversaire:'🎂 Anniversaire', privatisation:'🏡 Privatisation', groupe:'👨‍👩‍👧 Groupe', scolaire:'🏫 Scolaire', autre:'📋 Autre' };
        var typeLabel = types[m.type_event] || m.type_event || 'Demande';
        var sujet = '[AbracadaParc] Nouveau lead sur place — ' + typeLabel + ' · ' + m.nom;
        var corps = [
          '🌿 Nouveau contact enregistré sur place',
          '',
          'Nom    : ' + (m.prenom ? m.prenom + ' ' : '') + m.nom,
          'Tél    : ' + (m.tel || '—'),
          'Email  : ' + (m.email || '—'),
          'Type   : ' + typeLabel,
          'Date   : ' + (m.date_souhaitee || 'à définir'),
          'Pers.  : ' + (m.nb_personnes || '—'),
          'Note   : ' + (m.note || '—'),
          '',
          '→ App RH : https://abracadaparc.github.io/-rh/',
          '→ Onglet Mémos pour relancer',

        // Ouvrir Gmail pré-rempli vers contact@abracadaparc.fr

    // (évite d'écraser Firebase lors d'un premier chargement avant réponse Firebase)

    state.reservations = load('reservations', {});

        var groupes = state._groupes || {};

        try { localStorage.setItem('abr_reservations', JSON.stringify(state.reservations)); } catch (e) {}
        render();
      }
    });

    // Charger les groupes depuis abr26_groupes (indexés par N° devis)
    listen('abr26_groupes', function(data) {
      if (!data || typeof data !== 'object') return;
      var gNorm = {};
      Object.keys(data).forEach(function(key) {
        var g = data[key];
        if (!g || typeof g !== 'object') return;
        // Statut : lire le champ decision ou statut
        var dec = (g.decision||g.statut||g.etapeDossier||'').toString().toUpperCase().trim();
        var st = 2;
        if(dec==='VALIDÉ'||dec==='VALIDE'||dec.indexOf('VALID')>=0) st=5;
        else if(dec==='FACTURÉ'||dec==='FACTURE'||dec.indexOf('FACTUR')>=0) st=6;
        else if(dec==='CONFIRMÉ'||dec==='CONFIRME') st=4;
        else if(/^[1-6]$/.test(dec)) st=parseInt(dec);
        // Créneau → heure_debut ex '10h - 17h00' ou '10:00'
        var heure='10:00';
        if(g.creneau){
          var cr=g.creneau.toString().split('-')[0].trim().split(' ')[0].trim();

          else if(cr.indexOf(':')>=0){heure=cr;}
          else{heure=cr+':00';}
        }

        var dv='';
        if(g.date&&typeof g.date==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(g.date)) dv=g.date;

        gNorm[key]={
          id:key, segment:isAnniv?'anniversaire':(g.segment||'alsh'), statut:String(st),
          nom:g.client||g.nom||key,
          nom_contact:g.client||g.nom||key,
          organisation:g.client||g.nom||key,
          prenom_enfant:g.prenom_enfant||g.enfant||'',
          date:dv, heure_debut:heure,
          nb_enfants:parseInt(g.enfants||g.nb_enfants)||0,
          nb_adultes:parseInt(g.accompagnants||g.nb_adultes)||0,
          total:tot, montant_total:tot,
          acompte_paye:ac, acompte_verse:ac, solde_restant:sol,
          notes:g.note||g.notes||'',
          devis:key, source:'abr26_groupes',
          // Champs anniversaire
          gateau_nacima: isAnniv && g.gateau ? g.gateau : '',
          gateau: g.gateau||'',
          animateur: g.animateur||'',
          invites: g.invites||'',
          email_contact: g.email||g.contact_email||'',
          tel_contact: g.tel||'',
          acompte_recu: !!g.acompte_ok || !!g.acompte_recu,
          bc_recu: !!g.bc_recu,
          decision:(g.decision||g.etape_dossier||'').toString(),
        };
      });
      state._groupes=gNorm;
      var anniv={};
      Object.keys(state.reservations||{}).forEach(function(k){
        var rv=state.reservations[k];
        if(rv&&rv.source!=='abr26_groupes') anniv[k]=rv;
      });
      state.reservations=Object.assign({},anniv,gNorm);
      try {localStorage.setItem('abr_reservations',JSON.stringify(state.reservations));} catch (e) {}
      render();
    });
    // ── Anniversaires WooCommerce ──
    listen('abr26_reservations', function(data) {
      if (!data || typeof data !== 'object') return;
      var anniversaires = {};
      Object.keys(data).forEach(function(key) {
        var r = data[key];
        if (!r || typeof r !== 'object') return;
        if (!r.id) r.id = key;
        r.source = 'abr26_reservations';
        if (!r.segment) r.segment = 'anniversaire';
        anniversaires[key] = r;
      });
      var groupes = state._groupes || {};
      var ancResas = {};
      Object.keys(state.reservations||{}).forEach(function(k) {
        var rv=state.reservations[k];
        if(rv&&rv.source!=='abr26_groupes'&&rv.source!=='abr26_reservations') ancResas[k]=rv;
      });
      state.reservations=Object.assign({},groupes,ancResas,anniversaires);
      try {localStorage.setItem('abr_reservations',JSON.stringify(state.reservations));} catch (e) {}
      render();
    });

    // ── Disponibilités par date (depuis Apps Script via Firebase) ──────────
    listen('disponibilites', function(data) {
      if (!data || typeof data !== 'object') return;
      state.disponibilites = {};
      Object.keys(data).forEach(function(k) {
        var d = data[k];
        if (!d) return;
        // Clé format 2026_04_22 → 2026-04-22
        var dateISO = k.replace(/_/g, '-');
        state.disponibilites[dateISO] = {
          date:     d.date || dateISO,
          total:    parseInt(d.total) || 0,
          restant:  parseInt(d.restant) || 150,

      });
      try { localStorage.setItem('abr_disponibilites', JSON.stringify(state.disponibilites)); } catch (e) {}
      render();
    });

    // ── Alertes calculées par Apps Script ──────────────────────────────────
    listen('alertes', function(data) {
      if (!data || typeof data !== 'object') return;
      state.alertes_script = data;
      render();
    });

    listen('memos', data => {
      if (data) {
        state.memos = data;
        try { localStorage.setItem('abr_memos', JSON.stringify(data)); } catch (e) {}
        render();
      }
    });

    if (autoRender) {
      // Attendre que le DOM soit prêt
      const tryRender = () => {
        const el = document.getElementById('tab-reservations');
        if (el) { render(); } else { setTimeout(tryRender, 100); }
      };
      tryRender();
    }
  }

  // ─── EXPORT ──────────────────────────────────────────────────────────────────

  window.ReservationsTab = { init, render, state };

})();

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmt(d) { return (d instanceof Date ? d : new Date(d)).toISOString().slice(0,10); }
function fmtFR(s) { const [y,m,d] = s.split("-"); return `${d}/${m}/${y}`; }
function fmtFR2(s) { const d=new Date(s+"T12:00"); return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}); }

function getDayType(ds) {
  if (ds < SEASON_START || ds > SEASON_END) return null;
  for (const h of SCHOOL_HOLIDAYS) { if (ds >= h.start && ds <= h.end) return "vacances"; }
  const d = new Date(ds+"T12:00"); const dw = d.getDay();
  if (dw === 3) return "mercredi"; // Wednesday
  if (dw === 0 || dw === 6) return "weekend";
  return null; // closed
}

function getSlotKey(ds, dayType, isWeekend) {
  if (!dayType) return null;
  if (dayType === "vacances") return isWeekend ? "vacWE" : "vacWD";
  if (dayType === "mercredi") return "wed";
  return "we";
}

function calcDayCost(level, slotKey, taux=12.02) {
  if (!level || !slotKey) return 0;
  const slots = LEVELS[level][slotKey] || [];
  return slots.reduce((s,p) => s + p.h, 0) * taux * CHARGES_PAT;
}

function buildSeasonDays() {
  const days = [];
  let d = new Date(SEASON_START+"T12:00");
  const end = new Date(SEASON_END+"T12:00");
  while (d <= end) {
    const ds = fmt(d);
    const dw = d.getDay();
    const isWE = dw===0||dw===6;
    const dayType = getDayType(ds);
    if (dayType) days.push({ ds, dayType, isWE, dw });
    d = addDays(d, 1);
  }
  return days;
}

    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }

                      merged[id][field] = current[id][field];
                    }
                  });
                }
              });
            }
          }
          ref.current = merged;
          setVal(merged);
          localStorage.setItem(key, JSON.stringify(merged));
        } catch {}
      }
      setReady(true);
    });
    return () => fbRef.off("value");
  }, [key]);

  const save = useCallback(v => {
    const next = typeof v==="function" ? v(ref.current) : v;
    ref.current = next; setVal(next);
    try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
    fbSave(key, JSON.stringify(next));
    if (key === "abr26_shifts_v4") {
      localStorage.setItem("abr26_planning_updated", Date.now().toString());
      fbSave("abr26_planning_updated", Date.now().toString());
    }
  }, [key]);
  return [val, save, ready];
}

              {is1Mai && <span style={{ position:"absolute", top:4, right:6, fontSize:9, background:"#E53935", color:"#fff", padding:"1px 5px", borderRadius:10, fontWeight:700 }}>1er MAI ×2</span>}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                <span style={{ fontSize:13, fontWeight:800, color:"#212121" }}>{fmtFR2(ds)}</span>
                <span style={{ fontSize:9, fontWeight:700, padding:"2px 7px", borderRadius:10, background:dtBg[dayType], color:dtColor[dayType] }}>{dtLabel[dayType]}</span>
              </div>
              <LvlBadge level={level} sm />
              {level && (
                <div style={{ marginTop:7 }}>
                  {slots?.slice(0,3).map((p,i) => (
                    <div key={i} style={{ fontSize:9, color:l.color, lineHeight:1.6 }}>
                      {p.deb}–{p.fin} ({p.h}h)
                    </div>
                  ))}
                  {slots?.length > 3 && <div style={{ fontSize:9, color:l.color }}>+{slots.length-3} pers.</div>}
                  <div style={{ fontSize:10, fontWeight:700, color:l.color, marginTop:3 }}>≈ {Math.round(cost)} €</div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Éditeur niveau */}
      {editing && (() => {
        const {dayType, isWE} = SEASON_DAYS.find(d => d.ds === editing) || {};
        const sk = getSlotKey(editing, dayType, isWE);
        return (
          <Modal title={`${fmtFR(editing)} · ${dayType?.toUpperCase()}`} onClose={() => setEditing(null)}>
            <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
              {Object.entries(LEVELS).map(([lk, lv]) => {
                const slots = lv[sk] || [];
                const cost = calcDayCost(lk, sk);
                const active = dayLevels[editing] === lk;
                return (
                  <div key={lk} onClick={() => { setLevel(editing, lk); setEditing(null); }} style={{
                    padding:"14px 16px", borderRadius:12, cursor:"pointer",
                    background: active ? lv.bg : "#FAFAFA",
                    border: `2px solid ${active ? lv.border : "#E0E0E0"}`,
                    transition:"all 0.15s",
                  }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                      <span style={{ fontSize:16, fontWeight:800, color:lv.color }}>{lk}</span>
                      <span style={{ fontSize:13, fontWeight:700, color:lv.color }}>{Math.round(cost)} € chargé</span>
                    </div>
                    <div style={{ fontSize:11, color:"#757575", marginBottom:8, lineHeight:1.5 }}>{lv.desc}</div>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      {slots.map((p,i) => (
                        <span key={i} style={{ padding:"3px 10px", borderRadius:20, fontSize:11, background:lv.bg, color:lv.color, border:`1px solid ${lv.border}`, fontWeight:600 }}>
                          P{i+1} · {p.deb}–{p.fin} · {p.h}h
                        </span>
                      ))}
                    </div>
                  </div>
                );
              })}
              <button onClick={() => { setLevel(editing, null); setEditing(null); }} style={{ ...S.btn, ...S.btnD }}>Retirer le niveau</button>
            </div>
          </Modal>
        );
      })()}
    </div>
  );
}

// Returns typical hours worked per open day per employee based on their availability rules
// We use NORMAL level as forecast basis (conservative, can be adjusted)
function getEmpAvailability(emp, ds, dayType, isWE) {
  if (!ds || ds < emp.debut || ds > emp.fin) return 0;
  const d = new Date(ds + "T12:00");
  const dw = d.getDay(); // 0=Sun, 1=Mon, 6=Sat
  const m = d.getMonth() + 1;

  // MYRON (t1) – apprenti, dispo tous les jours sauf périodes école
  if (emp.id === "t1") {
    const ecoleIntervals = [
      ["2026-05-18","2026-05-22"],
      ["2026-06-23","2026-06-23"],
      ["2026-08-17","2026-08-21"],
    ];
    for (const [s,e] of ecoleIntervals) { if (ds >= s && ds <= e) return 0; }
    return 1;
  }

  // AYTHANN (t2) – WE seulement avr-mai, complet juin-juil, S1+S2 août uniquement
  // Contrat se termine fin août — septembre non confirmé
  if (emp.id === "t2") {
    if (m <= 5) return isWE ? 1 : 0;   // avr-mai : WE uniquement
    if (m <= 7) return 1;               // juin-juil : tous les jours
    if (m === 8) return ds <= "2026-08-16" ? 1 : 0; // août S1+S2 seulement
    return 0; // sept+ : non prévu (à confirmer séparément)
  }

  // ALYSSA (t3) – MER + WE uniquement, jusqu'au 21 juin
  if (emp.id === "t3") {
    if (ds > "2026-06-21") return 0;
    return (dw === 3 || isWE) ? 1 : 0;
  }

  // BELENZ (t4) – CDD modulable démarré le 21 avril, toute la saison
  if (emp.id === "t4") {
    if (ds < "2026-04-20") return 0;
    return 1; // disponible tous les jours ouverts jusqu'en novembre
  }

  // FLORENCE (t5) – POEI 1-19 avril, dispo dès le 20 avril toute la saison
  if (emp.id === "t5") {
    if (ds < "2026-04-20") return 0;
    return 1;
  }

  // SALLY (sally_s) – mar-sam, 14/04 au 31/07
  // Mardi=2, Mercredi=3, Jeudi=4, Vendredi=5, Samedi=6
  if (emp.id === "sally_s") {
    if (dw === 0 || dw === 1) return 0; // pas dim ni lun
    return 1;
  }

  // t6 NOUVEAU C – toute la saison, WE confirmés sept-oct
  if (emp.id === "t6") {
    if (m >= 9) return isWE ? 1 : 0;
    return 1;
  }

  // Fallback générique : dispo sur toute la période de contrat
  return 1;
}

// Average hours per day based on level and slot (spread across team positions)
// We use a fair split: in NORMAL: positions alternate ~7-8h each
// Heures réelles par salarié selon les créneaux définis dans le planning :
// Myron (t1)      : 09:30-17:00 = 7h (tous types de jours)
// Aythann (t2)    : 11:30-18:30 = 6.5h (tous ses jours)
// Alyssa (t3)     : 09:30-18:30 = 8.5h (mer/vac), 09:30-16:30/17:30 = 7h (WE)
// Belenz (t4)     : 09:30-17:30 = 7.5h (journée) ou 15:00-22:30 = 7h (fermeture) — moy 7.25h
// Florence (t5)   : 09:30-18:30 = 8.5h (mer/vac), 11:30-18:30 = 6.5h (WE) — moy 7.5h
// Sally (sally_s) : 11:30-18:30 = 7h (mar-sam)
// Nouveau C (t6)  : 11:30-18:30 = 6.5h (fermeture)
const AVG_H_BY_EMP = {
  t1:      { wed:7.0,  we:7.0,  vacWD:7.0,  vacWE:7.0  },
  t2:      { wed:6.5,  we:6.5,  vacWD:6.5,  vacWE:6.5  },
  t3:      { wed:8.5,  we:7.0,  vacWD:8.5,  vacWE:7.0  },
  t4:      { wed:7.25, we:7.25, vacWD:7.25, vacWE:7.25 },
  t5:      { wed:8.5,  we:6.5,  vacWD:8.5,  vacWE:6.5  },
  sally_s: { wed:7.0,  we:7.0,  vacWD:7.0,  vacWE:7.0  },
  t6:      { wed:6.5,  we:6.5,  vacWD:6.5,  vacWE:6.5  },
};
// Fallback pour IDs inconnus
const AVG_H_NORMAL = { wed:7.0, we:7.0, vacWD:7.0, vacWE:7.0 };

function forecastMonthHours(emp, month, year) {
  // Normaliser l'emp depuis TEAM_INIT si les données Firebase sont incomplètes
  // Cela garantit que emp.id, emp.debut, emp.fin sont toujours fiables
  const empRef = TEAM_INIT.find(e => e.id === emp.id || e.nom === emp.nom) || emp;
  const empNorm = Object.assign({}, empRef, {
    debut: emp.debut || empRef.debut,
    fin:   emp.fin   || empRef.fin,
    id:    emp.id    || empRef.id,
  });

  let h = 0;
  const days_in_month = new Date(year, month, 0).getDate();
  for (let day = 1; day <= days_in_month; day++) {
    const ds = `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    if (ds < SEASON_START || ds > SEASON_END) continue;
    const dayType = getDayType(ds);
    if (!dayType) continue;
    const d = new Date(ds + "T12:00");
    const dw = d.getDay();
    const isWE = dw === 0 || dw === 6;
    const avail = getEmpAvailability(empNorm, ds, dayType, isWE);
    if (!avail) continue;
    const sk = getSlotKey(ds, dayType, isWE);
    const empHours = AVG_H_BY_EMP[empNorm.id] || AVG_H_NORMAL;
    h += empHours[sk] || 7;
  }
  return Math.round(h * 10) / 10;
}

// ─── DISPONIBILITÉS TEMPS RÉEL TAB ───────────────────────────────────────────
function DispoTempsReelTab({ reservations, disponibilites, alertes_script }) {
  const [dateCheck, setDateCheck] = React.useState('');
  const [nbEnfants, setNbEnfants] = React.useState('');
  const [resultCheck, setResultCheck] = React.useState(null);
  const CAPACITE = 150;
  const LIMITE   = 180;
  const ALERTE   = 120;

  // Calculer les dispos depuis les réservations Firebase
  const dispoParDate = React.useMemo(() => {
    const d = {};
    // D'abord depuis le nœud disponibilites (Apps Script)
    if (disponibilites && typeof disponibilites === 'object') {
      Object.keys(disponibilites).forEach(k => {
        const v = disponibilites[k];
        if (v && v.date) d[v.date] = { ...v, source: 'script' };
      });
    }
    // Compléter / recalculer depuis les réservations
    if (reservations && typeof reservations === 'object') {
      Object.values(reservations).forEach(r => {
        if (!r) return;
        const dec = (r.decision || r.statut || '').toString().toUpperCase();
        if (dec.indexOf('REFUS') >= 0 || dec.indexOf('ANNUL') >= 0) return;
        const dt = r.date || r.date_visite || '';
        if (!dt || !/^\d{4}-\d{2}-\d{2}$/.test(dt)) return;
        const enf = parseInt(r.nb_enfants || r.enfants || 0) || 0;
        if (!d[dt]) d[dt] = { date: dt, total: 0, restant: CAPACITE, statut: 'OK', groupes: [] };
        if (!d[dt].source) { // recalcul uniquement si pas déjà depuis script
          d[dt].total = (d[dt].total || 0) + enf;
          d[dt].restant = Math.max(0, CAPACITE - d[dt].total);
          if (d[dt].total >= LIMITE)  d[dt].statut = 'COMPLET';
          else if (d[dt].total >= CAPACITE) d[dt].statut = 'COMPLET';
          else if (d[dt].total >= ALERTE) d[dt].statut = 'CHARGE';
          else d[dt].statut = 'OK';
        }
        if (!d[dt].groupes) d[dt].groupes = [];
        d[dt].groupes.push({
          ref: r.id || r.devis || '',
          client: r.organisation || r.nom || r.client || '',
          enfants: enf,
          creneau: r.heure_debut || '',
        });
      });
    }
    return d;
  }, [reservations, disponibilites]);

  const checkDispo = () => {
    if (!dateCheck) return;
    const nb = parseInt(nbEnfants) || 0;
    const jour = dispoParDate[dateCheck] || { total: 0, restant: CAPACITE, statut: 'OK', groupes: [] };
    const apres = jour.total + nb;
    let statut, message, color;
    if (apres >= LIMITE) {
      statut = 'COMPLET'; color = '#C62828';
      message = 'REFUSER — ' + apres + ' enfants dépasse la limite absolue (' + LIMITE + ')';
    } else if (apres >= CAPACITE) {
      statut = 'COMPLET'; color = '#C62828';
      message = 'JOURNÉE COMPLÈTE — Total serait ' + apres + '/' + CAPACITE;
    } else if (apres >= ALERTE) {
      statut = 'CHARGÉ'; color = '#E65100';
      message = 'JOURNÉE CHARGÉE — Total serait ' + apres + '/' + CAPACITE + ' (' + Math.max(0, CAPACITE - apres) + ' pl. restantes)';
    } else {
      statut = 'OK'; color = '#2E7D32';
      message = 'OK — Total serait ' + apres + '/' + CAPACITE + ' (' + (jour.restant - nb) + ' pl. restantes après)';
    }
    setResultCheck({ statut, message, color, apres, restant: jour.restant, groupes: jour.groupes });
  };

  const statusColor = s => s === 'COMPLET' ? '#FFEBEE' : s === 'CHARGE' || s === 'CHARGÉ' ? '#FFF3E0' : '#E8F5E9';
  const statusText  = s => s === 'COMPLET' ? '#C62828' : s === 'CHARGE' || s === 'CHARGÉ' ? '#E65100' : '#2E7D32';

  // Jours à venir triés
  const today = new Date().toISOString().slice(0, 10);
  const joursVenir = Object.keys(dispoParDate)
    .filter(d => d >= today)
    .sort()
    .slice(0, 40);

  // Alertes depuis Apps Script
  const alertes = alertes_script && typeof alertes_script === 'object' ? Object.values(alertes_script) : [];
  const alertesUrgentes = alertes.filter(a => a && a.niveau === 'urgent');
  const alertesWarning  = alertes.filter(a => a && a.niveau === 'warning');
  const alertesInfo     = alertes.filter(a => a && a.niveau === 'info');

  return (
    <div>
      {/* Alertes critiques */}
      {alertesUrgentes.length > 0 && (
        <div style={{ background:'#FFEBEE', border:'1px solid #EF9A9A', borderRadius:8, padding:'12px 16px', marginBottom:16 }}>
          <div style={{ fontWeight:700, color:'#C62828', marginBottom:6, fontSize:13 }}>🔴 Alertes urgentes ({alertesUrgentes.length})</div>
          {alertesUrgentes.map((a,i) => (
            <div key={i} style={{ fontSize:12, color:'#B71C1C', marginBottom:3 }}>• {a.message}</div>
          ))}
        </div>
      )}
      {alertesWarning.length > 0 && (
        <div style={{ background:'#FFF3E0', border:'1px solid #FFB74D', borderRadius:8, padding:'10px 16px', marginBottom:16 }}>
          <div style={{ fontWeight:700, color:'#E65100', marginBottom:6, fontSize:13 }}>⚠️ BC manquants ({alertesWarning.length})</div>
          {alertesWarning.map((a,i) => (
            <div key={i} style={{ fontSize:12, color:'#BF360C', marginBottom:3 }}>• {a.message}</div>
          ))}
        </div>
      )}
      {alertesInfo.length > 0 && (
        <div style={{ background:'#E8F5E9', border:'1px solid #A5D6A7', borderRadius:8, padding:'10px 16px', marginBottom:16 }}>
          <div style={{ fontWeight:700, color:'#2E7D32', marginBottom:6, fontSize:13 }}>💶 À facturer ({alertesInfo.length})</div>
          {alertesInfo.map((a,i) => (
            <div key={i} style={{ fontSize:12, color:'#1B5E20', marginBottom:3 }}>• {a.message}</div>
          ))}
        </div>
      )}

      {/* Vérificateur rapide */}
      <div style={{ ...S.card, background:'#E8F5E9', border:'1px solid #A5D6A7', marginBottom:18 }}>
        <div style={{ fontWeight:700, color:'#2E7D32', marginBottom:10, fontSize:13 }}>Vérifier une date</div>
        <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
          <input type="date" value={dateCheck} onChange={e=>setDateCheck(e.target.value)}
            min="2026-04-01" max="2026-11-02"
            style={{ height:34, padding:'0 10px', border:'1px solid #A5D6A7', borderRadius:6, fontSize:13, background:'#fff' }} />
          <input type="number" value={nbEnfants} onChange={e=>setNbEnfants(e.target.value)}
            placeholder="Nb enfants" min="1" max="180"
            style={{ height:34, width:110, padding:'0 10px', border:'1px solid #A5D6A7', borderRadius:6, fontSize:13, background:'#fff' }} />
          <button onClick={checkDispo}
            style={{ ...S.btn, ...S.btnG, height:34, padding:'0 18px', fontSize:13 }}>
            Vérifier
          </button>
        </div>
        {resultCheck && (
          <div style={{ marginTop:12, padding:'10px 14px', borderRadius:6,
            background: statusColor(resultCheck.statut),
            border: '1px solid ' + resultCheck.color }}>
            <div style={{ fontWeight:700, color:resultCheck.color, fontSize:13, marginBottom:4 }}>
              {resultCheck.statut} — {resultCheck.message}
            </div>
            {resultCheck.groupes && resultCheck.groupes.length > 0 && (
              <div style={{ fontSize:11, color:'#555', marginTop:4 }}>
                Groupes ce jour : {resultCheck.groupes.map(g => g.client + ' (' + g.enfants + ' enf.)').join(' · ')}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Liste des jours */}
      <div style={{ ...S.card }}>
        <div style={{ fontWeight:700, color:'#2E7D32', marginBottom:12, fontSize:13 }}>
          Planning des disponibilités — {joursVenir.length} jours à venir
        </div>
        {joursVenir.length === 0 && (
          <div style={{ fontSize:12, color:'#999', textAlign:'center', padding:20 }}>
            En attente des données Firebase (Apps Script sync à 8h + 18h)
          </div>
        )}
        {joursVenir.map(d => {
          const j = dispoParDate[d];
          const pct = Math.min(100, Math.round((j.total / CAPACITE) * 100));
          const bg  = statusColor(j.statut);
          const tx  = statusText(j.statut);
          const barC = j.statut === 'COMPLET' ? '#E24B4A' : j.statut === 'CHARGE' ? '#EF9F27' : '#97C459';
          const joursAvant = Math.round((new Date(d+'T12:00') - new Date()) / 86400000);
          return (
            <div key={d} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 10px',
              borderRadius:6, background:bg, marginBottom:5, border:'0.5px solid ' + barC + '44' }}>
              <div style={{ fontSize:12, fontWeight:600, color:tx, minWidth:110 }}>
                {new Date(d+'T12:00').toLocaleDateString('fr-FR', {weekday:'short',day:'numeric',month:'short'})}
                <span style={{ fontWeight:400, color:'#888', fontSize:11 }}> J-{joursAvant}</span>
              </div>
              <div style={{ flex:1, height:6, background:'rgba(0,0,0,0.08)', borderRadius:3, overflow:'hidden' }}>
                <div style={{ width:pct+'%', height:'100%', background:barC, borderRadius:3 }} />
              </div>
              <div style={{ fontSize:12, fontWeight:700, color:tx, minWidth:90, textAlign:'right' }}>
                {j.total >= CAPACITE ? '🔴 COMPLET' : j.total + ' enf. · ' + j.restant + ' pl.'}
              </div>
              {j.groupes && j.groupes.length > 0 && (
                <div style={{ fontSize:10, color:'#666', minWidth:200, maxWidth:250, overflow:'hidden',
                  textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                  {j.groupes.map(g=>g.client).join(' · ')}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RecapECTab({ team, shifts }) {

  const activeTeam = team.filter(e => e.actif);

  const buildRecap = () => {
    const lines = [];
    const sep = "═".repeat(64);
    const sep2 = "─".repeat(64);

    lines.push(sep);
    lines.push("DOSSIER PRÉVISIONNEL MASSE SALARIALE — SAISON 2026");
    lines.push("AbracadaParc — SIREN 979 489 929 — APE 9321Z");
    lines.push("PLACE HYACINTHE DRUJON, 95190 GOUSSAINVILLE");
    lines.push("Convention collective IDCC 1790 — Espaces de loisirs");
    lines.push(`Établi le ${today} par Vanessa Schweitzer, Gérante`);
    lines.push(sep);
    lines.push("");
    lines.push("1. ÉQUIPE ET CONTRATS — SAISON 2026");
    lines.push(sep2);

    activeTeam.forEach((emp, idx) => {
      lines.push(`  ${idx+1}. ${emp.prenom ? emp.prenom.toUpperCase() + " " : ""}${emp.nom}`);
      lines.push(`     Type de contrat  : ${emp.contrat}`);
      lines.push(`     Poste            : ${emp.poste}`);
      lines.push(`     Période          : ${emp.debut} → ${emp.fin}`);
      lines.push(`     Taux horaire     : ${(parseFloat(emp.taux)||0).toFixed(2)} €/h brut`);
      lines.push(`     Volume contractuel : ${emp.heures_mois}h/mois`);
      if (emp.disponibilite) lines.push(`     Disponibilité    : ${emp.disponibilite}`);
      if (emp.ecole_periodes?.length) lines.push(`     Périodes école   : ${emp.ecole_periodes.join(", ")}`);
      if (emp.note) lines.push(`     Note             : ${emp.note}`);
      lines.push("");
    });

    lines.push("2. PRÉVISIONNEL HEURES PAR SALARIÉ × MOIS (base niveau NORMAL)");
    lines.push(sep2);

    const matrix = activeTeam.map(emp => ({
      emp,
      months: OPEN_MONTH_NUMS.map(m => forecastMonthHours(emp, m, YEAR)),
      get total() { return Math.round(this.months.reduce((s,x)=>s+x,0)*10)/10; },
    }));

    const header = ["Salarié".padEnd(16), ...OPEN_MONTH_NUMS.map(m => MOIS_FR[m].slice(0,4).padStart(7)), "  TOTAL".padStart(8)].join("");
    lines.push(`  ${header}`);
    lines.push("  " + "─".repeat(header.length));

    matrix.forEach(({emp, months, total}) => {
      const name = (emp.prenom ? emp.prenom + " " + emp.nom : emp.nom).slice(0,14).padEnd(16);
      const mCols = months.map(h => {
        const m_idx = OPEN_MONTH_NUMS[months.indexOf(h)];
        const inC = m_idx >= parseInt(emp.debut.slice(5,7)) && m_idx <= parseInt(emp.fin.slice(5,7));
        return inC ? String(h + "h").padStart(7) : "    —  ".padStart(7);
      });
      lines.push(`  ${name}${mCols.join("")}${String(total+"h").padStart(8)}`);
    });

    lines.push("  " + "─".repeat(header.length));
    const colTotals = OPEN_MONTH_NUMS.map((_, i) =>
      Math.round(matrix.reduce((s,r) => s + (r.months[i]||0), 0) * 10) / 10
    );
    const grandTotal = Math.round(matrix.reduce((s,r)=>s+r.total,0)*10)/10;
    const totRow = "TOTAL ÉQUIPE".padEnd(16) + colTotals.map(h => String(h+"h").padStart(7)).join("") + String(grandTotal+"h").padStart(8);
    lines.push(`  ${totRow}`);
    lines.push("");

    lines.push("3. COÛT MENSUEL ESTIMÉ ÉQUIPE (brut + charges patronales ×1,45)");
    lines.push(sep2);

    OPEN_MONTH_NUMS.forEach((m, i) => {
      const h = colTotals[i];
      const brutMois = Math.round(matrix.reduce((s,r) => {
        const mh = r.months[i] || 0;
        const empRef2 = TEAM_INIT.find(e => e.id === r.emp.id || e.nom === r.emp.nom) || r.emp;
        const taux = parseFloat(r.emp.taux) || parseFloat(empRef2.taux) || 12.02;
        return s + mh * taux;
      }, 0));
      const charged = Math.round(brutMois * CHARGES_PAT);
      lines.push(`  ${MOIS_FR[m].padEnd(12)} : ${String(h+"h").padStart(7)} — brut ${String(brutMois.toLocaleString("fr")+"€").padStart(8)} — chargé ~${String(charged.toLocaleString("fr")+"€").padStart(9)}`);
    });

    const totalBrut = Math.round(matrix.reduce((s,r) => {
      const empRef3 = TEAM_INIT.find(e => e.id === r.emp.id || e.nom === r.emp.nom) || r.emp;
      const taux = parseFloat(r.emp.taux) || parseFloat(empRef3.taux) || 12.02;
      return s + r.total * taux;
    }, 0));
    const totalCharged = Math.round(totalBrut * CHARGES_PAT);
    lines.push("  " + "─".repeat(55));
    lines.push(`  ${"TOTAL SAISON".padEnd(12)} : ${String(grandTotal+"h").padStart(7)} — brut ${String(totalBrut.toLocaleString("fr")+"€").padStart(8)} — chargé ~${String(totalCharged.toLocaleString("fr")+"€").padStart(9)}`);
    lines.push("");

    lines.push("4. POINTS D'ATTENTION & RECOMMANDATIONS");
    lines.push(sep2);
    lines.push(`    Formation préalable à l'embauche : réduction significative du coût employeur.`);

    lines.push(`  ▸ Heures modulables CDD : veiller à remettre le planning 3 semaines à l'avance`);
    lines.push(`    (Aythann septembre+, Joris, Florence, Nouveau C).`);
    lines.push("");

    lines.push("5. PÉRIODE DE FERMETURE (nov. 2026 – mars 2027)");
    lines.push(sep2);
    lines.push(`  Seul Myron reste en poste (contrat apprentissage jusqu'au 31/08/2026 — à renouveler).`);
    lines.push(`  NB : Si Myron passe en LP 2e année ou Licence professionnelle nouvelle saison :`);
    lines.push(`       taux passerait à 80–85% SMIC selon âge/année → prévoir la revalorisation.`);
    lines.push(`  Charges fixes mensuelles minimum estimées hors saison : ~14 410 €/mois`);
    lines.push(`    (prêt 8 202,66 € + Myron ~1 207 € + frais fixes ~5 000 €)`);
    lines.push("");

    lines.push(sep);
    lines.push(`Document préparé pour transmission à l'expert-comptable — AbracadaParc ${YEAR}`);
    lines.push(`Vanessa Schweitzer, Gérante — ${today}`);
    lines.push(sep);

    setGenerated(lines.join("\n"));
  };

  const download = () => {
    const blob = new Blob([generated], { type:"text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `AbracadaParc_Previsionnel_MS_2026.txt`; a.click();

// Alerte charge journalière
function rv2AlerteCharge(dossiers){
  const byDate = {};
  dossiers.forEach(d=>{
    if(!d.date_souhaitee||d.decision_client==="REFUSÉ"||d.decision_client==="ANNULÉ") return;
    const k = d.date_souhaitee;
    if(!byDate[k]) byDate[k]={enfants:0,dossiers:[]};
    byDate[k].enfants += parseInt(d.nombre_enfants_prevus)||0;
    byDate[k].dossiers.push(d.nom_structure_ou_client||d.numero_devis_ou_commande);
  });
  return byDate;
}

function couleurDossier(d) {
  var type = ((d.type_demande||d.type_evenement||'')).toLowerCase();
  var dec  = (d.decision_client||'').toUpperCase();
  var stat = (d.statut_docs||'').toUpperCase();
  if (dec.indexOf('REFUS')>=0||dec.indexOf('ANNUL')>=0) return null;
  if (type.indexOf('anniversaire')>=0||type.indexOf('anniv')>=0)
    return {bg:'#FCE4EC',border:'#F48FB1',text:'#AD1457',dot:'#E91E63'};
  if (type.indexOf('privati')>=0||type.indexOf('privé')>=0||type.indexOf('prive')>=0)
    return {bg:'#EDE7F6',border:'#CE93D8',text:'#6A1B9A',dot:'#9C27B0'};
  if (dec.indexOf('VALID')>=0||stat.indexOf('DOSSIER OK')>=0)
    return {bg:'#E8F5E9',border:'#81C784',text:'#1B5E20',dot:'#4CAF50'};

  return {bg:'#E3F2FD',border:'#90CAF9',text:'#1565C0',dot:'#2196F3'};

// ═══════════════════════════════════════════════════════════
// DATE HELPERS — DST-safe (ms arithmetic, anchored at noon)
// ═══════════════════════════════════════════════════════════

function getMondayOf(d) {
  const base = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12, 0, 0);
  const dow = base.getDay();
  const back = dow === 0 ? 6 : dow - 1;
  const result = new Date(base.getTime() - back * 86400000);
  result.setHours(12, 0, 0, 0);
  return result;
}
function getMondayLocal() { return getMondayOf(new Date()); }
function addDaysLocal(d, n) {
  const result = new Date(d.getTime() + n * 86400000);
  result.setHours(12, 0, 0, 0);
  return result;
}
function fmtLocal(d) {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

// ═══════════════════════════════════════════════════════════
// SHA-256 PASSWORD HASH
// ═══════════════════════════════════════════════════════════

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

const ADMIN_HASH_KEY = "abr26_admin_hash";
const EMP_PINS_KEY   = "abr26_emp_pins";
const DEFAULT_PWD    = "Abracadaparc2026";
const DEFAULT_EMP_PIN = "1234";

async function initHash() {
  // Recréer si absent, vide ou corrompu (ex: après vidage cache)
  const existing = localStorage.getItem(ADMIN_HASH_KEY);
  if (!existing || existing.length < 10) {
    const h = await sha256(DEFAULT_PWD);
    localStorage.setItem(ADMIN_HASH_KEY, h);
  }
}
async function resetToDefaultPwd() {
  const h = await sha256(DEFAULT_PWD);
  localStorage.setItem(ADMIN_HASH_KEY, h);
  return true;
}
async function checkPwd(pwd) {
  const h = await sha256(pwd);
  return h === localStorage.getItem(ADMIN_HASH_KEY);
}
async function changePwd(newPwd) {
  const h = await sha256(newPwd);
  localStorage.setItem(ADMIN_HASH_KEY, h);
}

// Employee PINs — stored as {empId: sha256hash}
function getEmpPins() {
  try { return JSON.parse(localStorage.getItem(EMP_PINS_KEY)||"{}"); } catch { return {}; }
}
async function checkEmpPin(empId, pin) {
  const pins = getEmpPins();
  if (!pins[empId]) {
    // No PIN set → accept default PIN and auto-set it
    const defaultH = await sha256(DEFAULT_EMP_PIN);
    if (await sha256(pin) === defaultH) return true;
    return false;
  }
  const h = await sha256(pin);
  return h === pins[empId];
}
async function setEmpPin(empId, pin) {
  const pins = getEmpPins();
  pins[empId] = await sha256(pin);
  localStorage.setItem(EMP_PINS_KEY, JSON.stringify(pins));
}
async function resetEmpPin(empId) {
  const pins = getEmpPins();
  delete pins[empId]; // removes custom PIN
  localStorage.setItem(EMP_PINS_KEY, JSON.stringify(pins));
}

// ═══════════════════════════════════════════════════════════
// CP CALCULATIONS
// ═══════════════════════════════════════════════════════════

function calcCP(emp, shifts, season) {
  const start = emp.debut > season.start ? emp.debut : season.start;
  const end   = emp.fin   < season.end   ? emp.fin   : season.end;
  // ⚠️ CP légaux : acquis seulement après le mois TERMINÉ, pas sur les mois futurs
  const today = new Date();
  const lastCompletedMonth = `${today.getFullYear()}-${String(today.getMonth()).padStart(2,"0")}`;
  // today.getMonth() = mois actuel (0-based) → mois précédent = getMonth() sans +1

  const months = new Set();
  let pris = 0;
  Object.entries(shifts).forEach(([k, sh]) => {
    if (!k.startsWith(emp.id+"_")) return;
    const ds = k.replace(emp.id+"_","");
    if (ds < start || ds > end) return;
    const monthKey = ds.slice(0,7);
    // Compter seulement les mois TERMINÉS (pas le mois en cours ni futurs)
    if (monthKey <= lastCompletedMonth) {
      if (sh.type === "travail" || sh.type === "ecole") months.add(monthKey);
    }
    if (sh.type === "conges") pris++;
  });
  const acquis = Math.round(months.size * 2.5 * 10) / 10;
  const ajustement = Number(emp.cp_ajustement || 0);
  const total_pris = pris + ajustement;
  const restants = Math.round((acquis - total_pris) * 10) / 10;
  return { acquis, pris: total_pris, restants, pris_reel: pris, ajustement, deficit: restants < 0 };
}

// ═══════════════════════════════════════════════════════════
// HOURS ALERTS
// ═══════════════════════════════════════════════════════════

function calcMonthAlerts(team, shifts, year, month) {
  const alerts = [];
  const days = new Date(year, month, 0).getDate();
  team.filter(e=>e.actif).forEach(emp => {
    let worked=0, retards=0, totalRetardH=0;
    for (let i=1; i<=days; i++) {
      const ds=`${year}-${String(month).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
      const sh=shifts[`${emp.id}_${ds}`];
      if (sh?.type==="travail") worked += sh.h||0;
      if (sh?.type==="retard") { retards++; totalRetardH += sh.hRetard||0; }
    }
    const ratio = worked / emp.heures_mois;
    const nom = emp.prenom||emp.nom;
    if (ratio > 1.1) alerts.push({emp,type:"danger",
      msg:`${nom} : ${worked.toFixed(1)}h planifiées vs ${emp.heures_mois}h contrat (+${(worked-emp.heures_mois).toFixed(1)}h) — heures sup à valider`});
    else if (ratio > 0.95 && ratio <= 1.1 && worked > 0) alerts.push({emp,type:"warning",
      msg:`${nom} : ${worked.toFixed(1)}h planifiées — proche du contrat (${emp.heures_mois}h)`});
    // Retard alerts
    if (retards >= 3) alerts.push({emp,type:"danger",retards,totalRetardH,
      msg:`🚨 ${nom} : ${retards} retards ce mois (${totalRetardH.toFixed(1)}h perdues) — entretien recommandé`});
    else if (retards === 2) alerts.push({emp,type:"warning",retards,
      msg:`⚠️ ${nom} : 2 retards ce mois — à surveiller (3 = alerte disciplinaire)`});
  });
  return alerts;
}

// ═══════════════════════════════════════════════════════════
// AUTO-GENERATE DEFAULT SHIFTS
// ═══════════════════════════════════════════════════════════

function generateDefaultShifts(team) {
  const shifts = {};
  const g = id => team.find(e=>e.id===id); // get emp by id

  // Helper: assign shift (checks contract dates)
  const assign = (empId, ds, deb, fin, h) => {
    const e = g(empId);
    if (!e || !e.actif || ds < e.debut || ds > e.fin) return;
    shifts[`${empId}_${ds}`] = {type:"travail", deb, fin, h, note:""};
  };

  const POEI_END   = "2026-04-19"; // POEI ends Apr 19 (Florence & Joris dispo from Apr 20)
  const ALYSSA_END = "2026-06-21"; // Alyssa contract ends

  for (const {ds, dayType, isWE} of SEASON_DAYS) {
    const dow    = new Date(ds+"T12:00").getDay(); // 0=Sun,6=Sat
    const isSat  = dow === 6;
    const aythann = g("t2");

    if (dayType === "mercredi" || (dayType === "vacances" && !isWE)) {
      // ── MERCREDI + VACANCES SEMAINE ──
      // P1: MYRON 09:30-17:00 (7.0h)
      assign("t1", ds, "09:30", "17:00", 7.0);
      // P2: ALYSSA 09:30-18:30 (8.5h). After Alyssa leaves → FLORENCE 09:30-18:30
      if (ds <= ALYSSA_END) {
        assign("t3", ds, "09:30", "18:30", 8.5);
      } else {
        assign("t5", ds, "09:30", "18:30", 8.5); // Florence takes P2
      }
      // P3: 11:30-18:30 (6.5h). NOUVEAU C during POEI. FLORENCE after POEI (until Alyssa leaves). NOUVEAU C after.
      if (ds <= POEI_END) {
        assign("t6", ds, "11:30", "18:30", 6.5); // Nouveau C during POEI
      } else if (ds <= ALYSSA_END) {
        assign("t5", ds, "11:30", "18:30", 6.5); // Florence
      } else {
        assign("t6", ds, "11:30", "18:30", 6.5); // Nouveau C (Florence moved to P2)
      }

    } else if (dayType === "weekend" || (dayType === "vacances" && isWE)) {
      // ── WEEK-END ──
      if (isSat) {
        // SAMEDI — Avril : Myron soirée, Joris journée
        //           Mai+  : Joris soirée fermeture, Myron journée
        const MAI_START = "2026-05-01";
        if (ds >= "2026-04-20" && ds < MAI_START) {
          // AVRIL : Joris journée, Myron soirée
          assign("t4", ds, "09:30", "17:30", 7.5); // BELENZ journée
          assign("t1", ds, "15:00", "22:30", 7.0); // MYRON soirée fermeture
        } else if (ds >= MAI_START) {
          // MAI → : Myron journée, Joris soirée fermeture
          assign("t1", ds, "09:30", "17:00", 7.0); // MYRON journée
          assign("t4", ds, "15:00", "22:30", 7.0); // BELENZ soirée fermeture
          // Aythann soirée à partir de mai (13h-22h30) — non publié pour l'instant
          // assign("t2", ds, "13:00", "22:30", 9.0); // AYTHANN SOIR — à activer après communication
        }
        if (ds <= ALYSSA_END) assign("t3", ds, "09:30", "16:30", 6.5); // ALYSSA sam → 16h30
        if (ds < MAI_START && aythann && getEmpAvailability(aythann,ds,dayType,isWE)) assign("t2", ds, "11:30", "18:30", 6.5); // AYTHANN matin (avril)
        if (ds >= MAI_START && aythann && getEmpAvailability(aythann,ds,dayType,isWE)) assign("t2", ds, "11:30", "18:30", 6.5); // AYTHANN matin (mai+, soirée à décommenter quand prêt)
        if (ds >= "2026-04-20") assign("t5", ds, "11:30", "18:30", 6.5); // FLORENCE
      } else {
        // DIMANCHE
        if (ds >= "2026-04-20") assign("t4", ds, "09:30", "17:30", 7.5); // BELENZ
        if (ds <= ALYSSA_END)  assign("t3", ds, "09:30", "17:30", 7.5); // ALYSSA dim → 17h30
        if (aythann && getEmpAvailability(aythann,ds,dayType,isWE)) assign("t2", ds, "11:30", "18:30", 6.5); // AYTHANN
        if (ds >= "2026-04-20") assign("t5", ds, "11:30", "18:30", 6.5); // FLORENCE
        assign("t1", ds, "09:30", "17:00", 7.0); // MYRON matin dimanche
      }
    }

    // Remaining in-contract employees on open days → repos
    const worked = new Set(Object.keys(shifts).filter(k=>k.endsWith("_"+ds)).map(k=>k.split("_")[0]));
    team.filter(e=>e.actif&&ds>=e.debut&&ds<=e.fin).forEach(e=>{
      if (!worked.has(e.id)) shifts[`${e.id}_${ds}`] = {type:"repos", note:""};
    });
  }

  // ── École Myron — CFA périodes ──
  const ECOLE_CFA = [["2026-05-18","2026-05-22"],["2026-06-23","2026-06-23"],["2026-08-17","2026-08-21"]];
  // ── École Myron — sorties / centres validés ──
  const ECOLE_SPECIFIC = [
    {ds:"2026-04-16", note:"Sortie école/centre"},
    {ds:"2026-05-22", note:"Sortie école/centre"},
    {ds:"2026-05-26", note:"Sortie école/centre"},
    {ds:"2026-05-27", note:"Sortie école/centre (remplace Travail ce jour)"},
    {ds:"2026-06-04", note:"Sortie école/centre"},
    {ds:"2026-06-19", note:"Sortie école/centre"},
  ];

  let d = new Date("2026-04-01T12:00"), endD = new Date("2026-08-31T12:00");
  while (d <= endD) {
    const ds = fmt(d);
    for (const [s,e] of ECOLE_CFA) {
      if (ds >= s && ds <= e) shifts[`t1_${ds}`] = {type:"ecole", note:"Formation CFA"};
    }
    for (const {ds:ecs, note} of ECOLE_SPECIFIC) {
      if (ds === ecs) shifts[`t1_${ds}`] = {type:"ecole", note};
    }
    d = addDays(d, 1);
  }

  // ── SALLY (t7) : stagiaire lun-ven du 14/04 au 31/07 ──
  var SALLY_DEBUT = "2026-04-14", SALLY_FIN = "2026-07-31";
  let dSally = new Date("2026-04-14T12:00");
  const endSally = new Date("2026-07-31T12:00");
  while (dSally <= endSally) {
    const dsSally = fmt(dSally);
    const dwSally = dSally.getDay();
    if (dwSally !== 0 && dwSally !== 6) {
      // Lundi-vendredi : journée complète
      if (getDayType(dsSally)) {
        shifts["t7_" + dsSally] = {type:"travail", deb:"09:30", fin:"17:00", h:7.0, note:"Stage"};
      } else {
        shifts["t7_" + dsSally] = {type:"repos", note:""};
      }
    }
    dSally = addDays(dSally, 1);
  }

  // ── POEI Florence (t5) & Joris (t4) : 1–19 avril ──
  ["t4","t5"].forEach(id=>{
    let d2=new Date("2026-04-01T12:00");
    while(fmt(d2)<"2026-04-20"){shifts[`${id}_${fmt(d2)}`]={type:"poei",deb:"09:00",fin:"17:00",h:0,note:"POEI – Formation France Travail"};d2=addDays(d2,1);}
  });

  return shifts;
}

// Helper: effective hours for a shift (école = 7h, travail = actual h)
function shH(sh) {
  if (!sh) return 0;
  if (sh.type === "travail")    return sh.h || 0;
  if (sh.type === "ecole")      return 7.0;  // ✅ école = 7h, salaire maintenu
  if (sh.type === "soir")       return sh.h || 7.0; // créneau soir
  if (sh.type === "absent_inj") return 0;    // ❌ absent injustifié = 0h, déduit
  if (sh.type === "absent")     return 0;    // absence à justifier
  return 0;
}

function notifierEquipe(team, shifts, monday) {
  const safeMon = getMondayOf(monday);
  const dateDebut = safeMon.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"});
  const dateFin   = addDaysLocal(safeMon,6).toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});

  // Build per-employee summary
  const lines = [];
  const emailList = [];
  team.filter(e=>e.actif).forEach(emp => {
    if (emp.email) emailList.push(emp.email);
    const days = Array.from({length:7},(_,i)=>addDaysLocal(safeMon,i));
    const worked = days.filter(d=>{
      const ds=fmtLocal(d); if(ds<emp.debut||ds>emp.fin) return false;
      const sh=shifts[`${emp.id}_${ds}`];
      return sh&&sh.type==="travail";
    });
    if (worked.length===0) return;
    const empName = emp.prenom ? `${emp.prenom} ${emp.nom}` : emp.nom;
    lines.push(`${empName} :`);
    worked.forEach(d=>{
      const ds=fmtLocal(d); const sh=shifts[`${emp.id}_${ds}`];
      const dayLabel=d.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"});
      lines.push(`  ${dayLabel} : ${sh.deb} → ${sh.fin} (${Number(sh.h).toFixed(1)}h)`);
    });
    lines.push("");
  });

  const sujet = encodeURIComponent(`AbracadaParc — Planning semaine du ${dateDebut}`);
  const corps = encodeURIComponent(
`Bonjour,

Voici votre planning pour la semaine du ${dateDebut} au ${dateFin} :

${lines.join("\n")}
Pensez à vérifier votre planning complet sur : abracadaparc-rh.netlify.app

En cas de question, répondez à cet email.

Bonne semaine,
Vanessa Schweitzer
AbracadaParc — Goussainville (95)`
  );

  // Open Gmail with pre-filled email — each recipient gets their own email
  const emails = emailList.join(",");
  if (!emails) {
    alert("Aucun email renseigné dans les fiches salariés. Onglet Équipe → fiche de chaque salarié → champ Email.");
    return;
  }
  window.open(`mailto:${emails}?subject=${sujet}&body=${corps}`, "_blank");
}

function exportPDFMois(team, shifts, year, month) {
  injectPrintCSS();
  const days = new Date(year, month, 0).getDate();
  const MOIS_NOMS = ["","Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const dayNames = ["Di","Lu","Ma","Me","Je","Ve","Sa"];
  const season = {start:SEASON_START, end:SEASON_END};

  // Build weeks
  const firstDay = new Date(year, month-1, 1, 12);
  const firstMon = getMondayOf(firstDay);
  const weeks = Array.from({length:6},(_,i)=>({
    mon: addDaysLocal(firstMon, i*7),
    days: Array.from({length:7},(_,j)=>addDaysLocal(firstMon, i*7+j))
  })).filter(w=>w.days.some(d=>d.getMonth()===month-1));

  // Accept both full team array and single emp array — always ensure actif
  const activeTeam = team.filter(e=>e.actif !== false);

  const rows = activeTeam.map(emp => {
    const {acquis,pris,restants} = calcCP(emp,shifts,season);
    const weekRows = weeks.map(({mon:wm,days}) => {
      const wH = days.reduce((s,d)=>{if(d.getMonth()!==month-1)return s;const sh=shifts[`${emp.id}_${fmtLocal(d)}`];return s+(sh?.type==="travail"?(sh.h||0):0);},0);
      const cells = days.map(d=>{
        const ds=fmtLocal(d); const sh=shifts[`${emp.id}_${ds}`];
        const wrongM=d.getMonth()!==month-1; const hors=ds<emp.debut||ds>emp.fin;
        if (wrongM||hors) return `<td style="background:#f9f9f9;color:#ccc;font-size:8px">${d.getDate()}</td>`;
        if (!sh) return `<td><span style="color:#ccc;font-size:8px">${d.getDate()}</span></td>`;
        const st=STATUTS[sh.type]; const dow=d.getDay(); const isWE=dow===0||dow===6;
        const style=`color:${st.color};background:${st.bg};font-size:8px;border-radius:3px;padding:1px 3px`;
        const note=sh.note?`<br><i style="color:#888;font-size:7px">💬${sh.note.slice(0,20)}</i>`:"";
        return `<td style="text-align:center;${isWE?'background:#fff8f8':''}">
          <div style="font-size:8px;color:${isWE?'#BF360C':'#666'};font-weight:bold">${dayNames[dow]} ${d.getDate()}</div>
          <span style="${style}">${sh.type==="travail"?`${sh.deb}→${sh.fin}<br><b>${Number(sh.h).toFixed(1)}h</b>`:st.label}</span>${note}
        </td>`;
      }).join("");
      const semLabel=wm.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});
      return `<tr><td style="font-size:9px;color:#558B2F;white-space:nowrap;padding:3px 6px"><b>Sem ${semLabel}</b>${wH>0?`<br><b style="color:#1B5E20">${wH.toFixed(1)}h</b>`:""}</td>${cells}</tr>`;
    }).join("");
    return `<tr style="background:#e8f5e9"><td colspan="8" style="padding:4px 8px;font-weight:bold">${emp.prenom?emp.prenom+" ":""}<b>${emp.nom}</b> — ${emp.poste} — ${emp.heures_mois}h/mois — CP: ${acquis}acq/${pris}posés/${restants}restants</td></tr>${weekRows}`;
  }).join("");

  const monthH = activeTeam.map(emp=>{
    let h=0;for(let i=1;i<=days;i++){const ds=`${year}-${String(month).padStart(2,"0")}-${String(i).padStart(2,"0")}`;const sh=shifts[`${emp.id}_${ds}`];if(sh?.type==="travail")h+=sh.h||0;}
    return {emp,h};
  });

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Planning ${MOIS_NOMS[month]} ${year}</title>
  <style>body{font-family:sans-serif;font-size:9px;margin:1cm}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:2px 4px}th{background:#c8e6c9;font-size:9px}h2{font-size:13px;margin:0 0 6px}@media print{@page{size:A4 landscape;margin:1cm}}</style>
  </head><body>
  <h2>🌿 AbracadaParc — Planning ${MOIS_NOMS[month]} ${year}</h2>
  <table><thead><tr><th style="min-width:70px">Semaine</th><th>Lu</th><th>Ma</th><th>Me</th><th>Je</th><th>Ve</th><th style="background:#ffe8e8">Sa</th><th style="background:#ffe8e8">Di</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <p style="margin-top:6px;font-size:8px;color:#888">Imprimé le ${new Date().toLocaleDateString("fr-FR")} · IDCC 1790 · Pause 30min déduite</p>
  <script>window.onload=function(){window.print();}<\/script></body></html>`;
  // Use Blob URL — works on mobile, no popup blocker
  const blob = new Blob([html], {type:"text/html"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.target = "_blank"; a.rel = "noopener";

// ── EXPORT PAIE (service social / comptable, 5 du mois) ─────────────────────
function exportPaie(team, shifts, year, month) {
  const MOIS_NOMS = ["","Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const days = new Date(year, month, 0).getDate();
  const season = {start:SEASON_START, end:SEASON_END};
  const activeTeam = team.filter(e=>e.actif);

  const rows = activeTeam.map(emp => {
    let travailH=0, travailJ=0, reposJ=0, congesJ=0, absentJ=0, maladeJ=0, retardH=0;
    for (let i=1;i<=days;i++) {
      const ds=`${year}-${String(month).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
      if (ds<emp.debut||ds>emp.fin) continue;
      const sh=shifts[`${emp.id}_${ds}`];
      if (!sh) continue;
      if (sh.type==="travail") { travailH+=sh.h||0; travailJ++; }
      else if (sh.type==="repos") reposJ++;
      else if (sh.type==="conges") congesJ++;
      else if (sh.type==="absent") absentJ++;
      else if (sh.type==="malade") maladeJ++;
      else if (sh.type==="retard") retardH+=sh.hRetard||0;
    }
    const brut = Math.round(travailH * (parseFloat(emp.taux)||0) * 100)/100;
    const {acquis,pris,restants} = calcCP(emp,shifts,season);
    const ddn = emp.ddn ? new Date(emp.ddn).toLocaleDateString("fr-FR") : "—";
    const inContract = emp.debut <= `${year}-${String(month).padStart(2,"0")}-01` && emp.fin >= `${year}-${String(month).padStart(2,"0")}-${String(days).padStart(2,"0")}`;
    const status = !inContract ? "Hors période" : "";
    return `<tr ${status?"style='background:#fff8e1'":""}>
      <td><b>${emp.prenom?emp.prenom+" ":""}</b>${emp.nom}</td>
      <td>${emp.ss||"<span style='color:red'>MANQUANT</span>"}</td>
      <td>${ddn}</td>
      <td>${emp.contrat}</td>
      <td style="text-align:center">${(parseFloat(emp.taux)||0).toFixed(2)} €</td>
      <td style="text-align:center">${emp.heures_mois}h</td>
      <td style="text-align:center;font-weight:bold;color:#1B5E20">${travailH.toFixed(2)}h</td>
      <td style="text-align:center">${travailJ}j</td>
      <td style="text-align:center;color:${congesJ>0?"#E65100":"#ccc"}">${congesJ}j</td>
      <td style="text-align:center;color:${maladeJ>0?"#6A1B9A":"#ccc"}">${maladeJ}j</td>
      <td style="text-align:center;color:${absentJ>0?"#B71C1C":"#ccc"}">${absentJ}j</td>
      <td style="text-align:center;color:${retardH>0?"#BF360C":"#ccc"}">${retardH>0?retardH+"h":"—"}</td>
      <td style="text-align:right;font-weight:bold;color:#1B5E20">${brut.toFixed(2)} €</td>
      <td style="text-align:center">${restants}j CP</td>
      <td>${emp.iban||"<span style='color:orange'>IBAN manquant</span>"}</td>
      <td style="font-size:9px;color:#888">${status}</td>
    </tr>`;
  }).join("");

  const totalBrut = activeTeam.reduce((s,emp)=>{
    let h=0;for(let i=1;i<=days;i++){const ds=`${year}-${String(month).padStart(2,"0")}-${String(i).padStart(2,"0")}`;const sh=shifts[`${emp.id}_${ds}`];if(sh?.type==="travail")h+=sh.h||0;}
    return s+h*(parseFloat(emp.taux)||0);
  },0);

  const htmlP = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Export Paie ${MOIS_NOMS[month]} ${year}</title>
  <style>body{font-family:sans-serif;font-size:10px;margin:1cm}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:4px 6px}th{background:#e8f5e9;font-weight:bold;font-size:9px}h2{font-size:13px;margin:0 0 6px}@media print{@page{size:A3 landscape;margin:1cm}}</style>
  </head><body>
  <h2>🌿 AbracadaParc — Export Paie ${MOIS_NOMS[month]} ${year} — À transmettre avant le 5 du mois</h2>
  <p style="font-size:9px;color:#888;margin-bottom:8px">SIREN : 979 489 929 · IDCC 1790 · Gérante : Vanessa Schweitzer</p>
  <table>
    <thead><tr>
      <th>Salarié·e</th><th>N° SS</th><th>Date naiss.</th><th>Contrat</th><th>Taux/h</th><th>H contrat</th><th>H travaillées</th><th>J travaillés</th><th>Congés</th><th>Maladie</th><th>Absent</th><th>Retards</th><th>Brut calculé</th><th>CP restants</th><th>IBAN virement</th><th>Note</th>
    </tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr style="background:#c8e6c9;font-weight:bold">
      <td colspan="12">TOTAL MASSE SALARIALE BRUTE</td><td style="text-align:right">${totalBrut.toFixed(2)} €</td><td colspan="3"></td>
    </tr></tfoot>
  </table>
  <p style="margin-top:8px;font-size:9px;color:#888">Document de travail — Bruts indicatifs hors CP, primes, charges</p>
  <script>window.onload=function(){window.print();}<\/script></body></html>`;
  const blobP = new Blob([htmlP], {type:"text/html"});
  const urlP = URL.createObjectURL(blobP);
  const aP = document.createElement("a");
  aP.href=urlP; aP.target="_blank"; aP.rel="noopener";
  document.body.appendChild(aP); aP.click();
  setTimeout(()=>{document.body.removeChild(aP);URL.revokeObjectURL(urlP);}, 1000);
}

}
